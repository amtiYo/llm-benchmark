<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; user-select: none; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        
        #inventory-bar {
            display: flex; gap: 10px; margin-bottom: 20px; padding: 10px;
            background: rgba(0, 0, 0, 0.5); border-radius: 10px; pointer-events: auto;
        }
        .slot {
            width: 50px; height: 50px; background: rgba(100, 100, 100, 0.5); border: 3px solid #333;
            display: flex; justify-content: center; align-items: center; position: relative;
            color: white; font-weight: bold; font-size: 12px;
        }
        .slot.active { border-color: #fff; box-shadow: 0 0 10px white; }
        .count { position: absolute; bottom: 2px; right: 4px; font-size: 14px; text-shadow: 1px 1px 0 #000; }
        
        #instructions {
            position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="crosshair"></div>
    <div id="instructions">
        WASD: Move | SPACE: Jump | Click: Lock Mouse<br>
        LMB: Break | RMB: Place<br>
        1-3: Select Block
    </div>
    <div id="inventory-bar">
        <!-- Generated by JS -->
    </div>
</div>

<!-- Load Three.js and Perlin Noise -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simplex-noise@2.4.0/simplex-noise.min.js"></script>

<script>
// --- CONFIGURATION ---
const CHUNK_SIZE = 16;
const WORLD_HEIGHT = 32;
const RENDER_DISTANCE = 3; // Radius of chunks to render
const BLOCK_SIZE = 1;
const PLAYER_HEIGHT = 1.8;
const REACH = 5;

// Block Types
const BLOCKS = {
    DIRT: { id: 1, color: 0x8B4513, name: "Dirt" },
    GRASS: { id: 2, color: 0x55AA55, name: "Grass" },
    STONE: { id: 3, color: 0x888888, name: "Stone" }
};
const BLOCK_MAP = [null, BLOCKS.DIRT, BLOCKS.GRASS, BLOCKS.STONE];

// --- STATE ---
let camera, scene, renderer, raycaster;
let controlsLocked = false;
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();
let prevTime = performance.now();
let chunks = {}; // Key: "x,z" -> Mesh
let worldData = {}; // Key: "x,y,z" -> BlockID
let drops = []; // Array of drop objects

// Inventory
let inventory = {
    1: 0, // Dirt
    2: 0, // Grass
    3: 0  // Stone
};
let selectedSlot = 1; // Maps to Block ID

// Simplex Noise
const simplex = new SimplexNoise();

// --- INIT ---
function init() {
    // Scene Setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky blue
    scene.fog = new THREE.Fog(0x87CEEB, 20, 60);

    // Camera
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Light
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 100, 50);
    scene.add(dirLight);

    // Raycaster for mining/placing
    raycaster = new THREE.Raycaster();

    // Event Listeners
    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);
    document.addEventListener('mousedown', onMouseDown);
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('pointerlockchange', () => {
        controlsLocked = document.pointerLockElement === document.body;
    });
    window.addEventListener('resize', onWindowResize);

    // Initial Inventory UI
    updateInventoryUI();

    // Start Position
    camera.position.set(0, 20, 0); 

    animate();
}

// --- WORLD GENERATION ---

function getChunkKey(cx, cz) {
    return `${cx},${cz}`;
}

function generateChunkData(cx, cz) {
    for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
            const worldX = cx * CHUNK_SIZE + x;
            const worldZ = cz * CHUNK_SIZE + z;
            
            // Simple terrain gen: Base height + Hills
            let noise = simplex.noise2D(worldX * 0.05, worldZ * 0.05);
            let height = Math.floor(10 + noise * 5); 

            for (let y = 0; y <= height; y++) {
                let type = BLOCKS.DIRT.id;
                if (y === height) type = BLOCKS.GRASS.id;
                if (y < height - 3) type = BLOCKS.STONE.id;
                
                worldData[`${worldX},${y},${worldZ}`] = type;
            }
        }
    }
}

function updateChunks() {
    const playerChunkX = Math.floor(camera.position.x / CHUNK_SIZE);
    const playerChunkZ = Math.floor(camera.position.z / CHUNK_SIZE);

    // Generate new chunks
    for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
        for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
            const cx = playerChunkX + x;
            const cz = playerChunkZ + z;
            const key = getChunkKey(cx, cz);

            if (!chunks[key]) {
                // If data doesn't exist for this area, generate it first
                // Check a sample point to see if we generated data
                const sampleKey = `${cx*CHUNK_SIZE},0,${cz*CHUNK_SIZE}`;
                if (worldData[sampleKey] === undefined) {
                    generateChunkData(cx, cz);
                }
                
                // Build Mesh
                buildChunkMesh(cx, cz);
            }
        }
    }

    // Cleanup old chunks (optional optimization for memory)
    for (const key in chunks) {
        const [cx, cz] = key.split(',').map(Number);
        if (Math.abs(cx - playerChunkX) > RENDER_DISTANCE + 1 || 
            Math.abs(cz - playerChunkZ) > RENDER_DISTANCE + 1) {
            scene.remove(chunks[key]);
            chunks[key].geometry.dispose();
            delete chunks[key];
        }
    }
}

function buildChunkMesh(cx, cz) {
    const geometries = [];
    const matrix = new THREE.Matrix4();
    const boxGeo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);

    // Only iterate blocks that belong to this chunk
    for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
            const wx = cx * CHUNK_SIZE + x;
            const wz = cz * CHUNK_SIZE + z;

            for (let y = 0; y < WORLD_HEIGHT; y++) {
                const typeId = worldData[`${wx},${y},${wz}`];
                if (typeId) {
                    // Culling: Check neighbors (simple optimization)
                    if (worldData[`${wx+1},${y},${wz}`] && worldData[`${wx-1},${y},${wz}`] &&
                        worldData[`${wx},${y+1},${wz}`] && worldData[`${wx},${y-1},${wz}`] &&
                        worldData[`${wx},${y},${wz+1}`] && worldData[`${wx},${y},${wz-1}`]) {
                        continue; // Hidden block
                    }

                    const mesh = new THREE.Mesh(boxGeo); // Helper mesh for matrix
                    matrix.makeTranslation(wx, y, wz);
                    
                    // We need separate geometries for colors in a merged mesh, 
                    // but for simplicity in a single file, we'll use InstancedMesh logic 
                    // OR simple geometry merging with vertex colors.
                    // Let's do simple Geometry merging per chunk, creating separate geoms per material is better but more complex code.
                    // To keep it simple: Color the vertices.
                    
                    const instanceGeo = boxGeo.clone();
                    instanceGeo.applyMatrix4(matrix);
                    
                    const color = new THREE.Color(BLOCK_MAP[typeId].color);
                    const colors = [];
                    for(let i=0; i<instanceGeo.attributes.position.count; i++) {
                        colors.push(color.r, color.g, color.b);
                    }
                    instanceGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                    geometries.push(instanceGeo);
                }
            }
        }
    }

    if (geometries.length === 0) return;

    // Merge all geometries
    // Note: BufferGeometryUtils is not in core build, doing manual logic or using a simple loop.
    // Since we are in a single file without modules, let's use a simpler approach:
    // We will assume not too many blocks per chunk for this demo or just add individual meshes to a group?
    // Individual meshes is too slow.
    // Let's use InstancedMesh, but splitting by Material type is annoying.
    // Actually, Three.js allows merging geometries easily manually.
    
    // Simpler approach for this specific demo constraint: Add individual meshes but optimize slightly?
    // No, let's merge manually into one BufferGeometry.
    
    // Quick merge implementation
    const mergedGeo = mergeGeometries(geometries);
    const material = new THREE.MeshLambertMaterial({ vertexColors: true });
    const mesh = new THREE.Mesh(mergedGeo, material);
    mesh.name = "chunk";
    
    scene.add(mesh);
    chunks[getChunkKey(cx, cz)] = mesh;
}

function mergeGeometries(geometries) {
    // Basic merger
    let posCount = 0;
    let colorCount = 0;
    let normalCount = 0;

    geometries.forEach(g => {
        posCount += g.attributes.position.array.length;
        colorCount += g.attributes.color.array.length;
        normalCount += g.attributes.normal.array.length;
    });

    const posArray = new Float32Array(posCount);
    const colArray = new Float32Array(colorCount);
    const normArray = new Float32Array(normalCount);
    
    let offsetP = 0, offsetC = 0, offsetN = 0;

    geometries.forEach(g => {
        posArray.set(g.attributes.position.array, offsetP);
        colArray.set(g.attributes.color.array, offsetC);
        normArray.set(g.attributes.normal.array, offsetN);
        offsetP += g.attributes.position.array.length;
        offsetC += g.attributes.color.array.length;
        offsetN += g.attributes.normal.array.length;
    });

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colArray, 3));
    geo.setAttribute('normal', new THREE.BufferAttribute(normArray, 3));
    return geo;
}

// --- PHYSICS & CONTROLS ---

function checkCollision(newPos) {
    const x = Math.round(newPos.x);
    const y = Math.round(newPos.y - PLAYER_HEIGHT/2); // Check feet
    const z = Math.round(newPos.z);
    
    // Check feet and head
    if (worldData[`${x},${y},${z}`]) return true;
    if (worldData[`${x},${y+1},${z}`]) return true;
    
    return false;
}

function updatePhysics(delta) {
    velocity.x -= velocity.x * 10.0 * delta;
    velocity.z -= velocity.z * 10.0 * delta;
    velocity.y -= 9.8 * 2.0 * delta; // Gravity

    direction.z = Number(moveForward) - Number(moveBackward);
    direction.x = Number(moveRight) - Number(moveLeft);
    direction.normalize();

    if (moveForward || moveBackward) velocity.z -= direction.z * 50.0 * delta;
    if (moveLeft || moveRight) velocity.x -= direction.x * 50.0 * delta;

    // Apply movement X
    const newX = camera.position.x - velocity.x * delta;
    if (!checkCollision(new THREE.Vector3(newX, camera.position.y, camera.position.z))) {
        camera.position.x = newX;
    }

    // Apply movement Z
    const newZ = camera.position.z - velocity.z * delta;
    if (!checkCollision(new THREE.Vector3(camera.position.x, camera.position.y, newZ))) {
        camera.position.z = newZ;
    }

    // Apply movement Y
    const newY = camera.position.y + velocity.y * delta;
    // Floor collision
    const feetY = Math.floor(newY - PLAYER_HEIGHT + 0.5); // approximate feet
    const bodyX = Math.round(camera.position.x);
    const bodyZ = Math.round(camera.position.z);
    
    // Simple ground check
    if (worldData[`${bodyX},${feetY},${bodyZ}`]) {
        velocity.y = Math.max(0, velocity.y);
        camera.position.y = feetY + 1 + (PLAYER_HEIGHT - 1); // Snap to top of block
    } else {
        camera.position.y = newY;
    }
    
    if(camera.position.y < -10) camera.position.set(0, 30, 0); // Respawn if fall
}

// --- INTERACTION ---

function onMouseDown(event) {
    if (!controlsLocked) {
        document.body.requestPointerLock();
        return;
    }

    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const intersects = raycaster.intersectObjects(scene.children);

    // Filter for chunks
    const hit = intersects.find(i => i.object.name === "chunk");

    if (hit && hit.distance < REACH) {
        // Calculate block coordinate based on face normal
        const p = hit.point;
        const n = hit.face.normal;

        // Position of the block HIT
        const bx = Math.floor(p.x - n.x * 0.5);
        const by = Math.floor(p.y - n.y * 0.5);
        const bz = Math.floor(p.z - n.z * 0.5);
        
        if (event.button === 0) { // Left Click: Break
            const key = `${bx},${by},${bz}`;
            const type = worldData[key];
            if (type) {
                delete worldData[key];
                spawnDrop(bx, by, bz, type);
                regenerateChunkAt(bx, bz);
            }
        } else if (event.button === 2) { // Right Click: Place
            if (inventory[selectedSlot] > 0) {
                // Position of the NEW block (add normal)
                const nx = Math.floor(p.x + n.x * 0.5);
                const ny = Math.floor(p.y + n.y * 0.5);
                const nz = Math.floor(p.z + n.z * 0.5);

                // Don't place inside player
                const playerPos = camera.position;
                if (Math.abs(nx - playerPos.x) < 0.8 && Math.abs(nz - playerPos.z) < 0.8 && Math.abs(ny - playerPos.y) < 2) {
                    return; 
                }

                worldData[`${nx},${ny},${nz}`] = selectedSlot;
                inventory[selectedSlot]--;
                updateInventoryUI();
                regenerateChunkAt(nx, nz);
            }
        }
    }
}

function regenerateChunkAt(x, z) {
    // Identify which chunk this block belongs to
    const cx = Math.floor(x / CHUNK_SIZE);
    const cz = Math.floor(z / CHUNK_SIZE);
    const key = getChunkKey(cx, cz);
    
    if (chunks[key]) {
        scene.remove(chunks[key]);
        chunks[key].geometry.dispose();
        delete chunks[key];
        buildChunkMesh(cx, cz);
    }
}

// --- DROPS & LOOT ---

function spawnDrop(x, y, z, typeId) {
    const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
    const mat = new THREE.MeshLambertMaterial({ color: BLOCK_MAP[typeId].color });
    const mesh = new THREE.Mesh(geo, mat);
    
    mesh.position.set(x + 0.5, y + 0.5, z + 0.5);
    // Give it a little pop
    mesh.userData = {
        velocity: new THREE.Vector3((Math.random()-0.5)*2, 4, (Math.random()-0.5)*2),
        typeId: typeId
    };
    
    scene.add(mesh);
    drops.push(mesh);
}

function updateDrops(delta) {
    for (let i = drops.length - 1; i >= 0; i--) {
        const drop = drops[i];
        
        // Physics
        drop.userData.velocity.y -= 9.8 * delta;
        drop.position.addScaledVector(drop.userData.velocity, delta);
        
        // Ground Collision (simple floor check)
        const bx = Math.round(drop.position.x);
        const by = Math.floor(drop.position.y - 0.15);
        const bz = Math.round(drop.position.z);
        
        if (worldData[`${bx},${by},${bz}`]) {
            drop.position.y = by + 1.15;
            drop.userData.velocity.y = 0;
            drop.userData.velocity.x *= 0.9;
            drop.userData.velocity.z *= 0.9;
        }

        // Spin
        drop.rotation.y += 2 * delta;
        drop.rotation.x += 1 * delta;

        // Pickup
        const dist = drop.position.distanceTo(camera.position);
        if (dist < 1.5) {
            // Collect
            inventory[drop.userData.typeId]++;
            updateInventoryUI();
            scene.remove(drop);
            drops.splice(i, 1);
        }
    }
}

// --- UI ---

function updateInventoryUI() {
    const bar = document.getElementById('inventory-bar');
    bar.innerHTML = '';
    
    Object.keys(BLOCKS).forEach((key, index) => {
        const block = BLOCKS[key];
        const slot = document.createElement('div');
        slot.className = `slot ${selectedSlot === block.id ? 'active' : ''}`;
        slot.style.backgroundColor = '#' + block.color.toString(16);
        slot.innerHTML = `${block.name} <span class="count">${inventory[block.id]}</span>`;
        bar.appendChild(slot);
    });
}

// --- INPUT HANDLERS ---

function onMouseMove(event) {
    if (!controlsLocked) return;
    const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
    const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;
    
    camera.rotation.y -= movementX * 0.002;
    camera.rotation.x -= movementY * 0.002;
    camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
}

function onKeyDown(event) {
    switch (event.code) {
        case 'ArrowUp':
        case 'KeyW': moveForward = true; break;
        case 'ArrowLeft':
        case 'KeyA': moveLeft = true; break;
        case 'ArrowDown':
        case 'KeyS': moveBackward = true; break;
        case 'ArrowRight':
        case 'KeyD': moveRight = true; break;
        case 'Space': if (velocity.y === 0) velocity.y = 12; break; // Jump
        case 'Digit1': selectedSlot = 1; updateInventoryUI(); break;
        case 'Digit2': selectedSlot = 2; updateInventoryUI(); break;
        case 'Digit3': selectedSlot = 3; updateInventoryUI(); break;
    }
}

function onKeyUp(event) {
    switch (event.code) {
        case 'ArrowUp':
        case 'KeyW': moveForward = false; break;
        case 'ArrowLeft':
        case 'KeyA': moveLeft = false; break;
        case 'ArrowDown':
        case 'KeyS': moveBackward = false; break;
        case 'ArrowRight':
        case 'KeyD': moveRight = false; break;
    }
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- MAIN LOOP ---

function animate() {
    requestAnimationFrame(animate);
    
    const time = performance.now();
    const delta = (time - prevTime) / 1000;
    prevTime = time;

    if (controlsLocked) {
        updatePhysics(delta);
        updateChunks(); // Generate terrain as we move
        updateDrops(delta);
    }

    renderer.render(scene, camera);
}

// Start
init();

</script>
</body>
</html>
