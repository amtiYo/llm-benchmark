<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel Sandbox: Mine & Build</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas */
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            margin-left: -10px; margin-top: -10px;
            background-color: transparent;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        /* Inventory Bar */
        #inventory-bar {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;
            pointer-events: auto;
        }
        .slot {
            width: 60px; height: 60px;
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid #555;
            color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px;
            position: relative;
        }
        .slot.active { border-color: #00ff00; background: rgba(0, 50, 0, 0.5); }
        .slot span { margin-top: 5px; font-size: 16px; }
        .key-hint { position: absolute; top: 2px; left: 4px; font-size: 10px; color: #aaa; }

        /* Instructions */
        #instructions {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
        #blocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px; cursor: pointer; pointer-events: auto;
            z-index: 10;
        }
    </style>
</head>
<body>

<!-- UI Elements -->
<div id="blocker"><div>Click to Play</div></div>

<div id="ui-layer">
    <div id="instructions">
        WASD: Move | SPACE: Jump<br>
        LMB: Mine Block | RMB: Place Block<br>
        1-3: Select Block Type
    </div>
    <div id="crosshair"></div>
    <div id="inventory-bar">
        <!-- Generated by JS -->
    </div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

<script>
/**
 * CONFIGURATION & GLOBALS
 */
const SCENE_COLOR = 0x87CEEB; // Sky blue
const RENDER_DIST = 40; // Blocks radius
const CHUNK_SIZE = 16;
const BLOCK_SIZE = 1;
const PLAYER_HEIGHT = 1.8;
const PLAYER_SPEED = 5.0;
const GRAVITY = 18.0;
const JUMP_FORCE = 8.0;

// Block Types
const BLOCKS = {
    GRASS: { id: 1, name: 'Grass', color: 0x5da646 },
    DIRT:  { id: 2, name: 'Dirt',  color: 0x8b5a2b },
    STONE: { id: 3, name: 'Stone', color: 0x888888 },
    WOOD:  { id: 4, name: 'Wood',  color: 0x654321 }
};

// State
let inventory = {
    1: 0, // Grass
    2: 0, // Dirt
    3: 0, // Stone
};
let selectedBlockId = 1;

/**
 * THREE.JS SETUP
 */
const scene = new THREE.Scene();
scene.background = new THREE.Color(SCENE_COLOR);
scene.fog = new THREE.Fog(SCENE_COLOR, 10, RENDER_DIST - 5);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
dirLight.position.set(50, 100, 50);
dirLight.castShadow = true;
scene.add(dirLight);

/**
 * TEXTURES (Procedural Canvas Textures)
 */
function createBlockMaterial(color) {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.fillRect(0,0,64,64);
    
    // Add noise/pixel texture
    for(let i=0; i<400; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
        const x = Math.floor(Math.random()*64);
        const y = Math.floor(Math.random()*64);
        ctx.fillRect(x,y,4,4); // chunky pixels
    }
    
    const tex = new THREE.CanvasTexture(canvas);
    tex.magFilter = THREE.NearestFilter; // Retain pixelated look
    return new THREE.MeshLambertMaterial({ map: tex });
}

const materials = {};
for(let key in BLOCKS) {
    materials[BLOCKS[key].id] = createBlockMaterial(BLOCKS[key].color);
}

/**
 * WORLD GENERATION
 */
const simplex = new SimplexNoise();
const worldData = new Map(); // Key: "x,y,z", Value: blockId
const worldGroup = new THREE.Group();
scene.add(worldGroup);

function getBlockKey(x, y, z) { return `${x},${y},${z}`; }

function setBlock(x, y, z, typeId) {
    const key = getBlockKey(x, y, z);
    
    // Remove existing mesh if any
    const existing = worldGroup.children.find(m => m.userData.x === x && m.userData.y === y && m.userData.z === z);
    if(existing) {
        worldGroup.remove(existing);
        existing.geometry.dispose();
    }

    if (typeId === 0) {
        worldData.delete(key);
        return;
    }

    worldData.set(key, typeId);
    
    const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
    const mesh = new THREE.Mesh(geo, materials[typeId]);
    mesh.position.set(x, y, z);
    mesh.userData = { x, y, z, isBlock: true };
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    worldGroup.add(mesh);
}

function getBlock(x, y, z) {
    return worldData.get(getBlockKey(x, y, z)) || 0;
}

// Procedural Generation
const generatedChunks = new Set();

function generateTerrain(cx, cz) {
    const chunkKey = `${cx},${cz}`;
    if (generatedChunks.has(chunkKey)) return;
    generatedChunks.add(chunkKey);

    for (let x = cx * CHUNK_SIZE; x < (cx + 1) * CHUNK_SIZE; x++) {
        for (let z = cz * CHUNK_SIZE; z < (cz + 1) * CHUNK_SIZE; z++) {
            // Noise for height (Hills and plains)
            let n = simplex.noise2D(x * 0.03, z * 0.03);
            let height = Math.floor(n * 5) + 5; // Height between 0 and 10 approx

            for (let y = 0; y <= height; y++) {
                let type = BLOCKS.DIRT.id;
                if (y === height) type = BLOCKS.GRASS.id;
                if (y < height - 3) type = BLOCKS.STONE.id;
                
                // Don't overwrite if we manually placed something (safety)
                if(!getBlock(x,y,z)) {
                    setBlock(x, y, z, type);
                }
            }
        }
    }
}

/**
 * PHYSICS & CONTROLS
 */
// Player Logic
const player = {
    pos: new THREE.Vector3(0, 15, 0),
    vel: new THREE.Vector3(),
    onGround: false
};
const controls = {
    forward: false, backward: false, left: false, right: false, jump: false
};

// Pointer Lock
const blocker = document.getElementById('blocker');
document.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement === document.body) {
        blocker.style.display = 'none';
    } else {
        blocker.style.display = 'flex';
    }
});
blocker.addEventListener('click', () => document.body.requestPointerLock());

// Mouse Look
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
document.addEventListener('mousemove', (event) => {
    if (document.pointerLockElement === document.body) {
        euler.setFromQuaternion(camera.quaternion);
        euler.y -= event.movementX * 0.002;
        euler.x -= event.movementY * 0.002;
        euler.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, euler.x));
        camera.quaternion.setFromEuler(euler);
    }
});

// Keys
document.addEventListener('keydown', (e) => {
    switch(e.code) {
        case 'KeyW': controls.forward = true; break;
        case 'KeyS': controls.backward = true; break;
        case 'KeyA': controls.left = true; break;
        case 'KeyD': controls.right = true; break;
        case 'Space': controls.jump = true; break;
        case 'Digit1': selectSlot(1); break;
        case 'Digit2': selectSlot(2); break;
        case 'Digit3': selectSlot(3); break;
    }
});
document.addEventListener('keyup', (e) => {
    switch(e.code) {
        case 'KeyW': controls.forward = false; break;
        case 'KeyS': controls.backward = false; break;
        case 'KeyA': controls.left = false; break;
        case 'KeyD': controls.right = false; break;
        case 'Space': controls.jump = false; break;
    }
});

/**
 * COLLISION SYSTEM (AABB)
 */
function checkCollision(newPos) {
    // Player bounding box (width 0.6, height 1.8)
    const padding = 0.3; 
    const minX = Math.floor(newPos.x - padding);
    const maxX = Math.floor(newPos.x + padding);
    const minY = Math.floor(newPos.y - 1.5); // Feet
    const maxY = Math.floor(newPos.y + 0.2); // Head
    const minZ = Math.floor(newPos.z - padding);
    const maxZ = Math.floor(newPos.z + padding);

    for (let x = minX; x <= maxX; x++) {
        for (let y = minY; y <= maxY; y++) {
            for (let z = minZ; z <= maxZ; z++) {
                if (getBlock(x, y, z) !== 0) return true;
            }
        }
    }
    return false;
}

/**
 * DROPS / LOOT SYSTEM
 */
const drops = []; // Array of drop objects
const dropGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);

function spawnDrop(x, y, z, typeId) {
    const mesh = new THREE.Mesh(dropGeo, materials[typeId]);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    
    // Give it a random spin and pop
    const velocity = new THREE.Vector3(
        (Math.random() - 0.5) * 4, 
        5, // Pop up
        (Math.random() - 0.5) * 4
    );

    scene.add(mesh);
    drops.push({ mesh, velocity, typeId, active: true });
}

function updateDrops(dt) {
    for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i];
        if (!d.active) continue;

        // Gravity
        d.velocity.y -= GRAVITY * dt;
        
        // Move
        d.mesh.position.addScaledVector(d.velocity, dt);
        
        // Rotate (visual effect)
        d.mesh.rotation.x += 2 * dt;
        d.mesh.rotation.y += 2 * dt;

        // Simple Ground Collision
        const bx = Math.round(d.mesh.position.x);
        const by = Math.floor(d.mesh.position.y - 0.15);
        const bz = Math.round(d.mesh.position.z);

        if (getBlock(bx, by, bz) !== 0) {
            d.velocity.y = 0;
            d.velocity.x *= 0.8; // friction
            d.velocity.z *= 0.8;
            d.mesh.position.y = by + 1 + 0.15; // sit on top
        }

        // Pickup Logic
        const dist = d.mesh.position.distanceTo(player.pos);
        if (dist < 1.5) {
            // COLLECT!
            inventory[d.typeId] = (inventory[d.typeId] || 0) + 1;
            updateInventoryUI();
            scene.remove(d.mesh);
            drops.splice(i, 1);
        }
    }
}

/**
 * INTERACTION (Mining & Placing)
 */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(0, 0); // Center

document.addEventListener('mousedown', (e) => {
    if (document.pointerLockElement !== document.body) return;
    
    raycaster.setFromCamera(mouse, camera);
    // Raycast only against blocks
    const intersects = raycaster.intersectObjects(worldGroup.children);

    if (intersects.length > 0 && intersects[0].distance < 6) {
        const hit = intersects[0];
        const tx = hit.object.userData.x;
        const ty = hit.object.userData.y;
        const tz = hit.object.userData.z;

        if (e.button === 0) { 
            // LMB: Destroy
            const type = getBlock(tx, ty, tz);
            if (type !== 0) {
                spawnDrop(tx, ty, tz, type); // Create loot
                setBlock(tx, ty, tz, 0); // Remove block
            }
        } else if (e.button === 2) {
            // RMB: Place
            if (inventory[selectedBlockId] > 0) {
                // Find adjacent free space based on face normal
                const nx = tx + hit.face.normal.x;
                const ny = ty + hit.face.normal.y;
                const nz = tz + hit.face.normal.z;

                // Don't place inside player
                const playerBoxPos = new THREE.Vector3(nx, ny, nz);
                if (playerBoxPos.distanceTo(player.pos) > 1.2) {
                    setBlock(nx, ny, nz, selectedBlockId);
                    inventory[selectedBlockId]--;
                    updateInventoryUI();
                }
            }
        }
    }
});

/**
 * UI & INVENTORY
 */
const slotsDiv = document.getElementById('inventory-bar');
const invKeys = [1, 2, 3]; // Mapped to Block IDs
const typeNames = { 1: "GRASS", 2: "DIRT", 3: "STONE" };

function initUI() {
    slotsDiv.innerHTML = '';
    invKeys.forEach(id => {
        const div = document.createElement('div');
        div.className = id === selectedBlockId ? 'slot active' : 'slot';
        div.id = `slot-${id}`;
        div.innerHTML = `<span class="key-hint">${id}</span><div>${typeNames[id]}</div><span id="count-${id}">0</span>`;
        slotsDiv.appendChild(div);
    });
}

function updateInventoryUI() {
    invKeys.forEach(id => {
        document.getElementById(`count-${id}`).innerText = inventory[id];
    });
}

function selectSlot(id) {
    if(!invKeys.includes(id)) return;
    selectedBlockId = id;
    invKeys.forEach(k => {
        document.getElementById(`slot-${k}`).className = (k === id) ? 'slot active' : 'slot';
    });
}

/**
 * MAIN LOOP
 */
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const dt = Math.min(clock.getDelta(), 0.1); // Cap delta to prevent physics explosion

    // --- 1. Procedural Generation Update ---
    // Generate chunks around player
    const pcx = Math.floor(player.pos.x / CHUNK_SIZE);
    const pcz = Math.floor(player.pos.z / CHUNK_SIZE);
    
    // Simple radius check to spawn chunks
    for(let x = -1; x <= 1; x++) {
        for(let z = -1; z <= 1; z++) {
            generateTerrain(pcx + x, pcz + z);
        }
    }

    // --- 2. Physics Update ---
    if (document.pointerLockElement === document.body) {
        // Friction
        player.vel.x -= player.vel.x * 10.0 * dt;
        player.vel.z -= player.vel.z * 10.0 * dt;

        // Gravity
        player.vel.y -= GRAVITY * dt;

        // Input Direction
        const direction = new THREE.Vector3();
        direction.z = Number(controls.forward) - Number(controls.backward);
        direction.x = Number(controls.right) - Number(controls.left);
        direction.normalize(); 

        if (controls.forward || controls.backward) {
            // Apply speed relative to camera look
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            camDir.y = 0; camDir.normalize();
            
            if (controls.forward) player.vel.addScaledVector(camDir, PLAYER_SPEED * dt * 8);
            if (controls.backward) player.vel.addScaledVector(camDir, -PLAYER_SPEED * dt * 8);
        }
        
        if (controls.left || controls.right) {
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            const sideDir = new THREE.Vector3(-camDir.z, 0, camDir.x).normalize();
            
            if (controls.left) player.vel.addScaledVector(sideDir, PLAYER_SPEED * dt * 8);
            if (controls.right) player.vel.addScaledVector(sideDir, -PLAYER_SPEED * dt * 8);
        }

        // Jump
        if (controls.jump && player.onGround) {
            player.vel.y = JUMP_FORCE;
            player.onGround = false;
        }

        // Apply Velocity (X/Z) + Collision
        player.pos.x += player.vel.x * dt;
        if(checkCollision(player.pos)) {
            player.pos.x -= player.vel.x * dt;
            player.vel.x = 0;
        }

        player.pos.z += player.vel.z * dt;
        if(checkCollision(player.pos)) {
            player.pos.z -= player.vel.z * dt;
            player.vel.z = 0;
        }

        // Apply Velocity (Y) + Collision
        player.pos.y += player.vel.y * dt;
        if(checkCollision(player.pos)) {
            player.pos.y -= player.vel.y * dt;
            if (player.vel.y < 0) player.onGround = true; // Hit floor
            player.vel.y = 0;
        } else {
            player.onGround = false;
        }

        // Kill floor (respawn)
        if(player.pos.y < -10) {
            player.pos.set(0, 20, 0);
            player.vel.set(0,0,0);
        }
    }

    // Sync camera
    camera.position.copy(player.pos);
    
    // --- 3. Drops Update ---
    updateDrops(dt);

    // --- 4. Render ---
    renderer.render(scene, camera);
}

// Initial Generation
initUI();
updateInventoryUI();
// Force generate initial area so player doesn't fall
generateTerrain(0, 0); 
animate();

// Window Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
