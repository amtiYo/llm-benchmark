<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Voxel Sandbox</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            /* Sky blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
        }

        .slot {
            width: 50px;
            height: 50px;
            border: 3px solid #555;
            border-radius: 4px;
            position: relative;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 4px;
            box-sizing: border-box;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
            transition: 0.1s;
        }

        .slot.active {
            border-color: #FFFF00;
            transform: scale(1.1);
        }

        .slot .number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 12px;
            color: #aaa;
        }

        .slot .color-preview {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        #instructions {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
        }

        h1 {
            margin-top: 0;
        }

        p {
            line-height: 1.5;
            font-size: 1.1em;
        }

        button {
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            margin-top: 20px;
        }

        button:hover {
            background: #45a049;
        }
    </style>
    <!-- Import Maps for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="crosshair"></div>

    <div id="ui">
        <div class="slot active" id="slot-1">
            <span class="number">1</span>
            <div class="color-preview" style="background: #44aa44;"></div>
            <span class="count" id="count-1">0</span>
        </div>
        <div class="slot" id="slot-2">
            <span class="number">2</span>
            <div class="color-preview" style="background: #8b5a2b;"></div>
            <span class="count" id="count-2">0</span>
        </div>
        <div class="slot" id="slot-3">
            <span class="number">3</span>
            <div class="color-preview" style="background: #888888;"></div>
            <span class="count" id="count-3">0</span>
        </div>
        <div class="slot" id="slot-4">
            <span class="number">4</span>
            <div class="color-preview" style="background: #6b4226;"></div>
            <span class="count" id="count-4">0</span>
        </div>
    </div>

    <div id="instructions">
        <h1>Web Voxel Sandbox</h1>
        <p>
            <b>WASD</b> - Move<br>
            <b>SPACE</b> - Jump<br>
            <b>Left Click</b> - Break Blocks<br>
            <b>Right Click</b> - Place Blocks<br>
            <b>1-4</b> - Select Block Type<br>
            <i>Collect dropped items to build!</i>
        </p>
        <button id="start-btn">Click to Play</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { SimplexNoise } from 'three/addons/math/SimplexNoise.js';

        // --- Core Variables ---
        let scene, camera, renderer;
        let isLocked = false;
        const clock = new THREE.Clock();

        // --- World & Chunk System ---
        const world = new Map(); // "x,y,z" -> type
        const loadedChunks = new Set();
        const chunkSize = 16;
        const renderDistance = 2; // Radius in chunks
        const simplex = new SimplexNoise();

        // Block Types definitions
        const BLOCK = {
            GRASS: 1, DIRT: 2, STONE: 3, WOOD: 4
        };
        const blockColors = {
            [BLOCK.GRASS]: 0x44aa44,
            [BLOCK.DIRT]: 0x8b5a2b,
            [BLOCK.STONE]: 0x888888,
            [BLOCK.WOOD]: 0x6b4226
        };

        // Instanced Meshes for Rendering
        const meshes = {};
        const maxInstances = 60000;
        const dummy = new THREE.Object3D();

        // Drops & Inventory
        const drops = [];
        const inventory = { 1: 0, 2: 0, 3: 0, 4: 0 };
        let activeSlot = 1;

        // Player & Physics
        const player = {
            pos: new THREE.Vector3(0, 30, 0),
            vel: new THREE.Vector3(0, 0, 0),
            yaw: 0,
            pitch: 0,
            canJump: false,
            speed: 6.0,
            jumpPower: 7.5,
            gravity: 20.0
        };

        const keys = { w: false, a: false, s: false, d: false, space: false };

        init();
        animate();

        function init() {
            // 1. Setup Three.js Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 2. Setup Block Rendering (InstancedMesh)
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            for (const type in blockColors) {
                const material = new THREE.MeshLambertMaterial({ color: blockColors[type] });
                const imesh = new THREE.InstancedMesh(geometry, material, maxInstances);
                imesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                scene.add(imesh);
                meshes[type] = imesh;
            }

            // 3. Initialize Starting Chunks
            updateChunks();

            // Set player initial height
            for (let y = 40; y >= 0; y--) {
                if (world.has(`0,${y},0`)) {
                    player.pos.set(0, y + 2, 0);
                    break;
                }
            }

            // 4. Setup Controls & Input
            setupInput();

            window.addEventListener('resize', onWindowResize);
        }

        // --- Procedural Generation ---
        function generateChunk(cx, cz) {
            for (let x = 0; x < chunkSize; x++) {
                for (let z = 0; z < chunkSize; z++) {
                    const wx = cx * chunkSize + x;
                    const wz = cz * chunkSize + z;

                    // Simple terrain generation
                    const height = Math.floor(simplex.noise(wx * 0.03, wz * 0.03) * 6 + 10);

                    for (let y = 0; y <= height; y++) {
                        let type = BLOCK.STONE;
                        if (y === height) type = BLOCK.GRASS;
                        else if (y > height - 3) type = BLOCK.DIRT;
                        world.set(`${wx},${y},${wz}`, type);
                    }

                    // Trees
                    if (Math.random() < 0.01) {
                        for (let t = 1; t <= 4; t++) {
                            world.set(`${wx},${height + t},${wz}`, BLOCK.WOOD);
                        }
                    }
                }
            }
        }

        function updateChunks() {
            const cx = Math.floor(player.pos.x / chunkSize);
            const cz = Math.floor(player.pos.z / chunkSize);
            let chunksGenerated = false;

            for (let dx = -renderDistance; dx <= renderDistance; dx++) {
                for (let dz = -renderDistance; dz <= renderDistance; dz++) {
                    const key = `${cx + dx},${cz + dz}`;
                    if (!loadedChunks.has(key)) {
                        generateChunk(cx + dx, cz + dz);
                        loadedChunks.add(key);
                        chunksGenerated = true;
                    }
                }
            }

            if (chunksGenerated) updateMeshes();
        }

        // --- Rendering Voxels ---
        function updateMeshes() {
            const counts = { 1: 0, 2: 0, 3: 0, 4: 0 };

            // Only render blocks within a certain distance from player
            world.forEach((type, key) => {
                const [x, y, z] = key.split(',').map(Number);

                if (Math.abs(x - player.pos.x) < 40 && Math.abs(z - player.pos.z) < 40) {
                    // Simple Occlusion Culling (only render if an adjacent block is empty)
                    if (
                        !world.has(`${x + 1},${y},${z}`) || !world.has(`${x - 1},${y},${z}`) ||
                        !world.has(`${x},${y + 1},${z}`) || !world.has(`${x},${y - 1},${z}`) ||
                        !world.has(`${x},${y},${z + 1}`) || !world.has(`${x},${y},${z - 1}`)
                    ) {
                        dummy.position.set(x, y, z);
                        dummy.updateMatrix();
                        meshes[type].setMatrixAt(counts[type], dummy.matrix);
                        counts[type]++;
                    }
                }
            });

            for (const type in meshes) {
                meshes[type].count = counts[type];
                meshes[type].instanceMatrix.needsUpdate = true;
            }
        }

        // --- Mining & Loot System ---
        function spawnDrop(x, y, z, type) {
            const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const material = new THREE.MeshLambertMaterial({ color: blockColors[type] });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            scene.add(mesh);

            drops.push({
                mesh, type,
                vx: (Math.random() - 0.5) * 4,
                vy: 3.0,
                vz: (Math.random() - 0.5) * 4
            });
        }

        function updateDrops(dt) {
            for (let i = drops.length - 1; i >= 0; i--) {
                const d = drops[i];

                // Physics
                d.vy -= 15.0 * dt; // Gravity

                let nx = d.mesh.position.x + d.vx * dt;
                let ny = d.mesh.position.y + d.vy * dt;
                let nz = d.mesh.position.z + d.vz * dt;

                // Simple Floor Collision
                const blockY = Math.floor(ny - 0.15 + 0.5);
                const blockX = Math.round(nx);
                const blockZ = Math.round(nz);

                if (world.has(`${blockX},${blockY},${blockZ}`)) {
                    ny = blockY + 0.5 + 0.15;
                    d.vy = 0; d.vx = 0; d.vz = 0;
                }

                d.mesh.position.set(nx, ny, nz);
                d.mesh.rotation.y += dt * 2;
                d.mesh.rotation.x += dt * 2;

                // Pickup logic
                if (d.mesh.position.distanceTo(player.pos) < 1.8) {
                    inventory[d.type]++;
                    updateInventoryUI();
                    scene.remove(d.mesh);
                    drops.splice(i, 1);
                }
            }
        }

        // --- Raycasting (DDA) ---
        function raycastVoxel(origin, dir, maxDist) {
            let ox = origin.x + 0.5;
            let oy = origin.y + 0.5;
            let oz = origin.z + 0.5;

            let x = Math.floor(ox);
            let y = Math.floor(oy);
            let z = Math.floor(oz);

            const stepX = Math.sign(dir.x);
            const stepY = Math.sign(dir.y);
            const stepZ = Math.sign(dir.z);

            let tMaxX = stepX > 0 ? (x + 1 - ox) / dir.x : (ox - x) / -dir.x;
            let tMaxY = stepY > 0 ? (y + 1 - oy) / dir.y : (oy - y) / -dir.y;
            let tMaxZ = stepZ > 0 ? (z + 1 - oz) / dir.z : (oz - z) / -dir.z;

            if (isNaN(tMaxX) || !isFinite(tMaxX)) tMaxX = Infinity;
            if (isNaN(tMaxY) || !isFinite(tMaxY)) tMaxY = Infinity;
            if (isNaN(tMaxZ) || !isFinite(tMaxZ)) tMaxZ = Infinity;

            const tDeltaX = Math.abs(1 / dir.x);
            const tDeltaY = Math.abs(1 / dir.y);
            const tDeltaZ = Math.abs(1 / dir.z);

            let face = new THREE.Vector3();

            for (let i = 0; i < maxDist * 4; i++) {
                if (world.has(`${x},${y},${z}`)) {
                    return { pos: { x, y, z }, norm: face };
                }
                if (tMaxX < tMaxY) {
                    if (tMaxX < tMaxZ) { x += stepX; tMaxX += tDeltaX; face.set(-stepX, 0, 0); }
                    else { z += stepZ; tMaxZ += tDeltaZ; face.set(0, 0, -stepZ); }
                } else {
                    if (tMaxY < tMaxZ) { y += stepY; tMaxY += tDeltaY; face.set(0, -stepY, 0); }
                    else { z += stepZ; tMaxZ += tDeltaZ; face.set(0, 0, -stepZ); }
                }
            }
            return null;
        }

        // --- Input & Controls ---
        function setupInput() {
            const startBtn = document.getElementById('start-btn');
            startBtn.addEventListener('click', () => document.body.requestPointerLock());

            document.addEventListener('pointerlockchange', () => {
                isLocked = document.pointerLockElement === document.body;
                document.getElementById('instructions').style.display = isLocked ? 'none' : 'flex';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isLocked) return;
                player.yaw -= e.movementX * 0.002;
                player.pitch -= e.movementY * 0.002;
                player.pitch = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, player.pitch));
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') keys.w = true;
                if (e.code === 'KeyA') keys.a = true;
                if (e.code === 'KeyS') keys.s = true;
                if (e.code === 'KeyD') keys.d = true;
                if (e.code === 'Space') keys.space = true;

                // Hotbar keys
                if (['1', '2', '3', '4'].includes(e.key)) {
                    activeSlot = parseInt(e.key);
                    updateInventoryUI();
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') keys.w = false;
                if (e.code === 'KeyA') keys.a = false;
                if (e.code === 'KeyS') keys.s = false;
                if (e.code === 'KeyD') keys.d = false;
                if (e.code === 'Space') keys.space = false;
            });

            window.addEventListener('mousedown', (e) => {
                if (!isLocked) return;

                const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const hit = raycastVoxel(camera.position, dir, 6);
                if (!hit) return;

                if (e.button === 0) { // Break
                    const key = `${hit.pos.x},${hit.pos.y},${hit.pos.z}`;
                    const type = world.get(key);
                    world.delete(key);
                    spawnDrop(hit.pos.x, hit.pos.y, hit.pos.z, type);
                    updateMeshes();
                }
                else if (e.button === 2) { // Place
                    if (inventory[activeSlot] > 0) {
                        const nx = hit.pos.x + hit.norm.x;
                        const ny = hit.pos.y + hit.norm.y;
                        const nz = hit.pos.z + hit.norm.z;

                        // Prevent placing inside the player
                        const dx = Math.abs(nx - player.pos.x);
                        const dy = ny - player.pos.y;
                        const dz = Math.abs(nz - player.pos.z);
                        if (dx < 0.6 && dz < 0.6 && dy > -1.6 && dy < 0.2) return;

                        world.set(`${nx},${ny},${nz}`, activeSlot);
                        inventory[activeSlot]--;
                        updateInventoryUI();
                        updateMeshes();
                    }
                }
            });

            // Prevent right-click menu
            window.addEventListener('contextmenu', e => e.preventDefault());
        }

        function updateInventoryUI() {
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`count-${i}`).innerText = inventory[i];
                const slot = document.getElementById(`slot-${i}`);
                if (i === activeSlot) slot.classList.add('active');
                else slot.classList.remove('active');
            }
        }

        // --- Physics & Collision ---
        function checkCollision(px, py, pz) {
            // Player AABB Check
            const minX = Math.round(px - 0.3); const maxX = Math.round(px + 0.3);
            const minY = Math.round(py - 1.5); const maxY = Math.round(py + 0.2);
            const minZ = Math.round(pz - 0.3); const maxZ = Math.round(pz + 0.3);

            for (let x = minX; x <= maxX; x++) {
                for (let y = minY; y <= maxY; y++) {
                    for (let z = minZ; z <= maxZ; z++) {
                        if (world.has(`${x},${y},${z}`)) return true;
                    }
                }
            }
            return false;
        }

        function updatePhysics(dt) {
            // Input to velocity
            let dirX = 0, dirZ = 0;
            if (keys.w) dirZ -= 1;
            if (keys.s) dirZ += 1;
            if (keys.a) dirX -= 1;
            if (keys.d) dirX += 1;

            const moveDir = new THREE.Vector3(dirX, 0, dirZ).normalize();
            moveDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

            player.vel.x = moveDir.x * player.speed;
            player.vel.z = moveDir.z * player.speed;

            if (keys.space && player.canJump) {
                player.vel.y = player.jumpPower;
                player.canJump = false;
            }

            player.vel.y -= player.gravity * dt;

            // Apply movement & collision step by step
            let nx = player.pos.x + player.vel.x * dt;
            let ny = player.pos.y + player.vel.y * dt;
            let nz = player.pos.z + player.vel.z * dt;

            if (checkCollision(nx, player.pos.y, player.pos.z)) {
                nx = player.pos.x;
                player.vel.x = 0;
            }
            if (checkCollision(nx, player.pos.y, nz)) {
                nz = player.pos.z;
                player.vel.z = 0;
            }
            if (checkCollision(nx, ny, nz)) {
                if (player.vel.y < 0) player.canJump = true; // Landed on floor
                ny = player.pos.y;
                player.vel.y = 0;
            } else {
                player.canJump = false; // Falling
            }

            player.pos.set(nx, ny, nz);

            // Out of bounds check
            if (player.pos.y < -10) player.pos.y = 30;
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            if (isLocked) {
                updatePhysics(dt);
                updateChunks(); // Generate as we move
            }

            updateDrops(dt);

            // Update Camera
            const euler = new THREE.Euler(player.pitch, player.yaw, 0, 'YXZ');
            camera.quaternion.setFromEuler(euler);
            camera.position.copy(player.pos);

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>

</html>
