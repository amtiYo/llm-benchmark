<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Sandbox Game</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #87CEEB;
        }
        #inventory {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        .inventory-slot {
            width: 50px;
            height: 50px;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
        }
        .inventory-slot.active {
            border-color: yellow;
        }
        .item-count {
            position: absolute;
            bottom: 0;
            right: 5px;
            font-size: 12px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="inventory"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/PointerLockControls.js"></script>
    <script>
        // Game constants
        const CHUNK_SIZE = 16;
        const WORLD_DEPTH = 4;
        const BLOCK_TYPES = {
            AIR: 0,
            GRASS: 1,
            DIRT: 2,
            STONE: 3,
            WOOD: 4
        };
        const BLOCK_COLORS = {
            [BLOCK_TYPES.GRASS]: 0x7CFC00,
            [BLOCK_TYPES.DIRT]: 0x8B4513,
            [BLOCK_TYPES.STONE]: 0x708090,
            [BLOCK_TYPES.WOOD]: 0x8B4513
        };
        const INVENTORY_SIZE = 9;

        // Game state
        let scene, camera, renderer, controls;
        let world = {};
        let chunksToRender = [];
        let inventory = Array(INVENTORY_SIZE).fill(null).map(() => ({ type: null, count: 0 }));
        let activeSlot = 0;
        let drops = [];
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let canPlace = true;

        // Initialize the game
        init();
        animate();

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Controls setup
            controls = new THREE.PointerLockControls(camera, document.body);
            document.body.addEventListener('click', () => controls.lock());

            // Camera position
            camera.position.set(0, 20, 0);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // Generate initial world
            generateWorldAround(0, 0);

            // Inventory setup
            setupInventory();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown);
        }

        function generateWorldAround(chunkX, chunkZ) {
            // Generate chunks in a 3x3 area around the player
            for (let x = chunkX - 1; x <= chunkX + 1; x++) {
                for (let z = chunkZ - 1; z <= chunkZ + 1; z++) {
                    if (!world[`${x},${z}`]) {
                        generateChunk(x, z);
                    }
                }
            }
        }

        function generateChunk(chunkX, chunkZ) {
            const chunkKey = `${chunkX},${chunkZ}`;
            world[chunkKey] = {};

            const chunk = new THREE.Group();
            chunk.position.set(chunkX * CHUNK_SIZE, 0, chunkZ * CHUNK_SIZE);
            scene.add(chunk);

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    // Generate terrain height (simplex noise would be better but this is simpler)
                    const height = Math.floor(
                        5 + 
                        Math.sin(x * 0.3) * 3 + 
                        Math.cos(z * 0.3) * 3 + 
                        Math.random() * 2
                    );

                    for (let y = 0; y < height; y++) {
                        let blockType;
                        if (y === height - 1) {
                            blockType = BLOCK_TYPES.GRASS;
                        } else if (y > height - 4) {
                            blockType = BLOCK_TYPES.DIRT;
                        } else {
                            blockType = BLOCK_TYPES.STONE;
                        }

                        const block = createBlock(blockType, x, y, z);
                        chunk.add(block);
                        world[chunkKey][`${x},${y},${z}`] = blockType;
                    }
                }
            }

            chunksToRender.push(chunk);
        }

        function createBlock(type, x, y, z) {
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: BLOCK_COLORS[type] });
            const block = new THREE.Mesh(geometry, material);
            block.position.set(x, y, z);
            block.userData = { type, x, y, z };
            return block;
        }

        function setupInventory() {
            const inventoryElement = document.getElementById('inventory');
            
            for (let i = 0; i < INVENTORY_SIZE; i++) {
                const slot = document.createElement('div');
                slot.className = 'inventory-slot';
                slot.dataset.slot = i;
                
                slot.addEventListener('click', () => {
                    activeSlot = i;
                    updateInventoryUI();
                });

                inventoryElement.appendChild(slot);
            }

            // Add some starting items
            inventory[0] = { type: BLOCK_TYPES.GRASS, count: 10 };
            inventory[1] = { type: BLOCK_TYPES.DIRT, count: 10 };
            inventory[2] = { type: BLOCK_TYPES.STONE, count: 10 };
            inventory[3] = { type: BLOCK_TYPES.WOOD, count: 10 };

            updateInventoryUI();
        }

        function updateInventoryUI() {
            const slots = document.querySelectorAll('.inventory-slot');
            slots.forEach((slot, index) => {
                slot.innerHTML = '';
                if (inventory[index] && inventory[index].count > 0) {
                    const block = document.createElement('div');
                    block.style.width = '40px';
                    block.style.height = '40px';
                    block.style.backgroundColor = `#${BLOCK_COLORS[inventory[index].type].toString(16)}`;
                    block.style.border = '1px solid white';
                    
                    const count = document.createElement('div');
                    count.className = 'item-count';
                    count.textContent = inventory[index].count;
                    
                    slot.appendChild(block);
                    slot.appendChild(count);
                }

                if (index === activeSlot) {
                    slot.classList.add('active');
                } else {
                    slot.classList.remove('active');
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onKeyDown(event) {
            if (!controls.isLocked) return;

            // Switch inventory slots with number keys
            if (event.key >= '1' && event.key <= '9') {
                const slotIndex = parseInt(event.key) - 1;
                if (slotIndex < INVENTORY_SIZE) {
                    activeSlot = slotIndex;
                    updateInventoryUI();
                }
            }

            // Jump
            if (event.code === 'Space') {
                // Simple jump (would be better with physics)
                if (isOnGround()) {
                    controls.getObject().position.y += 5;
                }
            }
        }

        function isOnGround() {
            // Simple ground check (not perfect but works for basic jumping)
            const raycaster = new THREE.Raycaster(
                controls.getObject().position, 
                new THREE.Vector3(0, -1, 0), 
                0, 
                1.1
            );
            const intersects = raycaster.intersectObjects(scene.children, true);
            return intersects.length > 0;
        }

        function onMouseMove(event) {
            if (!controls.isLocked) return;

            // Calculate mouse position for raycasting
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onMouseDown(event) {
            if (!controls.isLocked) return;

            // Update the raycaster
            raycaster.setFromCamera(mouse, camera);

            if (event.button === 0) { // Left click - break block
                breakBlock();
            } else if (event.button === 2) { // Right click - place block
                placeBlock();
            }
        }

        function breakBlock() {
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            for (let i = 0; i < intersects.length; i++) {
                const object = intersects[i].object;
                if (object.userData.type !== undefined && object.userData.type !== BLOCK_TYPES.AIR) {
                    // Find the chunk and block position
                    const chunkPos = new THREE.Vector3();
                    object.getWorldPosition(chunkPos);
                    
                    const chunkX = Math.floor(chunkPos.x / CHUNK_SIZE);
                    const chunkZ = Math.floor(chunkPos.z / CHUNK_SIZE);
                    const chunkKey = `${chunkX},${chunkZ}`;
                    
                    const localX = Math.floor(chunkPos.x) % CHUNK_SIZE;
                    const localY = Math.floor(chunkPos.y);
                    const localZ = Math.floor(chunkPos.z) % CHUNK_SIZE;
                    const blockKey = `${localX},${localY},${localZ}`;
                    
                    // Remove from world data
                    if (world[chunkKey] && world[chunkKey][blockKey]) {
                        const blockType = world[chunkKey][blockKey];
                        delete world[chunkKey][blockKey];
                        
                        // Remove from scene
                        object.parent.remove(object);
                        
                        // Create a dropped item
                        createDroppedItem(blockType, chunkPos);
                    }
                    break;
                }
            }
        }

        function placeBlock() {
            if (!canPlace || !inventory[activeSlot] || inventory[activeSlot].count <= 0) return;

            const intersects = raycaster.intersectObjects(scene.children, true);
            
            for (let i = 0; i < intersects.length; i++) {
                const object = intersects[i].object;
                if (object.userData.type !== undefined && object.userData.type !== BLOCK_TYPES.AIR) {
                    // Place block adjacent to the hit face
                    const normal = intersects[i].face.normal;
                    const position = new THREE.Vector3();
                    object.getWorldPosition(position);
                    position.add(normal);
                    
                    // Find the chunk and block position
                    const chunkX = Math.floor(position.x / CHUNK_SIZE);
                    const chunkZ = Math.floor(position.z / CHUNK_SIZE);
                    const chunkKey = `${chunkX},${chunkZ}`;
                    
                    // Create chunk if it doesn't exist
                    if (!world[chunkKey]) {
                        generateChunk(chunkX, chunkZ);
                    }
                    
                    const localX = Math.floor(position.x) % CHUNK_SIZE;
                    const localY = Math.floor(position.y);
                    const localZ = Math.floor(position.z) % CHUNK_SIZE;
                    const blockKey = `${localX},${localY},${localZ}`;
                    
                    // Only place if the block is air
                    if (!world[chunkKey][blockKey] || world[chunkKey][blockKey] === BLOCK_TYPES.AIR) {
                        world[chunkKey][blockKey] = inventory[activeSlot].type;
                        
                        // Add to scene
                        const block = createBlock(inventory[activeSlot].type, localX, localY, localZ);
                        block.position.set(
                            position.x - chunkX * CHUNK_SIZE,
                            position.y,
                            position.z - chunkZ * CHUNK_SIZE
                        );
                        scene.getObjectByName(`chunk_${chunkX}_${chunkZ}`)?.add(block);
                        
                        // Remove from inventory
                        inventory[activeSlot].count--;
                        if (inventory[activeSlot].count <= 0) {
                            inventory[activeSlot].type = null;
                        }
                        updateInventoryUI();
                    }
                    break;
                }
            }
        }

        function createDroppedItem(type, position) {
            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const material = new THREE.MeshStandardMaterial({ color: BLOCK_COLORS[type] });
            const item = new THREE.Mesh(geometry, material);
            item.position.copy(position);
            item.position.y += 0.5; // Raise above ground
            item.userData = { type, velocity: new THREE.Vector3(0, 0, 0) };
            scene.add(item);
            drops.push(item);
        }

        function updateDroppedItems() {
            const playerPos = controls.getObject().position;
            
            for (let i = drops.length - 1; i >= 0; i--) {
                const drop = drops[i];
                
                // Apply gravity
                drop.userData.velocity.y -= 0.1;
                drop.position.add(drop.userData.velocity);
                
                // Collision with ground
                const raycaster = new THREE.Raycaster(drop.position, new THREE.Vector3(0, -1, 0), 0, 0.6);
                const intersects = raycaster.intersectObjects(scene.children, true);
                if (intersects.length > 0) {
                    drop.position.y = intersects[0].point.y + 0.5;
                    drop.userData.velocity.set(0, 0, 0);
                }
                
                // Check if player is close enough to pick up
                const distance = drop.position.distanceTo(playerPos);
                if (distance < 2) {
                    // Find first empty or matching slot
                    let slotIndex = inventory.findIndex(
                        slot => slot && slot.type === drop.userData.type && slot.count < 99
                    );
                    
                    if (slotIndex === -1) {
                        slotIndex = inventory.findIndex(slot => !slot || !slot.type);
                    }
                    
                    if (slotIndex !== -1) {
                        if (!inventory[slotIndex]) {
                            inventory[slotIndex] = { type: drop.userData.type, count: 0 };
                        }
                        inventory[slotIndex].count++;
                        updateInventoryUI();
                    }
                    
                    // Remove from scene and drops array
                    scene.remove(drop);
                    drops.splice(i, 1);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Update controls
            if (controls.isLocked) {
                const delta = 0.1;
                const velocity = new THREE.Vector3();
                
                if (controls.moveForward) velocity.z -= delta;
                if (controls.moveBackward) velocity.z += delta;
                if (controls.moveLeft) velocity.x -= delta;
                if (controls.moveRight) velocity.x += delta;
                
                // Rotate velocity to camera direction
                velocity.applyQuaternion(controls.getObject().quaternion);
                
                // Apply movement
                controls.getObject().position.add(velocity);
                
                // Prevent falling through the ground (simple collision)
                if (controls.getObject().position.y < 1) {
                    controls.getObject().position.y = 1;
                }
                
                // Generate new chunks as player moves
                const chunkX = Math.floor(controls.getObject().position.x / CHUNK_SIZE);
                const chunkZ = Math.floor(controls.getObject().position.z / CHUNK_SIZE);
                generateWorldAround(chunkX, chunkZ);
                
                // Update dropped items
                updateDroppedItems();
            }
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
