<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Voxel Sandbox</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background: #000;
            }
            canvas {
                display: block;
            }
            #inventory {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 5px;
                background: rgba(0, 0, 0, 0.5);
                padding: 10px;
                border-radius: 10px;
                font-family: Arial, sans-serif;
            }
            .slot {
                width: 40px;
                height: 40px;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-radius: 5px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: white;
                font-size: 10px;
            }
            .slot.selected {
                background: rgba(255, 255, 255, 0.3);
            }
            .slot-count {
                position: absolute;
                bottom: 0;
                right: 0;
                font-size: 12px;
            }
            #crosshair {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 20px;
                height: 20px;
                transform: translate(-50%, -50%);
                pointer-events: none;
            }
            #crosshair::before,
            #crosshair::after {
                content: "";
                position: absolute;
                background: white;
            }
            #crosshair::before {
                width: 2px;
                height: 20px;
                left: 9px;
                top: 0;
            }
            #crosshair::after {
                width: 20px;
                height: 2px;
                left: 0;
                top: 9px;
            }
        </style>
    </head>
    <body>
        <canvas id="game"></canvas>
        <div id="inventory"></div>
        <div id="crosshair"></div>

        <script>
            // Game Constants
            const CHUNK_SIZE = 16;
            const CHUNK_HEIGHT = 64;
            const BLOCK_SIZE = 1;
            const GRAVITY = -0.05;
            const PLAYER_HEIGHT = 1.8;
            const PLAYER_WIDTH = 0.6;
            const REACH_DISTANCE = 5;
            const INVENTORY_SIZE = 9;
            const BLOCK_TYPES = {
                AIR: 0,
                GRASS: 1,
                DIRT: 2,
                STONE: 3,
                SAND: 4,
                WOOD: 5,
            };
            const BLOCK_COLORS = {
                0: [0, 0, 0, 0], // AIR (transparent)
                1: [0.2, 0.7, 0.2, 1], // GRASS
                2: [0.4, 0.25, 0.1, 1], // DIRT
                3: [0.5, 0.5, 0.5, 1], // STONE
                4: [0.9, 0.8, 0.3, 1], // SAND
                5: [0.5, 0.3, 0.2, 1], // WOOD
            };
            const BLOCK_NAMES = {
                1: "Grass",
                2: "Dirt",
                3: "Stone",
                4: "Sand",
                5: "Wood",
            };

            // Game State
            const world = {
                chunks: new Map(),
                seed: Math.random() * 1000000,
                generating: new Set(),
            };

            const player = {
                position: [0, CHUNK_HEIGHT * BLOCK_SIZE + 10, 0],
                velocity: [0, 0, 0],
                rotation: [0, 0],
                onGround: false,
                inventory: Array(INVENTORY_SIZE)
                    .fill()
                    .map(() => ({ type: BLOCK_TYPES.AIR, count: 0 })),
                selectedSlot: 0,
            };

            const drops = [];
            let mouseLocked = false;
            let lastTime = 0;

            // WebGL Setup
            const canvas = document.getElementById("game");
            const gl =
                canvas.getContext("webgl") ||
                canvas.getContext("experimental-webgl");
            if (!gl) alert("WebGL not supported in your browser!");

            // Resize canvas
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();

            // Shader Programs
            const blockProgram = createShaderProgram(
                `#version 300 es
            precision highp float;
            in vec3 aPosition;
            in vec3 aColor;
            uniform mat4 uModel;
            uniform mat4 uView;
            uniform mat4 uProjection;
            uniform vec3 uLightDir;
            out vec3 vColor;
            out vec3 vNormal;
            out vec3 vPosition;

            void main() {
                vColor = aColor;
                vNormal = mat3(uModel) * vec3(0.0, 1.0, 0.0); // Simplified normal
                vPosition = vec3(uModel * vec4(aPosition, 1.0));
                gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
            }
            `,
                `#version 300 es
            precision highp float;
            in vec3 vColor;
            in vec3 vNormal;
            in vec3 vPosition;
            uniform vec3 uLightDir;
            uniform vec3 uCameraPos;
            out vec4 fragColor;

            void main() {
                vec3 normal = normalize(vNormal);
                vec3 lightDir = normalize(uLightDir);
                vec3 viewDir = normalize(uCameraPos - vPosition);

                // Diffuse lighting
                float diff = max(dot(normal, lightDir), 0.0);
                vec3 diffuse = diff * vColor;

                // Ambient lighting
                vec3 ambient = 0.2 * vColor;

                // Specular lighting (simplified)
                vec3 reflectDir = reflect(-lightDir, normal);
                float spec = pow(max(dot(viewDir, reflectDir), 0.0), 32.0);
                vec3 specular = vec3(0.3) * spec;

                fragColor = vec4(diffuse + ambient + specular, 1.0);
            }
            `,
            );

            const dropProgram = createShaderProgram(
                `#version 300 es
            precision highp float;
            in vec3 aPosition;
            in vec3 aColor;
            uniform mat4 uModel;
            uniform mat4 uView;
            uniform mat4 uProjection;
            out vec3 vColor;

            void main() {
                vColor = aColor;
                gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
            }
            `,
                `#version 300 es
            precision highp float;
            in vec3 vColor;
            out vec4 fragColor;

            void main() {
                fragColor = vec4(vColor, 1.0);
            }
            `,
            );

            function createShaderProgram(
                vertexShaderSource,
                fragmentShaderSource,
            ) {
                const vertexShader = gl.createShader(gl.VERTEX_SHADER);
                gl.shaderSource(vertexShader, vertexShaderSource);
                gl.compileShader(vertexShader);

                const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
                gl.shaderSource(fragmentShader, fragmentShaderSource);
                gl.compileShader(fragmentShader);

                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);

                if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                    console.error(
                        "Shader program error:",
                        gl.getProgramInfoLog(program),
                    );
                    return null;
                }

                return program;
            }

            // Geometry
            const cubeGeometry = (() => {
                const positions = new Float32Array([
                    // Front face
                    -0.5, -0.5, 0.5, 0.5, -0.5, 0.5, 0.5, 0.5, 0.5, -0.5, 0.5,
                    0.5,

                    // Back face
                    -0.5, -0.5, -0.5, 0.5, -0.5, -0.5, 0.5, 0.5, -0.5, -0.5,
                    0.5, -0.5,

                    // Top face
                    -0.5, 0.5, -0.5, 0.5, 0.5, -0.5, 0.5, 0.5, 0.5, -0.5, 0.5,
                    0.5,

                    // Bottom face
                    -0.5, -0.5, -0.5, 0.5, -0.5, -0.5, 0.5, -0.5, 0.5, -0.5,
                    -0.5, 0.5,

                    // Right face
                    0.5, -0.5, -0.5, 0.5, 0.5, -0.5, 0.5, 0.5, 0.5, 0.5, -0.5,
                    0.5,

                    // Left face
                    -0.5, -0.5, -0.5, -0.5, 0.5, -0.5, -0.5, 0.5, 0.5, -0.5,
                    -0.5, 0.5,
                ]);

                const indices = new Uint16Array([
                    0,
                    1,
                    2,
                    0,
                    2,
                    3, // front
                    4,
                    5,
                    6,
                    4,
                    6,
                    7, // back
                    8,
                    9,
                    10,
                    8,
                    10,
                    11, // top
                    12,
                    13,
                    14,
                    12,
                    14,
                    15, // bottom
                    16,
                    17,
                    18,
                    16,
                    18,
                    19, // right
                    20,
                    21,
                    22,
                    20,
                    22,
                    23, // left
                ]);

                return { positions, indices };
            })();

            // Chunk Management
            function getChunkKey(x, z) {
                return `${Math.floor(x / CHUNK_SIZE)},${Math.floor(z / CHUNK_SIZE)}`;
            }

            function getChunk(x, z) {
                const key = getChunkKey(x, z);
                if (!world.chunks.has(key)) {
                    generateChunk(
                        Math.floor(x / CHUNK_SIZE) * CHUNK_SIZE,
                        Math.floor(z / CHUNK_SIZE),
                    );
                }
                return world.chunks.get(key);
            }

            function generateChunk(chunkX, chunkZ) {
                const key = getChunkKey(chunkX, chunkZ);
                if (world.chunks.has(key) || world.generating.has(key)) return;

                world.generating.add(key);

                setTimeout(() => {
                    const noiseScale = 0.1;
                    const blocks = new Uint8Array(
                        CHUNK_SIZE * CHUNK_HEIGHT * CHUNK_SIZE,
                    );

                    for (let x = 0; x < CHUNK_SIZE; x++) {
                        for (let z = 0; z < CHUNK_SIZE; z++) {
                            // Simple noise for height
                            const height = Math.floor(
                                Math.pow(
                                    Math.abs(
                                        noise2D(
                                            (chunkX + x) * noiseScale,
                                            (chunkZ + z) * noiseScale,
                                            world.seed,
                                        ),
                                    ),
                                    0.5,
                                ) *
                                    (CHUNK_HEIGHT - 10) +
                                    10,
                            );

                            // Surface layer (grass)
                            if (height > 0) {
                                blocks[
                                    x * CHUNK_SIZE * CHUNK_HEIGHT +
                                        height * CHUNK_SIZE +
                                        z
                                ] = BLOCK_TYPES.GRASS;

                                // Dirt layers below
                                for (
                                    let y = height - 1;
                                    y > Math.max(0, height - 4);
                                    y--
                                ) {
                                    blocks[
                                        x * CHUNK_SIZE * CHUNK_HEIGHT +
                                            y * CHUNK_SIZE +
                                            z
                                    ] = BLOCK_TYPES.DIRT;
                                }

                                // Stone below dirt
                                for (
                                    let y = Math.max(0, height - 4);
                                    y >= 0;
                                    y--
                                ) {
                                    blocks[
                                        x * CHUNK_SIZE * CHUNK_HEIGHT +
                                            y * CHUNK_SIZE +
                                            z
                                    ] = BLOCK_TYPES.STONE;
                                }
                            }
                        }
                    }

                    world.chunks.set(key, {
                        x: chunkX,
                        z: chunkZ,
                        blocks,
                        buffers: createChunkBuffers(blocks),
                        needsUpdate: true,
                    });

                    world.generating.delete(key);
                }, 0);
            }

            function createChunkBuffers(blocks) {
                const positions = [];
                const colors = [];
                const indices = [];

                for (let x = 0; x < CHUNK_SIZE; x++) {
                    for (let y = 0; y < CHUNK_HEIGHT; y++) {
                        for (let z = 0; z < CHUNK_SIZE; z++) {
                            const blockType =
                                blocks[
                                    x * CHUNK_SIZE * CHUNK_HEIGHT +
                                        y * CHUNK_SIZE +
                                        z
                                ];
                            if (blockType === BLOCK_TYPES.AIR) continue;

                            const color = BLOCK_COLORS[blockType] || [
                                1, 1, 1, 1,
                            ];

                            // Check each face
                            for (let face = 0; face < 6; face++) {
                                const nx =
                                    x + (face === 4 ? 1 : face === 5 ? -1 : 0);
                                const ny =
                                    y + (face === 2 ? 1 : face === 3 ? -1 : 0);
                                const nz =
                                    z + (face === 0 ? 1 : face === 1 ? -1 : 0);

                                // Skip face if neighbor is not air
                                if (
                                    nx >= 0 &&
                                    nx < CHUNK_SIZE &&
                                    ny >= 0 &&
                                    ny < CHUNK_HEIGHT &&
                                    nz >= 0 &&
                                    nz < CHUNK_SIZE
                                ) {
                                    const neighborType =
                                        blocks[
                                            nx * CHUNK_SIZE * CHUNK_HEIGHT +
                                                ny * CHUNK_SIZE +
                                                nz
                                        ];
                                    if (neighborType !== BLOCK_TYPES.AIR)
                                        continue;
                                }

                                // Add face vertices
                                const offset = face * 4;
                                const baseIndex = indices.length / 3;

                                for (let i = 0; i < 4; i++) {
                                    const vx =
                                        cubeGeometry.positions[
                                            offset * 3 + i * 3
                                        ];
                                    const vy =
                                        cubeGeometry.positions[
                                            offset * 3 + i * 3 + 1
                                        ];
                                    const vz =
                                        cubeGeometry.positions[
                                            offset * 3 + i * 3 + 2
                                        ];

                                    positions.push(
                                        (x + vx + 0.5) * BLOCK_SIZE,
                                        (y + vy + 0.5) * BLOCK_SIZE,
                                        (z + vz + 0.5) * BLOCK_SIZE,
                                    );

                                    colors.push(...color.slice(0, 3)); // RGB, skip alpha
                                }

                                // Add face indices
                                indices.push(
                                    baseIndex,
                                    baseIndex + 1,
                                    baseIndex + 2,
                                    baseIndex,
                                    baseIndex + 2,
                                    baseIndex + 3,
                                );
                            }
                        }
                    }
                }

                if (positions.length === 0) return null;

                const positionBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                gl.bufferData(
                    gl.ARRAY_BUFFER,
                    new Float32Array(positions),
                    gl.STATIC_DRAW,
                );

                const colorBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
                gl.bufferData(
                    gl.ARRAY_BUFFER,
                    new Float32Array(colors),
                    gl.STATIC_DRAW,
                );

                const indexBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
                gl.bufferData(
                    gl.ELEMENT_ARRAY_BUFFER,
                    new Uint16Array(indices),
                    gl.STATIC_DRAW,
                );

                return {
                    position: positionBuffer,
                    color: colorBuffer,
                    indices: indexBuffer,
                    vertexCount: indices.length,
                };
            }

            function updateChunkBuffers(chunk) {
                if (chunk.buffers) {
                    gl.deleteBuffer(chunk.buffers.position);
                    gl.deleteBuffer(chunk.buffers.color);
                    gl.deleteBuffer(chunk.buffers.indices);
                }
                chunk.buffers = createChunkBuffers(chunk.blocks);
            }

            // Noise functions for terrain generation
            function noise2D(x, y, seed) {
                let n = x + y * 57 + seed * 131;
                n = (n << 13) ^ n;
                return (
                    1.0 -
                    ((n * (n * n * 15731 + 789221) + 1376312589) & 0x7fffffff) /
                        1073741824.0
                );
            }

            // Drop Management
            function createDrop(x, y, z, blockType) {
                drops.push({
                    position: [x, y, z],
                    velocity: [0, 0.1, 0],
                    rotation: [0, 0, 0],
                    spin: [
                        Math.random() * 0.1 - 0.05,
                        Math.random() * 0.1 - 0.05,
                        Math.random() * 0.1 - 0.05,
                    ],
                    blockType,
                    lifeTime: 0,
                    collected: false,
                });
            }

            function updateDrops(deltaTime) {
                for (let i = drops.length - 1; i >= 0; i--) {
                    const drop = drops[i];
                    if (drop.collected) {
                        drops.splice(i, 1);
                        continue;
                    }

                    // Apply gravity
                    drop.velocity[1] += GRAVITY * deltaTime * 60;

                    // Update position
                    drop.position[0] += drop.velocity[0] * deltaTime * 60;
                    drop.position[1] += drop.velocity[1] * deltaTime * 60;
                    drop.position[2] += drop.velocity[2] * deltaTime * 60;

                    // Update rotation
                    drop.rotation[0] += drop.spin[0] * deltaTime * 60;
                    drop.rotation[1] += drop.spin[1] * deltaTime * 60;
                    drop.rotation[2] += drop.spin[2] * deltaTime * 60;

                    // Check for collision with player
                    const dx = drop.position[0] - player.position[0];
                    const dy = drop.position[1] - player.position[1];
                    const dz = drop.position[2] - player.position[2];
                    const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);

                    if (distance < 2) {
                        // Add to inventory
                        let found = false;
                        for (let j = 0; j < player.inventory.length; j++) {
                            if (player.inventory[j].type === drop.blockType) {
                                player.inventory[j].count++;
                                found = true;
                                break;
                            }
                        }

                        if (!found) {
                            for (let j = 0; j < player.inventory.length; j++) {
                                if (
                                    player.inventory[j].type === BLOCK_TYPES.AIR
                                ) {
                                    player.inventory[j] = {
                                        type: drop.blockType,
                                        count: 1,
                                    };
                                    found = true;
                                    break;
                                }
                            }
                        }

                        if (found) {
                            drop.collected = true;
                        }
                    }

                    // Simple ground collision
                    if (drop.position[1] <= 0) {
                        drop.position[1] = 0;
                        drop.velocity[1] *= -0.5; // Bounce a little
                    }

                    drop.lifeTime += deltaTime;
                    if (drop.lifeTime > 30) {
                        // Despawn after 30 seconds
                        drops.splice(i, 1);
                    }
                }
            }

            // Player Movement
            function updatePlayer(deltaTime) {
                // Movement
                const moveSpeed = player.onGround ? 0.1 : 0.05;
                const rotY = player.rotation[1];

                if (keys["KeyW"] || keys["ArrowUp"]) {
                    player.velocity[0] -= Math.sin(rotY) * moveSpeed;
                    player.velocity[2] -= Math.cos(rotY) * moveSpeed;
                }
                if (keys["KeyS"] || keys["ArrowDown"]) {
                    player.velocity[0] += Math.sin(rotY) * moveSpeed;
                    player.velocity[2] += Math.cos(rotY) * moveSpeed;
                }
                if (keys["KeyA"] || keys["ArrowLeft"]) {
                    player.velocity[0] -= Math.cos(rotY) * moveSpeed;
                    player.velocity[2] += Math.sin(rotY) * moveSpeed;
                }
                if (keys["KeyD"] || keys["ArrowRight"]) {
                    player.velocity[0] += Math.cos(rotY) * moveSpeed;
                    player.velocity[2] -= Math.sin(rotY) * moveSpeed;
                }

                // Jumping
                if (player.onGround && (keys["Space"] || keys[" "])) {
                    player.velocity[1] = 0.1;
                    player.onGround = false;
                }

                // Apply gravity
                player.velocity[1] += GRAVITY * deltaTime * 60;

                // Update position
                const prevPosition = [...player.position];
                player.position[0] += player.velocity[0] * deltaTime * 60;
                player.position[1] += player.velocity[1] * deltaTime * 60;
                player.position[2] += player.velocity[2] * deltaTime * 60;

                // Collision detection
                player.onGround = false;

                const playerMinX = player.position[0] - PLAYER_WIDTH / 2;
                const playerMaxX = player.position[0] + PLAYER_WIDTH / 2;
                const playerMinZ = player.position[2] - PLAYER_WIDTH / 2;
                const playerMaxZ = player.position[2] + PLAYER_WIDTH / 2;
                const playerMinY = player.position[1];
                const playerMaxY = player.position[1] + PLAYER_HEIGHT;

                for (
                    let x = Math.floor(playerMinX);
                    x <= Math.ceil(playerMaxX);
                    x++
                ) {
                    for (
                        let y = Math.floor(playerMinY);
                        y <= Math.ceil(playerMaxY);
                        y++
                    ) {
                        for (
                            let z = Math.floor(playerMinZ);
                            z <= Math.ceil(playerMaxZ);
                            z++
                        ) {
                            const blockType = getBlockAt(x, y, z);
                            if (blockType === BLOCK_TYPES.AIR) continue;

                            // Calculate overlap
                            const blockMinX = x;
                            const blockMaxX = x + 1;
                            const blockMinY = y;
                            const blockMaxY = y + 1;
                            const blockMinZ = z;
                            const blockMaxZ = z + 1;

                            const overlapX =
                                Math.min(playerMaxX, blockMaxX) -
                                Math.max(playerMinX, blockMinX);
                            const overlapY =
                                Math.min(playerMaxY, blockMaxY) -
                                Math.max(playerMinY, blockMinY);
                            const overlapZ =
                                Math.min(playerMaxZ, blockMaxZ) -
                                Math.max(playerMinZ, blockMinZ);

                            if (overlapX > 0 && overlapY > 0 && overlapZ > 0) {
                                // Resolve collision
                                const minOverlap = Math.min(
                                    overlapX,
                                    overlapY,
                                    overlapZ,
                                );

                                if (minOverlap === overlapX) {
                                    if (player.position[0] < x + 0.5) {
                                        player.position[0] =
                                            blockMinX - PLAYER_WIDTH / 2;
                                    } else {
                                        player.position[0] =
                                            blockMaxX + PLAYER_WIDTH / 2;
                                    }
                                    player.velocity[0] = 0;
                                }

                                if (minOverlap === overlapY) {
                                    if (player.velocity[1] <= 0) {
                                        player.position[1] = blockMaxY;
                                        player.onGround = true;
                                    } else {
                                        player.position[1] =
                                            blockMinY - PLAYER_HEIGHT;
                                    }
                                    player.velocity[1] = 0;
                                }

                                if (minOverlap === overlapZ) {
                                    if (player.position[2] < z + 0.5) {
                                        player.position[2] =
                                            blockMinZ - PLAYER_WIDTH / 2;
                                    } else {
                                        player.position[2] =
                                            blockMaxZ + PLAYER_WIDTH / 2;
                                    }
                                    player.velocity[2] = 0;
                                }
                            }
                        }
                    }
                }

                // Damping
                player.velocity[0] *= 0.8;
                player.velocity[2] *= 0.8;

                // Chunk loading/unloading
                const playerChunkX = Math.floor(
                    player.position[0] / CHUNK_SIZE,
                );
                const playerChunkZ = Math.floor(
                    player.position[2] / CHUNK_SIZE,
                );

                for (let x = playerChunkX - 2; x <= playerChunkX + 2; x++) {
                    for (let z = playerChunkZ - 2; z <= playerChunkZ + 2; z++) {
                        getChunk(x * CHUNK_SIZE, z * CHUNK_SIZE);
                    }
                }
            }

            // Block Interaction
            function getBlockAt(x, y, z) {
                if (y < 0 || y >= CHUNK_HEIGHT) return BLOCK_TYPES.AIR;

                const chunkX = Math.floor(x / CHUNK_SIZE) * CHUNK_SIZE;
                const chunkZ = Math.floor(z / CHUNK_SIZE) * CHUNK_SIZE;
                const chunk = getChunk(chunkX, chunkZ);

                if (!chunk) return BLOCK_TYPES.AIR;

                const localX = Math.floor(x) - chunkX;
                const localZ = Math.floor(z) - chunkZ;

                if (
                    localX < 0 ||
                    localX >= CHUNK_SIZE ||
                    localZ < 0 ||
                    localZ >= CHUNK_SIZE
                ) {
                    return BLOCK_TYPES.AIR;
                }

                return chunk.blocks[
                    localX * CHUNK_SIZE * CHUNK_HEIGHT +
                        Math.floor(y) * CHUNK_SIZE +
                        localZ
                ];
            }

            function setBlockAt(x, y, z, blockType) {
                if (y < 0 || y >= CHUNK_HEIGHT) return;

                const chunkX = Math.floor(x / CHUNK_SIZE) * CHUNK_SIZE;
                const chunkZ = Math.floor(z / CHUNK_SIZE) * CHUNK_SIZE;
                const chunk = getChunk(chunkX, chunkZ);

                if (!chunk) return;

                const localX = Math.floor(x) - chunkX;
                const localZ = Math.floor(z) - chunkZ;

                if (
                    localX < 0 ||
                    localX >= CHUNK_SIZE ||
                    localZ < 0 ||
                    localZ >= CHUNK_SIZE
                ) {
                    return;
                }

                chunk.blocks[
                    localX * CHUNK_SIZE * CHUNK_HEIGHT +
                        Math.floor(y) * CHUNK_SIZE +
                        localZ
                ] = blockType;
                chunk.needsUpdate = true;
            }

            function breakBlock(x, y, z) {
                const blockType = getBlockAt(x, y, z);
                if (blockType === BLOCK_TYPES.AIR) return;

                setBlockAt(x, y, z, BLOCK_TYPES.AIR);

                // Create drop
                createDrop(x + 0.5, y + 0.5, z + 0.5, blockType);

                // Play sound (simulated)
                console.log(
                    "Block broken:",
                    BLOCK_NAMES[blockType] || "Unknown",
                );
            }

            function placeBlock(x, y, z) {
                const selectedBlock =
                    player.inventory[player.selectedSlot].type;
                if (selectedBlock === BLOCK_TYPES.AIR) return;

                const blockType = getBlockAt(x, y, z);
                if (blockType !== BLOCK_TYPES.AIR) return;

                setBlockAt(x, y, z, selectedBlock);

                // Remove from inventory
                player.inventory[player.selectedSlot].count--;
                if (player.inventory[player.selectedSlot].count <= 0) {
                    player.inventory[player.selectedSlot] = {
                        type: BLOCK_TYPES.AIR,
                        count: 0,
                    };
                }

                // Play sound (simulated)
                console.log(
                    "Block placed:",
                    BLOCK_NAMES[selectedBlock] || "Unknown",
                );
            }

            // Inventory UI
            function updateInventoryUI() {
                const inventoryDiv = document.getElementById("inventory");
                inventoryDiv.innerHTML = "";

                for (let i = 0; i < player.inventory.length; i++) {
                    const slot = player.inventory[i];
                    const slotDiv = document.createElement("div");
                    slotDiv.className =
                        "slot" + (i === player.selectedSlot ? " selected" : "");

                    const blockName = BLOCK_NAMES[slot.type] || "Empty";
                    const color = BLOCK_COLORS[slot.type] || [0.3, 0.3, 0.3, 1];

                    slotDiv.style.backgroundColor = `rgba(${color[0] * 255}, ${color[1] * 255}, ${color[2] * 255}, ${color[3]})`;

                    const countDiv = document.createElement("div");
                    countDiv.className = "slot-count";
                    countDiv.textContent = slot.count > 0 ? slot.count : "";
                    slotDiv.appendChild(countDiv);

                    slotDiv.addEventListener("click", () => {
                        player.selectedSlot = i;
                        updateInventoryUI();
                    });

                    inventoryDiv.appendChild(slotDiv);
                }
            }

            // Input Handling
            const keys = {};
            window.addEventListener("keydown", (e) => {
                keys[e.code] = true;

                // Slot selection
                if (e.key >= "1" && e.key <= "9") {
                    const slotIndex = parseInt(e.key) - 1;
                    if (slotIndex < INVENTORY_SIZE) {
                        player.selectedSlot = slotIndex;
                        updateInventoryUI();
                    }
                }

                // Escape to show cursor
                if (e.code === "Escape") {
                    if (mouseLocked) {
                        document.exitPointerLock();
                        mouseLocked = false;
                    } else {
                        canvas.requestPointerLock();
                        mouseLocked = true;
                    }
                }
            });

            window.addEventListener("keyup", (e) => {
                keys[e.code] = false;
            });

            const mouse = { x: 0, y: 0, movementX: 0, movementY: 0 };
            canvas.addEventListener("mousemove", (e) => {
                if (!mouseLocked) return;

                mouse.movementX = e.movementX;
                mouse.movementY = e.movementY;

                // Update player rotation
                player.rotation[0] -= mouse.movementY * 0.002;
                player.rotation[1] -= mouse.movementX * 0.002;

                // Clamp pitch to avoid over-rotation
                player.rotation[0] = Math.max(
                    -Math.PI / 2,
                    Math.min(Math.PI / 2, player.rotation[0]),
                );

                mouse.movementX = 0;
                mouse.movementY = 0;
            });

            canvas.addEventListener("click", (e) => {
                if (!mouseLocked) {
                    canvas.requestPointerLock();
                    mouseLocked = true;
                    return;
                }

                // Ray casting for block interaction
                const { x: px, y: py, z: pz } = player.position;
                const { x: rx, y: ry } = player.rotation;

                const dx = Math.sin(-rx) * Math.cos(ry);
                const dy = Math.sin(ry);
                const dz = Math.cos(-rx) * Math.cos(ry);

                let distance = 0;
                while (distance < REACH_DISTANCE) {
                    const testX = Math.floor(px + dx * distance);
                    const testY = Math.floor(py + dy * distance);
                    const testZ = Math.floor(pz + dz * distance);

                    const blockType = getBlockAt(testX, testY, testZ);
                    if (blockType !== BLOCK_TYPES.AIR) {
                        if (e.button === 0) {
                            // Left click - break
                            breakBlock(testX, testY, testZ);
                        } else if (e.button === 2) {
                            // Right click - place
                            // Find adjacent empty space
                            const placeX = testX + Math.round(dx);
                            const placeY = testY + Math.round(dy);
                            const placeZ = testZ + Math.round(dz);

                            if (
                                getBlockAt(placeX, placeY, placeZ) ===
                                BLOCK_TYPES.AIR
                            ) {
                                placeBlock(placeX, placeY, placeZ);
                            }
                        }
                        return;
                    }

                    distance += 0.1;
                }
            });

            // Prevent right-click menu
            canvas.addEventListener("contextmenu", (e) => e.preventDefault());

            // Game Loop
            function render(time) {
                const deltaTime = Math.min((time - lastTime) / 1000, 0.1);
                lastTime = time;

                // Update game state
                updatePlayer(deltaTime);
                updateDrops(deltaTime);
                updateInventoryUI();

                // Update chunks
                for (const [key, chunk] of world.chunks) {
                    if (chunk.needsUpdate) {
                        updateChunkBuffers(chunk);
                        chunk.needsUpdate = false;
                    }
                }

                // Clear screen
                gl.clearColor(0.53, 0.81, 0.92, 1.0);
                gl.clearDepth(1.0);
                gl.enable(gl.DEPTH_TEST);
                gl.depthFunc(gl.LEQUAL);
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

                // Camera matrices
                const aspect = canvas.width / canvas.height;
                const projectionMatrix = mat4.create();
                mat4.perspective(
                    projectionMatrix,
                    (75 * Math.PI) / 180,
                    aspect,
                    0.1,
                    1000,
                );

                const viewMatrix = mat4.create();
                mat4.translate(viewMatrix, viewMatrix, player.position);
                mat4.rotateX(viewMatrix, viewMatrix, player.rotation[0]);
                mat4.rotateY(viewMatrix, viewMatrix, player.rotation[1]);

                const lightDir = vec3.fromValues(0.5, -1, 0.5);
                vec3.normalize(lightDir, lightDir);

                // Render blocks
                gl.useProgram(blockProgram);
                gl.uniformMatrix4fv(
                    gl.getUniformLocation(blockProgram, "uProjection"),
                    false,
                    projectionMatrix,
                );
                gl.uniformMatrix4fv(
                    gl.getUniformLocation(blockProgram, "uView"),
                    false,
                    viewMatrix,
                );
                gl.uniform3fv(
                    gl.getUniformLocation(blockProgram, "uLightDir"),
                    lightDir,
                );
                gl.uniform3fv(
                    gl.getUniformLocation(blockProgram, "uCameraPos"),
                    player.position,
                );

                for (const [key, chunk] of world.chunks) {
                    if (!chunk.buffers) continue;

                    const modelMatrix = mat4.create();
                    mat4.translate(modelMatrix, modelMatrix, [
                        chunk.x,
                        0,
                        chunk.z,
                    ]);
                    mat4.scale(modelMatrix, modelMatrix, [1, 1, 1]);

                    gl.uniformMatrix4fv(
                        gl.getUniformLocation(blockProgram, "uModel"),
                        false,
                        modelMatrix,
                    );

                    const positionAttributeLocation = gl.getAttribLocation(
                        blockProgram,
                        "aPosition",
                    );
                    gl.enableVertexAttribArray(positionAttributeLocation);
                    gl.bindBuffer(gl.ARRAY_BUFFER, chunk.buffers.position);
                    gl.vertexAttribPointer(
                        positionAttributeLocation,
                        3,
                        gl.FLOAT,
                        false,
                        0,
                        0,
                    );

                    const colorAttributeLocation = gl.getAttribLocation(
                        blockProgram,
                        "aColor",
                    );
                    gl.enableVertexAttribArray(colorAttributeLocation);
                    gl.bindBuffer(gl.ARRAY_BUFFER, chunk.buffers.color);
                    gl.vertexAttribPointer(
                        colorAttributeLocation,
                        3,
                        gl.FLOAT,
                        false,
                        0,
                        0,
                    );

                    gl.bindBuffer(
                        gl.ELEMENT_ARRAY_BUFFER,
                        chunk.buffers.indices,
                    );
                    gl.drawElements(
                        gl.TRIANGLES,
                        chunk.buffers.vertexCount,
                        gl.UNSIGNED_SHORT,
                        0,
                    );
                }

                // Render drops
                gl.useProgram(dropProgram);
                gl.uniformMatrix4fv(
                    gl.getUniformLocation(dropProgram, "uProjection"),
                    false,
                    projectionMatrix,
                );
                gl.uniformMatrix4fv(
                    gl.getUniformLocation(dropProgram, "uView"),
                    false,
                    viewMatrix,
                );

                const positionAttributeLocation = gl.getAttribLocation(
                    dropProgram,
                    "aPosition",
                );
                gl.enableVertexAttribArray(positionAttributeLocation);

                const colorAttributeLocation = gl.getAttribLocation(
                    dropProgram,
                    "aColor",
                );
                gl.enableVertexAttribArray(colorAttributeLocation);

                for (const drop of drops) {
                    const modelMatrix = mat4.create();
                    mat4.translate(modelMatrix, modelMatrix, drop.position);
                    mat4.rotateX(modelMatrix, modelMatrix, drop.rotation[0]);
                    mat4.rotateY(modelMatrix, modelMatrix, drop.rotation[1]);
                    mat4.rotateZ(modelMatrix, modelMatrix, drop.rotation[2]);
                    mat4.scale(modelMatrix, modelMatrix, [0.3, 0.3, 0.3]);

                    gl.uniformMatrix4fv(
                        gl.getUniformLocation(dropProgram, "uModel"),
                        false,
                        modelMatrix,
                    );

                    // Create a simple cube for the drop
                    gl.bindBuffer(gl.ARRAY_BUFFER, null);
                    gl.bufferData(
                        gl.ARRAY_BUFFER,
                        cubeGeometry.positions,
                        gl.STATIC_DRAW,
                    );
                    gl.vertexAttribPointer(
                        positionAttributeLocation,
                        3,
                        gl.FLOAT,
                        false,
                        0,
                        0,
                    );

                    const color = BLOCK_COLORS[drop.blockType] || [1, 1, 1, 1];
                    const dropColors = new Float32Array(
                        (cubeGeometry.positions.length / 3) * 3,
                    );
                    for (let i = 0; i < dropColors.length / 3; i++) {
                        dropColors[i * 3] = color[0];
                        dropColors[i * 3 + 1] = color[1];
                        dropColors[i * 3 + 2] = color[2];
                    }

                    gl.bindBuffer(gl.ARRAY_BUFFER, colorAttributeLocation);
                    gl.bufferData(gl.ARRAY_BUFFER, dropColors, gl.STATIC_DRAW);
                    gl.vertexAttribPointer(
                        colorAttributeLocation,
                        3,
                        gl.FLOAT,
                        false,
                        0,
                        0,
                    );

                    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, null);
                    gl.bufferData(
                        gl.ELEMENT_ARRAY_BUFFER,
                        cubeGeometry.indices,
                        gl.STATIC_DRAW,
                    );

                    gl.drawElements(
                        gl.TRIANGLES,
                        cubeGeometry.indices.length,
                        gl.UNSIGNED_SHORT,
                        0,
                    );
                }

                requestAnimationFrame(render);
            }

            // Initialize game
            updateInventoryUI();

            // Start with some blocks in inventory
            player.inventory[0] = { type: BLOCK_TYPES.GRASS, count: 10 };
            player.inventory[1] = { type: BLOCK_TYPES.DIRT, count: 10 };
            player.inventory[2] = { type: BLOCK_TYPES.STONE, count: 10 };
            player.inventory[3] = { type: BLOCK_TYPES.SAND, count: 10 };
            player.inventory[4] = { type: BLOCK_TYPES.WOOD, count: 10 };

            // Pre-generate initial chunks
            for (let x = -2; x <= 2; x++) {
                for (let z = -2; z <= 2; z++) {
                    generateChunk(x * CHUNK_SIZE, z * CHUNK_SIZE);
                }
            }

            // Start game loop
            requestAnimationFrame(render);

            // Lock cursor initially
            canvas.requestPointerLock();
            mouseLocked = true;
        </script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    </body>
