<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Browser Voxel Sandbox</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                user-select: none;
            }
            #crosshair {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 20px;
                height: 20px;
                background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M10 0v20M0 10h20" stroke="white" stroke-width="2"/></svg>');
                transform: translate(-50%, -50%);
                pointer-events: none;
                mix-blend-mode: difference;
            }
            #ui-layer {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 10px;
                background: rgba(0, 0, 0, 0.5);
                padding: 10px;
                border-radius: 8px;
            }
            .slot {
                width: 50px;
                height: 50px;
                background: rgba(255, 255, 255, 0.1);
                border: 2px solid #555;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 12px;
                position: relative;
            }
            .slot.active {
                border-color: #ffd700;
                background: rgba(255, 215, 0, 0.2);
            }
            .slot-count {
                position: absolute;
                bottom: 2px;
                right: 4px;
                font-weight: bold;
            }
            #block-preview {
                width: 20px;
                height: 20px;
                margin-bottom: 5px;
                border: 1px solid #000;
            }
            #instructions {
                position: absolute;
                top: 10px;
                left: 10px;
                color: white;
                background: rgba(0, 0, 0, 0.5);
                padding: 10px;
                border-radius: 5px;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <!-- UI Elements -->
        <div id="crosshair"></div>
        <div id="instructions">
            <b>Voxel Sandbox</b><br />
            Click to Start<br />
            WASD: Move | SPACE: Jump<br />
            LMB: Mine | RMB: Build<br />
            1-4: Select Block
        </div>
        <div id="ui-layer">
            <!-- Generated by JS -->
        </div>

        <!-- Game Script -->
        <script type="module">
            import * as THREE from "https://unpkg.com/three@0.158.0/build/three.module.js";
            import { PointerLockControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/PointerLockControls.js";

            // --- CONFIGURATION ---
            const CHUNK_SIZE = 16;
            const WORLD_HEIGHT = 32;
            const BLOCK_TYPES = {
                1: { name: "Grass", color: 0x55aa55 },
                2: { name: "Dirt", color: 0x8b4513 },
                3: { name: "Stone", color: 0x888888 },
                4: { name: "Wood", color: 0x5c4033 },
            };

            // --- GLOBALS ---
            let camera, scene, renderer, controls;
            let raycaster;
            const chunks = new Map(); // "x,z" -> mesh data
            const items = []; // Dropped items
            const inventory = { 1: 0, 2: 0, 3: 0, 4: 0 };
            let selectedBlock = 1;

            // Player Physics
            const player = {
                height: 1.8,
                speed: 5.0,
                velocity: new THREE.Vector3(),
                direction: new THREE.Vector3(),
                onGround: false,
                radius: 0.3,
            };

            const moveState = {
                forward: false,
                backward: false,
                left: false,
                right: false,
            };
            let prevTime = performance.now();

            // --- INIT ---
            init();
            animate();

            function init() {
                // Scene Setup
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87ceeb); // Sky blue
                scene.fog = new THREE.Fog(0x87ceeb, 10, 50);

                // Camera
                camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000,
                );
                camera.position.y = 10;

                // Lights
                const hemiLight = new THREE.HemisphereLight(
                    0xffffff,
                    0x444444,
                    0.8,
                );
                scene.add(hemiLight);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(10, 20, 10);
                scene.add(dirLight);

                // Renderer
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // Controls
                controls = new PointerLockControls(camera, document.body);
                const blocker = document.getElementById("instructions");

                document.addEventListener("click", () => controls.lock());
                controls.addEventListener(
                    "lock",
                    () => (blocker.style.display = "none"),
                );
                controls.addEventListener(
                    "unlock",
                    () => (blocker.style.display = "block"),
                );

                // Input Listeners
                document.addEventListener("keydown", onKeyDown);
                document.addEventListener("keyup", onKeyUp);
                document.addEventListener("mousedown", onMouseDown);
                window.addEventListener("resize", onWindowResize);

                // Raycaster for interaction
                raycaster = new THREE.Raycaster();

                // Init UI
                initUI();
            }

            // --- WORLD GENERATION ---

            // Simple pseudo-random noise for terrain
            function getHeight(x, z) {
                const sin = Math.sin(x * 0.1) * Math.cos(z * 0.1) * 4;
                const sin2 = Math.sin(x * 0.03) * Math.cos(z * 0.03) * 8;
                return Math.floor(10 + sin + sin2); // Base height ~10
            }

            function getChunkKey(cx, cz) {
                return `${cx},${cz}`;
            }

            function updateChunks() {
                const playerChunkX = Math.floor(camera.position.x / CHUNK_SIZE);
                const playerChunkZ = Math.floor(camera.position.z / CHUNK_SIZE);
                const renderDist = 2; // Radius of chunks to load

                // Load chunks around player
                for (
                    let x = playerChunkX - renderDist;
                    x <= playerChunkX + renderDist;
                    x++
                ) {
                    for (
                        let z = playerChunkZ - renderDist;
                        z <= playerChunkZ + renderDist;
                        z++
                    ) {
                        const key = getChunkKey(x, z);
                        if (!chunks.has(key)) {
                            generateChunk(x, z);
                        }
                    }
                }

                // Cleanup far chunks (simple optimization)
                for (const [key, chunk] of chunks) {
                    const [cx, cz] = key.split(",").map(Number);
                    if (
                        Math.abs(cx - playerChunkX) > renderDist + 1 ||
                        Math.abs(cz - playerChunkZ) > renderDist + 1
                    ) {
                        scene.remove(chunk.mesh);
                        chunks.delete(key);
                    }
                }
            }

            function generateChunk(cx, cz) {
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshLambertMaterial({
                    color: 0xffffff,
                });

                // We use InstancedMesh for performance within a chunk
                // Max instances = chunk volume
                const maxInstances = CHUNK_SIZE * WORLD_HEIGHT * CHUNK_SIZE;
                const mesh = new THREE.InstancedMesh(
                    geometry,
                    material,
                    maxInstances,
                );
                mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

                const dummy = new THREE.Object3D();
                let count = 0;

                // Store voxel data in a map for physics/access: "x,y,z" -> type
                const voxelData = new Map();

                const startX = cx * CHUNK_SIZE;
                const startZ = cz * CHUNK_SIZE;

                for (let x = 0; x < CHUNK_SIZE; x++) {
                    for (let z = 0; z < CHUNK_SIZE; z++) {
                        const worldX = startX + x;
                        const worldZ = startZ + z;
                        const height = getHeight(worldX, worldZ);

                        for (let y = 0; y < WORLD_HEIGHT; y++) {
                            let type = 0;
                            if (y < height - 3)
                                type = 3; // Stone
                            else if (y < height)
                                type = 2; // Dirt
                            else if (y === height) type = 1; // Grass

                            if (type > 0) {
                                dummy.position.set(worldX, y, worldZ);
                                dummy.updateMatrix();
                                mesh.setMatrixAt(count, dummy.matrix);

                                // Set color
                                mesh.setColorAt(
                                    count,
                                    new THREE.Color(BLOCK_TYPES[type].color),
                                );

                                voxelData.set(`${worldX},${y},${worldZ}`, type);
                                count++;
                            }
                        }
                    }
                }

                mesh.count = count;
                mesh.instanceMatrix.needsUpdate = true;
                mesh.instanceColor.needsUpdate = true;

                // Custom property to store voxel data for this chunk
                mesh.userData = { voxelData: voxelData, cx, cz };

                scene.add(mesh);
                chunks.set(getChunkKey(cx, cz), { mesh, voxelData });
            }

            // --- PHYSICS & PLAYER MOVEMENT ---

            function checkCollision(x, y, z) {
                // Convert world pos to chunk key
                const cx = Math.floor(x / CHUNK_SIZE);
                const cz = Math.floor(z / CHUNK_SIZE);
                const chunk = chunks.get(getChunkKey(cx, cz));

                if (!chunk) return false; // Void / unloaded

                return chunk.voxelData.has(
                    `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`,
                );
            }

            function updatePlayer(delta) {
                if (!controls.isLocked) return;

                // Friction
                player.velocity.x -= player.velocity.x * 10.0 * delta;
                player.velocity.z -= player.velocity.z * 10.0 * delta;
                player.velocity.y -= 9.8 * 2.0 * delta; // Gravity

                player.direction.z =
                    Number(moveState.forward) - Number(moveState.backward);
                player.direction.x =
                    Number(moveState.right) - Number(moveState.left);
                player.direction.normalize();

                if (moveState.forward || moveState.backward)
                    player.velocity.z -= player.direction.z * 100.0 * delta;
                if (moveState.left || moveState.right)
                    player.velocity.x -= player.direction.x * 100.0 * delta;

                // Apply movement (X/Z) & Collision
                const pos = camera.position;

                // Try X
                pos.x += player.velocity.x * delta;
                if (checkCollision(pos.x, pos.y - player.height + 0.1, pos.z)) {
                    pos.x -= player.velocity.x * delta;
                    player.velocity.x = 0;
                }

                // Try Z
                pos.z += player.velocity.z * delta;
                if (checkCollision(pos.x, pos.y - player.height + 0.1, pos.z)) {
                    pos.z -= player.velocity.z * delta;
                    player.velocity.z = 0;
                }

                // Apply Gravity (Y) & Jump
                pos.y += player.velocity.y * delta;

                // Ground/Ceiling check
                // Simple point check at feet
                if (checkCollision(pos.x, pos.y - player.height, pos.z)) {
                    player.velocity.y = Math.max(0, player.velocity.y);
                    pos.y =
                        Math.floor(pos.y - player.height) +
                        player.height +
                        0.001; // Snap up
                    player.onGround = true;
                } else {
                    player.onGround = false;
                }

                // Ceiling collision
                if (checkCollision(pos.x, pos.y - 0.1, pos.z)) {
                    player.velocity.y = Math.min(0, player.velocity.y);
                    pos.y = Math.floor(pos.y) + 1.001;
                }

                // Death floor (respawn)
                if (pos.y < -20) {
                    pos.set(0, 20, 0);
                    player.velocity.set(0, 0, 0);
                }
            }

            // --- INTERACTION (MINING/BUILDING) ---

            function onMouseDown(event) {
                if (!controls.isLocked) return;

                // Center of screen
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

                // Get meshes from chunks
                const meshes = [];
                chunks.forEach((c) => meshes.push(c.mesh));

                const intersects = raycaster.intersectObjects(meshes);

                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    if (intersect.distance > 6) return; // Reach distance

                    const pos = intersect.point
                        .add(intersect.face.normal.multiplyScalar(0.5))
                        .floor();
                    const blockPos = intersect.point
                        .sub(intersect.face.normal.multiplyScalar(0.5))
                        .floor();

                    if (event.button === 0) {
                        // --- LEFT CLICK: MINE ---
                        const bx = Math.floor(blockPos.x);
                        const by = Math.floor(blockPos.y);
                        const bz = Math.floor(blockPos.z);

                        // Remove from world data
                        const cx = Math.floor(bx / CHUNK_SIZE);
                        const cz = Math.floor(bz / CHUNK_SIZE);
                        const key = getChunkKey(cx, cz);
                        const chunk = chunks.get(key);

                        if (chunk) {
                            const type = chunk.voxelData.get(
                                `${bx},${by},${bz}`,
                            );
                            if (type) {
                                // Drop item
                                spawnItem(bx, by, bz, type);

                                // Remove from data
                                chunk.voxelData.delete(`${bx},${by},${bz}`);

                                // Rebuild chunk (inefficient but works for simple demo)
                                rebuildChunk(key, cx, cz);
                            }
                        }
                    } else if (event.button === 2) {
                        // --- RIGHT CLICK: PLACE ---
                        const bx = Math.floor(pos.x);
                        const by = Math.floor(pos.y);
                        const bz = Math.floor(pos.z);

                        // Check if empty and not colliding with player
                        const distToPlayer = Math.sqrt(
                            Math.pow(bx - camera.position.x, 2) +
                                Math.pow(by - (camera.position.y - 1), 2) +
                                Math.pow(bz - camera.position.z, 2),
                        );

                        if (distToPlayer < 1.5) return; // Don't place inside self

                        const cx = Math.floor(bx / CHUNK_SIZE);
                        const cz = Math.floor(bz / CHUNK_SIZE);
                        const key = getChunkKey(cx, cz);
                        const chunk = chunks.get(key);

                        if (
                            chunk &&
                            !chunk.voxelData.has(`${bx},${by},${bz}`)
                        ) {
                            if (inventory[selectedBlock] > 0) {
                                inventory[selectedBlock]--;
                                updateUI();
                                chunk.voxelData.set(
                                    `${bx},${by},${bz}`,
                                    selectedBlock,
                                );
                                rebuildChunk(key, cx, cz);
                            }
                        }
                    }
                }
            }

            function rebuildChunk(key, cx, cz) {
                // Simple brute force: remove and regenerate
                const chunk = chunks.get(key);
                if (chunk) scene.remove(chunk.mesh);
                chunks.delete(key);
                generateChunk(cx, cz);
            }

            // --- ITEM SYSTEM ---

            function spawnItem(x, y, z, type) {
                const geometry = new THREE.BoxGeometry(0.4, 0.4, 0.4);
                const material = new THREE.MeshBasicMaterial({
                    color: BLOCK_TYPES[type].color,
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(x + 0.5, y + 0.5, z + 0.5);

                // Physics for item
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    Math.random() * 0.2,
                    (Math.random() - 0.5) * 0.2,
                );

                scene.add(mesh);
                items.push({ mesh, type, velocity: vel, ground: false });
            }

            function updateItems(delta) {
                for (let i = items.length - 1; i >= 0; i--) {
                    const item = items[i];

                    // Gravity
                    item.velocity.y -= 9.8 * delta;
                    item.mesh.position.add(item.velocity);
                    item.mesh.rotation.y += 5 * delta;

                    // Ground Collision
                    const y = Math.floor(item.mesh.position.y);
                    const x = Math.floor(item.mesh.position.x);
                    const z = Math.floor(item.mesh.position.z);

                    if (checkCollision(x, y, z) || item.mesh.position.y < 0) {
                        item.mesh.position.y =
                            Math.floor(item.mesh.position.y) + 0.5;
                        item.velocity.y = 0;
                        item.velocity.x *= 0.5; // Friction
                        item.velocity.z *= 0.5;
                        item.ground = true;
                    }

                    // Pickup
                    const dist = camera.position.distanceTo(item.mesh.position);
                    if (dist < 2.0 && item.ground) {
                        inventory[item.type]++;
                        updateUI();
                        scene.remove(item.mesh);
                        items.splice(i, 1);
                    }
                }
            }

            // --- UI SYSTEM ---
            function initUI() {
                const ui = document.getElementById("ui-layer");
                ui.innerHTML = "";
                Object.keys(BLOCK_TYPES).forEach((key) => {
                    const block = BLOCK_TYPES[key];
                    const el = document.createElement("div");
                    el.className = `slot ${key == selectedBlock ? "active" : ""}`;
                    el.id = `slot-${key}`;
                    el.innerHTML = `
                    <div id="block-preview" style="background-color: #${block.color.toString(16)}"></div>
                    <div>${block.name}</div>
                    <div class="slot-count" id="count-${key}">0</div>
                `;
                    // Click to select
                    el.onclick = () => {
                        selectedBlock = parseInt(key);
                        updateUI();
                    };
                    ui.appendChild(el);
                });
            }

            function updateUI() {
                Object.keys(inventory).forEach((key) => {
                    document.getElementById(`count-${key}`).innerText =
                        inventory[key];
                    const slot = document.getElementById(`slot-${key}`);
                    if (parseInt(key) === selectedBlock)
                        slot.classList.add("active");
                    else slot.classList.remove("active");
                });
            }

            // --- INPUT HANDLERS ---

            function onKeyDown(event) {
                switch (event.code) {
                    case "KeyW":
                        moveState.forward = true;
                        break;
                    case "KeyA":
                        moveState.left = true;
                        break;
                    case "KeyS":
                        moveState.backward = true;
                        break;
                    case "KeyD":
                        moveState.right = true;
                        break;
                    case "Space":
                        if (player.onGround) {
                            player.velocity.y = 8.0;
                            player.onGround = false;
                        }
                        break;
                    case "Digit1":
                        selectedBlock = 1;
                        updateUI();
                        break;
                    case "Digit2":
                        selectedBlock = 2;
                        updateUI();
                        break;
                    case "Digit3":
                        selectedBlock = 3;
                        updateUI();
                        break;
                    case "Digit4":
                        selectedBlock = 4;
                        updateUI();
                        break;
                }
            }

            function onKeyUp(event) {
                switch (event.code) {
                    case "KeyW":
                        moveState.forward = false;
                        break;
                    case "KeyA":
                        moveState.left = false;
                        break;
                    case "KeyS":
                        moveState.backward = false;
                        break;
                    case "KeyD":
                        moveState.right = false;
                        break;
                }
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // --- MAIN LOOP ---

            function animate() {
                requestAnimationFrame(animate);

                const time = performance.now();
                const delta = (time - prevTime) / 1000;
                prevTime = time;

                updateChunks();
                updatePlayer(delta);
                updateItems(delta);

                renderer.render(scene, camera);
            }
        </script>
    </body>
</html>
