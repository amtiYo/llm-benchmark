<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* Crosshair */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        .crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        .crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        
        /* Hotbar */
        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 8px;
        }
        
        .slot {
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.1s;
        }
        
        .slot.active {
            border-color: rgba(255, 255, 255, 0.9);
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        
        .slot-color {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.3);
        }
        
        .slot-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        
        .slot-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
        }
        
        /* Block overlay for selected slot */
        #block-highlight {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: monospace;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            opacity: 0.7;
        }
        
        /* Instructions */
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            font-family: Arial, sans-serif;
            cursor: pointer;
        }
        
        #instructions h1 { margin-top: 0; }
        #instructions p { margin: 10px 0; line-height: 1.5; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div class="crosshair" id="crosshair"></div>

<div id="hotbar">
    <div class="slot active" data-index="0">
        <span class="slot-number">1</span>
        <div class="slot-color" style="background: #5d4037;"></div>
        <span class="slot-count" id="count-0">0</span>
    </div>
    <div class="slot" data-index="1">
        <span class="slot-number">2</span>
        <div class="slot-color" style="background: #4caf50;"></div>
        <span class="slot-count" id="count-1">0</span>
    </div>
    <div class="slot" data-index="2">
        <span class="slot-number">3</span>
        <div class="slot-color" style="background: #757575;"></div>
        <span class="slot-count" id="count-2">0</span>
    </div>
    <div class="slot" data-index="3">
        <span class="slot-number">4</span>
        <div class="slot-color" style="background: #ffeb3b;"></div>
        <span class="slot-count" id="count-3">0</span>
    </div>
</div>

<div id="block-highlight">Selected: Dirt</div>

<div id="instructions">
    <h1 class="text-3xl font-bold mb-4">Voxel Sandbox</h1>
    <p>Click to start</p>
    <p class="text-sm text-gray-300 mt-4">
        WASD - Move | SPACE - Jump<br>
        Mouse - Look | ESC - Release cursor<br>
        LMB - Break Block | RMB - Place Block<br>
        1-4 - Select Block Type
    </p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/**
 * VOXEL SANDBOX GAME
 * Single-file implementation with procedural terrain, physics drops, and inventory
 */

// ==========================================
// CONFIGURATION
// ==========================================
const CONFIG = {
    CHUNK_SIZE: 16,
    CHUNK_HEIGHT: 32,
    RENDER_DISTANCE: 4, // chunks in each direction
    GRAVITY: 0.02,
    PLAYER_SPEED: 0.15,
    JUMP_FORCE: 0.35,
    PLAYER_HEIGHT: 1.6,
    PLAYER_RADIUS: 0.3,
    DROP_SIZE: 0.25,
    DROP_SPIN_SPEED: 0.05,
    DROP_BOB_SPEED: 0.003,
    DROP_BOB_HEIGHT: 0.1,
    PICKUP_RADIUS: 1.5
};

// Block types
const BLOCKS = {
    DIRT: { id: 1, color: 0x5d4037, name: 'Dirt' },
    GRASS: { id: 2, color: 0x4caf50, name: 'Grass' },
    STONE: { id: 3, color: 0x757575, name: 'Stone' },
    SAND: { id: 4, color: 0xffeb3b, name: 'Sand' }
};

const BLOCK_IDS = [BLOCKS.DIRT, BLOCKS.GRASS, BLOCKS.STONE, BLOCKS.SAND];

// ==========================================
// UTILITY FUNCTIONS
// ==========================================
function seededRandom(seed) {
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

function noise2D(x, z, seed = 12345) {
    // Simple value noise combination for terrain generation
    const scale1 = 0.05;
    const scale2 = 0.02;
    const val1 = Math.sin(x * scale1 + seed) * Math.cos(z * scale1 + seed);
    const val2 = Math.sin(x * scale2 - seed) * Math.cos(z * scale2 + seed) * 0.5;
    return (val1 + val2) / 1.5;
}

// ==========================================
// INVENTORY SYSTEM
// ==========================================
class Inventory {
    constructor() {
        // Initialize with some starting blocks
        this.slots = [
            { type: BLOCKS.DIRT, count: 10 },
            { type: BLOCKS.GRASS, count: 10 },
            { type: BLOCKS.STONE, count: 10 },
            { type: BLOCKS.SAND, count: 10 }
        ];
        this.selectedIndex = 0;
        this.updateUI();
    }
    
    addBlock(blockType, amount = 1) {
        // Find existing slot with this type
        const existingSlot = this.slots.find(slot => slot.type.id === blockType.id);
        if (existingSlot) {
            existingSlot.count += amount;
        } else {
            // Find empty slot or replace first slot if full (simplified)
            const emptyIndex = this.slots.findIndex(slot => slot.count === 0);
            if (emptyIndex !== -1) {
                this.slots[emptyIndex] = { type: blockType, count: amount };
            }
        }
        this.updateUI();
    }
    
    removeBlock(index, amount = 1) {
        if (this.slots[index] && this.slots[index].count >= amount) {
            this.slots[index].count -= amount;
            if (this.slots[index].count <= 0) {
                this.slots[index].count = 0;
            }
            this.updateUI();
            return true;
        }
        return false;
    }
    
    getSelectedBlock() {
        const slot = this.slots[this.selectedIndex];
        return slot && slot.count > 0 ? slot.type : null;
    }
    
    selectSlot(index) {
        if (index >= 0 && index < this.slots.length) {
            this.selectedIndex = index;
            document.querySelectorAll('.slot').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            this.updateHighlight();
        }
    }
    
    updateUI() {
        this.slots.forEach((slot, index) => {
            const countEl = document.getElementById(`count-${index}`);
            if (countEl) {
                countEl.textContent = slot.count;
            }
        });
        this.updateHighlight();
    }
    
    updateHighlight() {
        const block = this.getSelectedBlock();
        const highlight = document.getElementById('block-highlight');
        highlight.textContent = block ? `Selected: ${block.name}` : 'Selected: None (Empty)';
    }
}

// ==========================================
// CHUNK SYSTEM
// ==========================================
class Chunk {
    constructor(cx, cz, scene) {
        this.cx = cx; // chunk x coordinate
        this.cz = cz; // chunk z coordinate
        this.scene = scene;
        this.blocks = new Uint8Array(CONFIG.CHUNK_SIZE * CONFIG.CHUNK_HEIGHT * CONFIG.CHUNK_SIZE);
        this.meshes = [];
        this.isDirty = true;
        this.generate();
    }
    
    getBlock(x, y, z) {
        if (x < 0 || x >= CONFIG.CHUNK_SIZE || y < 0 || y >= CONFIG.CHUNK_HEIGHT || z < 0 || z >= CONFIG.CHUNK_SIZE) {
            return 0;
        }
        return this.blocks[x + CONFIG.CHUNK_SIZE * (y + CONFIG.CHUNK_HEIGHT * z)];
    }
    
    setBlock(x, y, z, type) {
        if (x < 0 || x >= CONFIG.CHUNK_SIZE || y < 0 || y >= CONFIG.CHUNK_HEIGHT || z < 0 || z >= CONFIG.CHUNK_SIZE) {
            return false;
        }
        const index = x + CONFIG.CHUNK_SIZE * (y + CONFIG.CHUNK_HEIGHT * z);
        this.blocks[index] = type;
        this.isDirty = true;
        return true;
    }
    
    generate() {
        const seed = 12345;
        
        for (let x = 0; x < CONFIG.CHUNK_SIZE; x++) {
            for (let z = 0; z < CONFIG.CHUNK_SIZE; z++) {
                const worldX = this.cx * CONFIG.CHUNK_SIZE + x;
                const worldZ = this.cz * CONFIG.CHUNK_SIZE + z;
                
                // Generate terrain height using noise
                const noiseVal = noise2D(worldX, worldZ, seed);
                const height = Math.floor(10 + noiseVal * 8); // Base height 10, variance ±8
                
                for (let y = 0; y < CONFIG.CHUNK_HEIGHT; y++) {
                    let blockType = 0;
                    
                    if (y < height - 3) {
                        blockType = BLOCKS.STONE.id;
                    } else if (y < height) {
                        blockType = BLOCKS.DIRT.id;
                    } else if (y === height) {
                        blockType = BLOCKS.GRASS.id;
                        // Occasionally place sand instead near "beaches" (lower terrain)
                        if (height < 6 && Math.random() > 0.5) {
                            blockType = BLOCKS.SAND.id;
                        }
                    }
                    
                    this.blocks[x + CONFIG.CHUNK_SIZE * (y + CONFIG.CHUNK_HEIGHT * z)] = blockType;
                }
            }
        }
    }
    
    buildMesh() {
        // Remove old meshes
        this.meshes.forEach(mesh => this.scene.remove(mesh));
        this.meshes = [];
        
        // Group positions by block type for instancing
        const blockGroups = {};
        
        for (let x = 0; x < CONFIG.CHUNK_SIZE; x++) {
            for (let y = 0; y < CONFIG.CHUNK_HEIGHT; y++) {
                for (let z = 0; z < CONFIG.CHUNK_SIZE; z++) {
                    const blockId = this.getBlock(x, y, z);
                    if (blockId === 0) continue;
                    
                    // Check if block is visible (has air neighbor)
                    if (this.isBlockVisible(x, y, z)) {
                        if (!blockGroups[blockId]) blockGroups[blockId] = [];
                        blockGroups[blockId].push({x, y, z});
                    }
                }
            }
        }
        
        // Create instanced meshes
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        
        for (const [blockId, positions] of Object.entries(blockGroups)) {
            const blockType = Object.values(BLOCKS).find(b => b.id == blockId);
            if (!blockType) continue;
            
            const material = new THREE.MeshLambertMaterial({ color: blockType.color });
            const mesh = new THREE.InstancedMesh(geometry, material, positions.length);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            const dummy = new THREE.Object3D();
            positions.forEach((pos, i) => {
                dummy.position.set(
                    this.cx * CONFIG.CHUNK_SIZE + pos.x,
                    pos.y,
                    this.cz * CONFIG.CHUNK_SIZE + pos.z
                );
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            });
            
            this.scene.add(mesh);
            this.meshes.push(mesh);
        }
        
        this.isDirty = false;
    }
    
    isBlockVisible(x, y, z) {
        return this.getBlock(x + 1, y, z) === 0 ||
               this.getBlock(x - 1, y, z) === 0 ||
               this.getBlock(x, y + 1, z) === 0 ||
               this.getBlock(x, y - 1, z) === 0 ||
               this.getBlock(x, y, z + 1) === 0 ||
               this.getBlock(x, y, z - 1) === 0;
    }
    
    update() {
        if (this.isDirty) {
            this.buildMesh();
        }
    }
    
    dispose() {
        this.meshes.forEach(mesh => {
            mesh.geometry.dispose();
            mesh.material.dispose();
            this.scene.remove(mesh);
        });
    }
}

// ==========================================
// WORLD MANAGER
// ==========================================
class World {
    constructor(scene) {
        this.scene = scene;
        this.chunks = new Map();
        this.chunkGroup = new THREE.Group();
        this.scene.add(this.chunkGroup);
    }
    
    getChunkKey(cx, cz) {
        return `${cx},${cz}`;
    }
    
    getChunk(cx, cz) {
        return this.chunks.get(this.getChunkKey(cx, cz));
    }
    
    getBlock(x, y, z) {
        const cx = Math.floor(x / CONFIG.CHUNK_SIZE);
        const cz = Math.floor(z / CONFIG.CHUNK_SIZE);
        const chunk = this.getChunk(cx, cz);
        if (!chunk) return 0;
        
        const localX = ((x % CONFIG.CHUNK_SIZE) + CONFIG.CHUNK_SIZE) % CONFIG.CHUNK_SIZE;
        const localZ = ((z % CONFIG.CHUNK_SIZE) + CONFIG.CHUNK_SIZE) % CONFIG.CHUNK_SIZE;
        return chunk.getBlock(localX, y, localZ);
    }
    
    setBlock(x, y, z, type) {
        const cx = Math.floor(x / CONFIG.CHUNK_SIZE);
        const cz = Math.floor(z / CONFIG.CHUNK_SIZE);
        const chunk = this.getChunk(cx, cz);
        if (!chunk) return false;
        
        const localX = ((x % CONFIG.CHUNK_SIZE) + CONFIG.CHUNK_SIZE) % CONFIG.CHUNK_SIZE;
        const localZ = ((z % CONFIG.CHUNK_SIZE) + CONFIG.CHUNK_SIZE) % CONFIG.CHUNK_SIZE;
        return chunk.setBlock(localX, y, localZ, type);
    }
    
    updatePlayerPosition(px, pz) {
        const pcx = Math.floor(px / CONFIG.CHUNK_SIZE);
        const pcz = Math.floor(pz / CONFIG.CHUNK_SIZE);
        
        // Load new chunks
        for (let dx = -CONFIG.RENDER_DISTANCE; dx <= CONFIG.RENDER_DISTANCE; dx++) {
            for (let dz = -CONFIG.RENDER_DISTANCE; dz <= CONFIG.RENDER_DISTANCE; dz++) {
                const cx = pcx + dx;
                const cz = pcz + dz;
                const key = this.getChunkKey(cx, cz);
                
                if (!this.chunks.has(key)) {
                    const chunk = new Chunk(cx, cz, this.chunkGroup);
                    this.chunks.set(key, chunk);
                }
            }
        }
        
        // Unload distant chunks
        for (const [key, chunk] of this.chunks) {
            const dist = Math.abs(chunk.cx - pcx) + Math.abs(chunk.cz - pcz);
            if (dist > CONFIG.RENDER_DISTANCE + 1) {
                chunk.dispose();
                this.chunks.delete(key);
            }
        }
    }
    
    update() {
        this.chunks.forEach(chunk => chunk.update());
    }
}

// ==========================================
// DROP SYSTEM
// ==========================================
class Drop {
    constructor(x, y, z, blockType, scene) {
        this.position = new THREE.Vector3(x, y, z);
        this.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.1,
            0.2,
            (Math.random() - 0.5) * 0.1
        );
        this.blockType = blockType;
        this.scene = scene;
        this.life = 3000; // 5 minutes in frames (at 60fps)
        this.onGround = false;
        
        // Create mesh
        const geometry = new THREE.BoxGeometry(CONFIG.DROP_SIZE, CONFIG.DROP_SIZE, CONFIG.DROP_SIZE);
        const material = new THREE.MeshLambertMaterial({ color: blockType.color });
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.copy(this.position);
        this.mesh.castShadow = true;
        this.scene.add(this.mesh);
        
        this.bobOffset = Math.random() * Math.PI * 2;
    }
    
    update(world, playerPos) {
        this.life--;
        
        // Physics
        if (!this.onGround) {
            this.velocity.y -= CONFIG.GRAVITY;
            this.position.add(this.velocity);
            
            // Ground collision
            const groundY = this.getGroundHeight(world);
            if (this.position.y <= groundY + CONFIG.DROP_SIZE/2) {
                this.position.y = groundY + CONFIG.DROP_SIZE/2;
                this.velocity.y = 0;
                this.velocity.x *= 0.5;
                this.velocity.z *= 0.5;
                this.onGround = true;
            }
        } else {
            // Bobbing animation when on ground
            this.mesh.position.y = this.position.y + Math.sin(Date.now() * CONFIG.DROP_BOB_SPEED + this.bobOffset) * CONFIG.DROP_BOB_HEIGHT;
        }
        
        // Spin
        this.mesh.rotation.x += CONFIG.DROP_SPIN_SPEED;
        this.mesh.rotation.y += CONFIG.DROP_SPIN_SPEED;
        
        // Magnet to player
        const dist = this.position.distanceTo(playerPos);
        if (dist < CONFIG.PICKUP_RADIUS && dist > 0.5) {
            const dir = new THREE.Vector3().subVectors(playerPos, this.position).normalize();
            const speed = 0.1 * (1 - dist / CONFIG.PICKUP_RADIUS);
            this.position.add(dir.multiplyScalar(speed));
            this.onGround = false; // Re-enable physics when moving
        }
        
        this.mesh.position.x = this.position.x;
        this.mesh.position.z = this.position.z;
        
        return dist < 0.8 || this.life <= 0; // Return true if should be collected or despawned
    }
    
    getGroundHeight(world) {
        // Find highest solid block below drop
        for (let y = Math.floor(this.position.y); y >= 0; y--) {
            if (world.getBlock(Math.floor(this.position.x), y, Math.floor(this.position.z)) !== 0) {
                return y + 0.5;
            }
        }
        return 0;
    }
    
    dispose() {
        this.scene.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
    }
}

// ==========================================
// PLAYER CONTROLLER
// ==========================================
class Player {
    constructor(camera, world, inventory) {
        this.camera = camera;
        this.world = world;
        this.inventory = inventory;
        this.position = new THREE.Vector3(0, 20, 0);
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.direction = new THREE.Vector3();
        this.onGround = false;
        
        this.camera.position.copy(this.position);
        
        // Raycaster for block interaction
        this.raycaster = new THREE.Raycaster();
        this.raycaster.far = 5;
    }
    
    update(input) {
        // Movement
        this.direction.set(0, 0, 0);
        
        if (input.keys['w']) this.direction.z -= 1;
        if (input.keys['s']) this.direction.z += 1;
        if (input.keys['a']) this.direction.x -= 1;
        if (input.keys['d']) this.direction.x += 1;
        
        if (this.direction.length() > 0) {
            this.direction.normalize().multiplyScalar(CONFIG.PLAYER_SPEED);
            
            // Rotate direction based on camera rotation (only Y axis)
            const rotationY = this.camera.rotation.y;
            const cos = Math.cos(rotationY);
            const sin = Math.sin(rotationY);
            
            const newX = this.direction.x * cos - this.direction.z * sin;
            const newZ = this.direction.x * sin + this.direction.z * cos;
            
            this.velocity.x = newX;
            this.velocity.z = newZ;
        } else {
            this.velocity.x *= 0.8;
            this.velocity.z *= 0.8;
        }
        
        // Jump
        if (input.keys[' '] && this.onGround) {
            this.velocity.y = CONFIG.JUMP_FORCE;
            this.onGround = false;
        }
        
        // Gravity
        this.velocity.y -= CONFIG.GRAVITY;
        
        // Apply movement with collision
        this.moveWithCollision();
        
        // Update camera
        this.camera.position.copy(this.position);
        this.camera.position.y += CONFIG.PLAYER_HEIGHT;
        
        // Handle input actions
        if (input.mouse.clickedLeft) {
            this.breakBlock();
            input.mouse.clickedLeft = false;
        }
        if (input.mouse.clickedRight) {
            this.placeBlock();
            input.mouse.clickedRight = false;
        }
    }
    
    moveWithCollision() {
        // Try X movement
        this.position.x += this.velocity.x;
        if (this.checkCollision()) {
            this.position.x -= this.velocity.x;
            this.velocity.x = 0;
        }
        
        // Try Z movement
        this.position.z += this.velocity.z;
        if (this.checkCollision()) {
            this.position.z -= this.velocity.z;
            this.velocity.z = 0;
        }
        
        // Try Y movement
        this.position.y += this.velocity.y;
        this.onGround = false;
        
        if (this.checkCollision()) {
            if (this.velocity.y < 0) {
                this.onGround = true;
            }
            this.position.y -= this.velocity.y;
            this.velocity.y = 0;
        }
        
        // Floor limit
        if (this.position.y < -10) {
            this.position.set(0, 20, 0);
            this.velocity.set(0, 0, 0);
        }
    }
    
    checkCollision() {
        const minX = Math.floor(this.position.x - CONFIG.PLAYER_RADIUS);
        const maxX = Math.floor(this.position.x + CONFIG.PLAYER_RADIUS);
        const minY = Math.floor(this.position.y);
        const maxY = Math.floor(this.position.y + CONFIG.PLAYER_HEIGHT);
        const minZ = Math.floor(this.position.z - CONFIG.PLAYER_RADIUS);
        const maxZ = Math.floor(this.position.z + CONFIG.PLAYER_RADIUS);
        
        for (let x = minX; x <= maxX; x++) {
            for (let y = minY; y <= maxY; y++) {
                for (let z = minZ; z <= maxZ; z++) {
                    if (this.world.getBlock(x, y, z) !== 0) {
                        return true;
                    }
                }
            }
        }
        return false;
    }
    
    getTargetBlock() {
        this.raycaster.setFromCamera(new THREE.Vector2(0, 0), this.camera);
        
        // Raycast against chunk meshes
        const chunks = [];
        this.world.chunks.forEach(chunk => {
            chunk.meshes.forEach(mesh => chunks.push(mesh));
        });
        
        const intersects = this.raycaster.intersectObjects(chunks);
        if (intersects.length > 0) {
            const hit = intersects[0];
            const pos = hit.point.clone().add(hit.face.normal.clone().multiplyScalar(-0.5));
            const placePos = hit.point.clone().add(hit.face.normal.clone().multiplyScalar(0.5));
            
            return {
                block: {
                    x: Math.floor(pos.x),
                    y: Math.floor(pos.y),
                    z: Math.floor(pos.z)
                },
                place: {
                    x: Math.floor(placePos.x),
                    y: Math.floor(placePos.y),
                    z: Math.floor(placePos.z)
                }
            };
        }
        return null;
    }
    
    breakBlock() {
        const target = this.getTargetBlock();
        if (target) {
            const blockId = this.world.getBlock(target.block.x, target.block.y, target.block.z);
            if (blockId !== 0) {
                const blockType = Object.values(BLOCKS).find(b => b.id === blockId);
                this.world.setBlock(target.block.x, target.block.y, target.block.z, 0);
                
                // Create drop
                game.createDrop(
                    target.block.x + 0.5,
                    target.block.y + 0.5,
                    target.block.z + 0.5,
                    blockType
                );
            }
        }
    }
    
    placeBlock() {
        const target = this.getTargetBlock();
        if (target) {
            const selectedBlock = this.inventory.getSelectedBlock();
            if (selectedBlock && this.inventory.removeBlock(this.inventory.selectedIndex)) {
                // Check if placing inside player
                const px = Math.floor(this.position.x);
                const py = Math.floor(this.position.y);
                const pz = Math.floor(this.position.z);
                const ptop = Math.floor(this.position.y + CONFIG.PLAYER_HEIGHT);
                
                if (target.place.x >= px - 1 && target.place.x <= px + 1 &&
                    target.place.y >= py && target.place.y <= ptop &&
                    target.place.z >= pz - 1 && target.place.z <= pz + 1) {
                    // Cancel placement if inside player
                    this.inventory.addBlock(selectedBlock); // Refund
                    return;
                }
                
                this.world.setBlock(target.place.x, target.place.y, target.place.z, selectedBlock.id);
            }
        }
    }
}

// ==========================================
// INPUT HANDLING
// ==========================================
class InputHandler {
    constructor() {
        this.keys = {};
        this.mouse = { clickedLeft: false, clickedRight: false };
        
        document.addEventListener('keydown', (e) => {
            this.keys[e.key.toLowerCase()] = true;
            // Number keys for hotbar
            if (e.key >= '1' && e.key <= '4') {
                game.inventory.selectSlot(parseInt(e.key) - 1);
            }
        });
        
        document.addEventListener('keyup', (e) => {
            this.keys[e.key.toLowerCase()] = false;
        });
        
        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement) {
                if (e.button === 0) this.mouse.clickedLeft = true;
                if (e.button === 2) this.mouse.clickedRight = true;
            }
        });
        
        document.addEventListener('contextmenu', (e) => e.preventDefault());
    }
}

// ==========================================
// MAIN GAME CLASS
// ==========================================
class Game {
    constructor() {
        this.setupRenderer();
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x87CEEB);
        this.scene.fog = new THREE.Fog(0x87CEEB, 20, 80);
        
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        this.setupLights();
        
        this.world = new World(this.scene);
        this.inventory = new Inventory();
        this.player = new Player(this.camera, this.world, this.inventory);
        this.input = new InputHandler();
        this.drops = [];
        
        this.setupPointerLock();
        
        window.addEventListener('resize', () => this.onWindowResize());
        
        this.animate();
    }
    
    setupRenderer() {
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(this.renderer.domElement);
    }
    
    setupLights() {
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        this.scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 200;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        this.scene.add(dirLight);
    }
    
    setupPointerLock() {
        const instructions = document.getElementById('instructions');
        const crosshair = document.getElementById('crosshair');
        
        instructions.addEventListener('click', () => {
            document.body.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                instructions.classList.add('hidden');
                crosshair.style.display = 'block';
            } else {
                instructions.classList.remove('hidden');
                crosshair.style.display = 'none';
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                this.camera.rotation.y -= e.movementX * 0.002;
                this.camera.rotation.x -= e.movementY * 0.002;
                this.camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.camera.rotation.x));
            }
        });
    }
    
    createDrop(x, y, z, blockType) {
        this.drops.push(new Drop(x, y, z, blockType, this.scene));
    }
    
    updateDrops() {
        const playerPos = this.player.position.clone();
        playerPos.y += CONFIG.PLAYER_HEIGHT / 2;
        
        for (let i = this.drops.length - 1; i >= 0; i--) {
            const drop = this.drops[i];
            const collected = drop.update(this.world, playerPos);
            
            if (collected) {
                if (drop.life > 0) { // Collected by player, not timeout
                    this.inventory.addBlock(drop.blockType);
                }
                drop.dispose();
                this.drops.splice(i, 1);
            }
        }
    }
    
    onWindowResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    animate() {
        requestAnimationFrame(() => this.animate());
        
        if (document.pointerLockElement === document.body) {
            this.player.update(this.input);
            this.world.updatePlayerPosition(this.player.position.x, this.player.position.z);
            this.updateDrops();
        }
        
        this.world.update();
        this.renderer.render(this.scene, this.camera);
    }
}

// Start game
let game;
window.addEventListener('load', () => {
    game = new Game();
});
</script>
