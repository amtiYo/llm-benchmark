<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Voxel Sandbox 3D</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                user-select: none;
            }
            #ui-container {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            /* Crosshair */
            #crosshair {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 20px;
                height: 20px;
                transform: translate(-50%, -50%);
                border: 2px solid rgba(255, 255, 255, 0.8);
                border-radius: 50%;
                box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
            }

            /* Instructions */
            #instructions {
                position: absolute;
                top: 10px;
                left: 10px;
                color: white;
                background: rgba(0, 0, 0, 0.5);
                padding: 10px;
                border-radius: 5px;
                font-size: 14px;
            }

            /* Hotbar */
            #hotbar {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 5px;
                background: rgba(0, 0, 0, 0.5);
                padding: 5px;
                border-radius: 8px;
                pointer-events: auto;
            }
            .slot {
                width: 50px;
                height: 50px;
                border: 2px solid #555;
                background: rgba(0, 0, 0, 0.3);
                display: flex;
                justify-content: center;
                align-items: center;
                color: white;
                font-weight: bold;
                font-size: 12px;
                position: relative;
                cursor: pointer;
            }
            .slot.active {
                border-color: white;
                box-shadow: 0 0 10px white;
            }
            .slot-count {
                position: absolute;
                bottom: 2px;
                right: 4px;
                font-size: 12px;
            }

            /* Block preview in slot */
            .slot-preview {
                width: 20px;
                height: 20px;
                margin-bottom: 5px;
            }
        </style>
    </head>
    <body>
        <div id="ui-container">
            <div id="crosshair"></div>
            <div id="instructions">
                <b>Click to Start</b><br />
                WASD: Move | SPACE: Jump<br />
                LMB: Mine Block | RMB: Place Block<br />
                1-5: Select Item
            </div>
            <div id="hotbar"></div>
        </div>

        <!-- Import Three.js as a module -->
        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";

            // --- CONFIGURATION ---
            const WORLD_SIZE = 32; // Size of a chunk
            const RENDER_DISTANCE = 2; // Chunks radius
            const GRAVITY = 30.0;
            const JUMP_FORCE = 10.0;
            const SPEED = 8.0;
            const BLOCK_SIZE = 1;

            // --- GLOBAL VARIABLES ---
            let camera, scene, renderer, controls;
            let raycaster;
            let moveForward = false,
                moveBackward = false,
                moveLeft = false,
                moveRight = false,
                canJump = false;
            let prevTime = performance.now();
            const velocity = new THREE.Vector3();
            const direction = new THREE.Vector3();

            // World Data
            const worldData = new Map(); // Stores "x,y,z" -> blockType
            const chunks = new Map(); // Stores "cx,cz" -> InstancedMesh

            // Physics Objects
            const drops = []; // Array of { mesh, velocity, position }

            // Inventory
            const inventory = [
                { id: 1, name: "Grass", color: 0x55aa55, count: 0 },
                { id: 2, name: "Dirt", color: 0x885533, count: 0 },
                { id: 3, name: "Stone", color: 0x777777, count: 0 },
                { id: 4, name: "Wood", color: 0x8b4513, count: 0 },
                { id: 5, name: "Leaves", color: 0x228b22, count: 0 },
            ];
            let selectedSlot = 0;

            // --- NOISE FUNCTION (Simplex-ish) ---
            // A compact pseudo-random noise generator for terrain
            function noise(x, z) {
                const n = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453;
                return n - Math.floor(n);
            }

            function smoothNoise(x, z) {
                const corners =
                    (noise(x - 1, z - 1) +
                        noise(x + 1, z - 1) +
                        noise(x - 1, z + 1) +
                        noise(x + 1, z + 1)) /
                    16;
                const sides =
                    (noise(x - 1, z) +
                        noise(x + 1, z) +
                        noise(x, z - 1) +
                        noise(x, z + 1)) /
                    8;
                const center = noise(x, z) / 4;
                return corners + sides + center;
            }

            function getTerrainHeight(x, z) {
                // Combine multiple octaves for hills and plains
                let y = smoothNoise(x * 0.05, z * 0.05) * 10;
                y += smoothNoise(x * 0.1, z * 0.1) * 5;
                return Math.floor(y);
            }

            // --- INITIALIZATION ---
            function init() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87ceeb); // Sky blue
                scene.fog = new THREE.Fog(
                    0x87ceeb,
                    10,
                    RENDER_DISTANCE * WORLD_SIZE - 10,
                );

                camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000,
                );
                camera.position.y = 20; // Start in the air

                // Lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(50, 100, 50);
                scene.add(dirLight);

                // Renderer
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // Controls
                controls = new PointerLockControls(camera, document.body);

                const instructions = document.getElementById("instructions");
                document.addEventListener("click", () => {
                    controls.lock();
                });

                controls.addEventListener(
                    "lock",
                    () => (instructions.style.display = "none"),
                );
                controls.addEventListener(
                    "unlock",
                    () => (instructions.style.display = "block"),
                );

                // Raycaster
                raycaster = new THREE.Raycaster();
                raycaster.far = 6; // Reach distance

                // Input Listeners
                document.addEventListener("keydown", onKeyDown);
                document.addEventListener("keyup", onKeyUp);
                document.addEventListener("mousedown", onMouseDown);
                window.addEventListener("resize", onWindowResize);

                // Generate initial chunks
                updateWorld();
                updateInventoryUI();

                animate();
            }

            // --- WORLD GENERATION ---
            function getChunkKey(cx, cz) {
                return `${cx},${cz}`;
            }
            function getBlockKey(x, y, z) {
                return `${x},${y},${z}`;
            }

            function generateChunk(cx, cz) {
                const key = getChunkKey(cx, cz);
                if (chunks.has(key)) return;

                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const mesh = new THREE.InstancedMesh(
                    geometry,
                    new THREE.MeshLambertMaterial(),
                    WORLD_SIZE * WORLD_SIZE * 20,
                );
                mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

                let dummy = new THREE.Object3D();
                let index = 0;
                const chunkBlocks = []; // Store block coords for this chunk

                for (let x = 0; x < WORLD_SIZE; x++) {
                    for (let z = 0; z < WORLD_SIZE; z++) {
                        const worldX = cx * WORLD_SIZE + x;
                        const worldZ = cz * WORLD_SIZE + z;
                        const height = getTerrainHeight(worldX, worldZ);

                        // Generate column
                        for (let y = height; y > height - 3; y--) {
                            let type = 2; // Dirt
                            if (y === height) type = 1; // Grass
                            if (y < height - 1) type = 3; // Stone

                            setBlock(
                                worldX,
                                y,
                                worldZ,
                                type,
                                mesh,
                                index,
                                dummy,
                            );
                            chunkBlocks.push({
                                x: worldX,
                                y: y,
                                z: worldZ,
                                type: type,
                                idx: index,
                            });
                            index++;
                        }
                    }
                }

                mesh.count = index;
                scene.add(mesh);
                chunks.set(key, { mesh, blocks: chunkBlocks });
            }

            function setBlock(x, y, z, type, mesh, instanceIndex, dummy) {
                dummy.position.set(x, y, z);
                dummy.updateMatrix();
                mesh.setMatrixAt(instanceIndex, dummy.matrix);
                mesh.setColorAt(
                    instanceIndex,
                    new THREE.Color(inventory[type - 1].color),
                );

                worldData.set(getBlockKey(x, y, z), type);
            }

            function updateWorld() {
                const cx = Math.floor(camera.position.x / WORLD_SIZE);
                const cz = Math.floor(camera.position.z / WORLD_SIZE);

                // Generate nearby chunks
                for (
                    let x = cx - RENDER_DISTANCE;
                    x <= cx + RENDER_DISTANCE;
                    x++
                ) {
                    for (
                        let z = cz - RENDER_DISTANCE;
                        z <= cz + RENDER_DISTANCE;
                        z++
                    ) {
                        generateChunk(x, z);
                    }
                }
            }

            // --- PHYSICS & CONTROLS ---
            function onKeyDown(event) {
                switch (event.code) {
                    case "ArrowUp":
                    case "KeyW":
                        moveForward = true;
                        break;
                    case "ArrowLeft":
                    case "KeyA":
                        moveLeft = true;
                        break;
                    case "ArrowDown":
                    case "KeyS":
                        moveBackward = true;
                        break;
                    case "ArrowRight":
                    case "KeyD":
                        moveRight = true;
                        break;
                    case "Space":
                        if (canJump) {
                            velocity.y += JUMP_FORCE;
                            canJump = false;
                        }
                        break;
                    case "Digit1":
                        selectSlot(0);
                        break;
                    case "Digit2":
                        selectSlot(1);
                        break;
                    case "Digit3":
                        selectSlot(2);
                        break;
                    case "Digit4":
                        selectSlot(3);
                        break;
                    case "Digit5":
                        selectSlot(4);
                        break;
                }
            }

            function onKeyUp(event) {
                switch (event.code) {
                    case "ArrowUp":
                    case "KeyW":
                        moveForward = false;
                        break;
                    case "ArrowLeft":
                    case "KeyA":
                        moveLeft = false;
                        break;
                    case "ArrowDown":
                    case "KeyS":
                        moveBackward = false;
                        break;
                    case "ArrowRight":
                    case "KeyD":
                        moveRight = false;
                        break;
                }
            }

            function selectSlot(index) {
                selectedSlot = index;
                updateInventoryUI();
            }

            function updateInventoryUI() {
                const container = document.getElementById("hotbar");
                container.innerHTML = "";
                inventory.forEach((item, idx) => {
                    const div = document.createElement("div");
                    div.className = `slot ${idx === selectedSlot ? "active" : ""}`;
                    div.innerHTML = `
                <div class="slot-preview" style="background-color: #${item.color.toString(16).padStart(6, "0")}"></div>
                <div class="slot-count">${item.count}</div>
            `;
                    div.onclick = () => selectSlot(idx);
                    container.appendChild(div);
                });
            }

            // Simple AABB Collision
            function checkCollision(x, y, z) {
                const bx = Math.round(x);
                const by = Math.round(y);
                const bz = Math.round(z);
                return worldData.has(getBlockKey(bx, by, bz));
            }

            // --- INTERACTION ---
            function onMouseDown(event) {
                if (!controls.isLocked) return;

                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                // We need to intersect against all InstancedMeshes
                const intersects = raycaster.intersectObjects(scene.children);

                // Filter out drops and lights
                const blockIntersects = intersects.filter(
                    (i) => i.object.type === "InstancedMesh",
                );

                if (blockIntersects.length > 0) {
                    const hit = blockIntersects[0];
                    const instanceId = hit.instanceId;
                    const chunkKey = getChunkKey(
                        Math.floor(hit.object.position.x / WORLD_SIZE),
                        Math.floor(hit.object.position.z / WORLD_SIZE),
                    );

                    // Find the block data in our chunk map
                    // Note: We need to calculate world position from the instance matrix
                    const matrix = new THREE.Matrix4();
                    hit.object.getMatrixAt(instanceId, matrix);
                    const pos = new THREE.Vector3();
                    pos.setFromMatrixPosition(matrix);
                    const bx = Math.round(pos.x);
                    const by = Math.round(pos.y);
                    const bz = Math.round(pos.z);
                    const key = getBlockKey(bx, by, bz);

                    if (event.button === 0) {
                        // LMB: Mine
                        if (worldData.has(key)) {
                            const type = worldData.get(key);
                            // Remove from data
                            worldData.delete(key);

                            // Hide in InstancedMesh (Scale to 0)
                            const chunk = chunks.get(chunkKey);
                            const dummy = new THREE.Object3D();
                            dummy.position.set(bx, by, bz);
                            dummy.scale.set(0.01, 0.01, 0.01);
                            dummy.updateMatrix();
                            chunk.mesh.setMatrixAt(instanceId, dummy.matrix);
                            chunk.mesh.instanceMatrix.needsUpdate = true;

                            // Create Drop
                            createDrop(bx, by + 0.5, bz, type);
                        }
                    } else if (event.button === 2) {
                        // RMB: Place
                        // Calculate face normal to place adjacent
                        const nx = bx + hit.face.normal.x;
                        const ny = by + hit.face.normal.y;
                        const nz = bz + hit.face.normal.z;

                        // Don't place inside player
                        const pPos = camera.position;
                        const dist = Math.sqrt(
                            (nx - pPos.x) ** 2 +
                                (ny - (pPos.y - 1)) ** 2 +
                                (nz - pPos.z) ** 2,
                        );

                        if (
                            dist > 1.2 &&
                            !worldData.has(getBlockKey(nx, ny, nz))
                        ) {
                            const item = inventory[selectedSlot];
                            if (item.count > 0) {
                                // Add to data
                                worldData.set(getBlockKey(nx, ny, nz), item.id);

                                // Update InstancedMesh
                                const chunk = chunks.get(chunkKey);
                                // This is tricky: we need to find an empty slot in the InstancedMesh or add one.
                                // For simplicity, we'll just "recycle" the hidden block we just mined if we want strict performance,
                                // but here we will just find the first hidden block or add to the end.
                                // To keep it simple for this demo, we will just scale up a dummy at the end of the array?
                                // No, InstancedMesh has a fixed count.

                                // Workaround: We will just find the first instance that is scaled to 0 (hidden) and use it.
                                let foundSlot = -1;
                                for (let i = 0; i < chunk.mesh.count; i++) {
                                    const m = new THREE.Matrix4();
                                    chunk.mesh.getMatrixAt(i, m);
                                    const s = new THREE.Vector3();
                                    m.decompose(
                                        new THREE.Vector3(),
                                        new THREE.Quaternion(),
                                        s,
                                    );
                                    if (s.x < 0.1) {
                                        foundSlot = i;
                                        break;
                                    }
                                }

                                if (foundSlot !== -1) {
                                    dummy.position.set(nx, ny, nz);
                                    dummy.scale.set(1, 1, 1);
                                    dummy.updateMatrix();
                                    chunk.mesh.setMatrixAt(
                                        foundSlot,
                                        dummy.matrix,
                                    );
                                    chunk.mesh.setColorAt(
                                        foundSlot,
                                        new THREE.Color(item.color),
                                    );
                                    chunk.mesh.instanceMatrix.needsUpdate = true;
                                    chunk.mesh.instanceColor.needsUpdate = true;

                                    // Update inventory
                                    item.count--;
                                    updateInventoryUI();
                                }
                            }
                        }
                    }
                }
            }

            function createDrop(x, y, z, type) {
                const geo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
                const mat = new THREE.MeshLambertMaterial({
                    color: inventory[type - 1].color,
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, y, z);
                scene.add(mesh);

                drops.push({
                    mesh: mesh,
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 2,
                        2,
                        (Math.random() - 0.5) * 2,
                    ),
                    type: type,
                    rotationSpeed: {
                        x: Math.random() * 5,
                        y: Math.random() * 5,
                    },
                });
            }

            function updateDrops() {
                for (let i = drops.length - 1; i >= 0; i--) {
                    const d = drops[i];

                    // Physics
                    d.velocity.y -= GRAVITY * 0.016; // dt approx
                    d.mesh.position.add(
                        d.velocity.clone().multiplyScalar(0.016),
                    );

                    // Rotation
                    d.mesh.rotation.x += d.rotationSpeed.x * 0.05;
                    d.mesh.rotation.y += d.rotationSpeed.y * 0.05;

                    // Ground Collision
                    if (d.mesh.position.y < 0.2) {
                        d.mesh.position.y = 0.2;
                        d.velocity.y = 0;
                    } else {
                        // Check block collision below
                        const belowY = Math.floor(d.mesh.position.y - 0.5);
                        const bx = Math.round(d.mesh.position.x);
                        const bz = Math.round(d.mesh.position.z);
                        if (worldData.has(getBlockKey(bx, belowY, bz))) {
                            d.mesh.position.y = belowY + 0.5 + 0.2;
                            d.velocity.y = 0;
                        }
                    }

                    // Pickup
                    const dist = camera.position.distanceTo(d.mesh.position);
                    if (dist < 2.5) {
                        // Add to inventory
                        const item = inventory[d.type - 1];
                        item.count++;
                        updateInventoryUI();

                        // Remove drop
                        scene.remove(d.mesh);
                        drops.splice(i, 1);
                    }
                }
            }

            // --- GAME LOOP ---
            function animate() {
                requestAnimationFrame(animate);

                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                if (controls.isLocked) {
                    // Friction
                    velocity.x -= velocity.x * 10.0 * delta;
                    velocity.z -= velocity.z * 10.0 * delta;
                    velocity.y -= GRAVITY * delta;

                    direction.z = Number(moveForward) - Number(moveBackward);
                    direction.x = Number(moveRight) - Number(moveLeft);
                    direction.normalize();

                    if (moveForward || moveBackward)
                        velocity.z -= direction.z * SPEED * delta;
                    if (moveLeft || moveRight)
                        velocity.x -= direction.x * SPEED * delta;

                    // Collision Detection (Simple)
                    const pPos = camera.position.clone();

                    // X Movement
                    controls.moveRight(-velocity.x * delta);
                    if (
                        checkCollision(
                            camera.position.x,
                            camera.position.y - 1,
                            camera.position.z,
                        ) ||
                        checkCollision(
                            camera.position.x,
                            camera.position.y,
                            camera.position.z,
                        )
                    ) {
                        controls.moveRight(velocity.x * delta); // Undo
                        velocity.x = 0;
                    }

                    // Z Movement
                    controls.moveForward(-velocity.z * delta);
                    if (
                        checkCollision(
                            camera.position.x,
                            camera.position.y - 1,
                            camera.position.z,
                        ) ||
                        checkCollision(
                            camera.position.x,
                            camera.position.y,
                            camera.position.z,
                        )
                    ) {
                        controls.moveForward(velocity.z * delta); // Undo
                        velocity.z = 0;
                    }

                    // Y Movement
                    camera.position.y += velocity.y * delta;

                    // Floor Collision
                    if (
                        checkCollision(
                            camera.position.x,
                            camera.position.y - 1.5,
                            camera.position.z,
                        )
                    ) {
                        velocity.y = Math.max(0, velocity.y);
                        camera.position.y =
                            Math.round(camera.position.y - 1.5) + 2.0; // Snap to top of block
                        canJump = true;
                    } else if (camera.position.y < -20) {
                        // Respawn if fell off world
                        camera.position.y = 20;
                        velocity.y = 0;
                    }

                    updateWorld();
                }

                updateDrops();

                prevTime = time;
                renderer.render(scene, camera);
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // Start
            init();
        </script>
    </body>
</html>
