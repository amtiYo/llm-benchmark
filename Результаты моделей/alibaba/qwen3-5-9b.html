<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0,0,0,0.5);
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10;

        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 10px; left: 10px; color: white; z-index: 5;
            text-shadow: 1px 1px 2px black; pointer-events: none;
        }
        .instructions { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: auto; }
        .instructions h3 { margin: 0 0 5px 0; }
        .instructions p { margin: 2px 0; font-size: 0.9em; }

        /* Inventory Bar */
        #inventory {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 8px;
            border-radius: 8px; display: none; /* Hidden until play start */
        }
        .inv-slot {
            width: 40px; height: 40px; border: 2px solid #555; background: rgba(20,20,20,0.8);
            color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;

        .inv-slot.active { border-color: #fff; box-shadow: 0 0 10px white; }
        .slot-label { font-size: 0.7em; position: absolute; bottom: 2px; left: 2px; opacity: 0.7; }

    </style>
</head>

// 2D Simplex-like noise approximation for terrain generation
function SimplexNoise(seed) {
    const p = new Uint8Array(256);
    const grad4 = [1, 1, -1, -1];
    for (let i = 0; i < 256; i++) p[i] = Math.floor(Math.random() * 256);

    return {
        grad3: function(hash, x, y, z) {
            const h = hash & 7;
            const u = h < 4 ? x : y;
            const v = h < 4 ? y : x;
            return grad4[hash >>> 2 & 3] * (u > 0 ? u : -u) + grad4[hash >>> 1 & 3] * (v > 0 ? v : -v);
        },
        noise: function(x, y) {
            let n0, n1, n2;
            const s = (x + y) * 4;
            const i0 = Math.floor(s) & 255;
            const i1 = Math.floor(i0) & 255;
            const i2 = Math.floor(i0 >> 2) & 255;
            const i3 = Math.floor(s >> 1) & 255;
            const s0 = Math.floor((x & 1) * 255);
            const s1 = Math.floor((y & 1) * 255);
            const t0 = (i0 + x) & 255;
            const t1 = (t0 + y) & 255;
            return (Math.pow(p[(i2 + t0) & 255] + s0, 2) + x + Math.pow(p[(i3 + t1) & 255] + s1, 2) + y) / 32;
        }
    };
}

// Generate textures programmatically to avoid CORS issues
function createTexture(colorHex) {
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    const baseColor = parseInt(colorHex);

    // Base fill
    ctx.fillStyle = '#' + baseColor.toString(16).padStart(6, '0');
    ctx.fillRect(0,0,64,64);

    // Adds slight noise
    ctx.fillStyle = "rgba(0,0,0,0.1)";
    for(let i=0; i<20; i++) {
        ctx.fillRect(Math.random()*64, Math.random()*64, 4, 4);
    }
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    ctx.fillRect(Math.random()*64, Math.random()*64, 4, 4);

    const texture = new THREE.CanvasTexture(canvas);
    texture.magFilter = THREE.NearestFilter; // Retro look
    return texture;
}

    }
    return data;
}
