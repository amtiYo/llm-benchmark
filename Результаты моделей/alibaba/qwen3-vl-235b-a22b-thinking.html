<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Sandbox - 3D Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a192f;
            color: #e6f1ff;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 12px;
            max-width: 300px;
            z-index: 10;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .inventory-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        
        .inventory-slot {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #4a6fa5;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .inventory-slot:hover {
            border-color: #6495ed;
            transform: translateY(-3px);
        }
        
        .inventory-slot.active {
            border-color: #00ffaa;
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.5);
        }
        
        .block-icon {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        
        .count {
            font-size: 12px;
            font-weight: bold;
        }
        
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin-top: -10px;
            margin-left: -10px;
            pointer-events: none;
            z-index: 5;
        }
        
        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        
        .crosshair::before {
            width: 2px;
            height: 12px;
            left: 9px;
            top: 4px;
        }
        
        .crosshair::after {
            width: 12px;
            height: 2px;
            left: 4px;
            top: 9px;
        }
        
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        
        .message.show {
            opacity: 1;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }
        
        .loading-fill {
            height: 100%;
            width: 0%;
            background: #00ffaa;
            transition: width 0.3s;
        }
        
        .instructions-title {
            color: #00ffaa;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .control {
            display: flex;
            gap: 8px;
            margin-bottom: 5px;
        }
        
        .key {
            background: #4a6fa5;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        .block-preview {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .preview-icon {
            width: 40px;
            height: 40px;
            border-radius: 4px;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
        }
        
        .game-over h2 {
            color: #ff4444;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 18px;
            margin-bottom: 25px;
            max-width: 400px;
        }
        
        .btn {
            background: #00ffaa;
            color: #0a192f;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #00cc88;
            transform: translateY(-2px);
        }
        
        .health-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 200px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            z-index: 10;
        }
        
        .health-fill {
            height: 100%;
            width: 100%;
            background: #ff4444;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="crosshair"></div>
        <div id="instructions">
            <div class="instructions-title">Controls</div>
            <div class="control"><span class="key">WASD</span> - Move</div>
            <div class="control"><span class="key">Space</span> - Jump</div>
            <div class="control"><span class="key">Left Click</span> - Break Blocks</div>
            <div class="control"><span class="key">Right Click</span> - Place Blocks</div>
            <div class="control"><span class="key">1-9</span> - Select Inventory Slot</div>
            <div class="control"><span class="key">E</span> - Toggle Inventory</div>
        </div>
        <div class="inventory-container" id="inventory">
            <!-- Inventory slots will be generated here -->
        </div>
        <div class="block-preview" id="block-preview">
            <div class="preview-icon" style="background: #8B4513;"></div>
        </div>
        <div class="message" id="message">Welcome to Voxel World!</div>
        <div class="loading" id="loading">
            <div>Loading World...</div>
            <div class="loading-bar">
                <div class="loading-fill" id="loading-fill"></div>
            </div>
        </div>
        <div class="health-bar">
            <div class="health-fill" id="health-fill"></div>
        </div>
        <div class="game-over" id="game-over">
            <h2>Game Over</h2>
            <p>You fell into the void! The world is infinite but the void is unforgiving.</p>
            <button class="btn" id="restart-btn">Restart Game</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game state
        const gameState = {
            inventory: [
                { type: 'dirt', count: 0, color: '#8B4513' },
                { type: 'grass', count: 0, color: '#228B22' },
                { type: 'stone', count: 0, color: '#808080' },
                { type: 'wood', count: 0, color: '#A0522D' },
                { type: 'leaves', count: 0, color: '#006400' },
                { type: 'sand', count: 0, color: '#F4A460' },
                { type: 'water', count: 0, color: '#1E90FF' },
                { type: 'lava', count: 0, color: '#FF4500' },
                { type: 'gold', count: 0, color: '#FFD700' }
            ],
            activeSlot: 0,
            health: 100,
            worldGenerated: false,
            gameOver: false
        };

        // Game elements
        const container = document.getElementById('game-container');
        const inventoryContainer = document.getElementById('inventory');
        const blockPreview = document.getElementById('block-preview');
        const messageElement = document.getElementById('message');
        const loadingElement = document.getElementById('loading');
        const loadingFill = document.getElementById('loading-fill');
        const healthFill = document.getElementById('health-fill');
        const gameOverElement = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart-btn');

        // Initialize inventory UI
        function initInventory() {
            inventoryContainer.innerHTML = '';
            gameState.inventory.forEach((item, index) => {
                const slot = document.createElement('div');
                slot.className = `inventory-slot ${index === gameState.activeSlot ? 'active' : ''}`;
                slot.dataset.index = index;
                
                slot.innerHTML = `
                    <div class="block-icon" style="background: ${item.color};"></div>
                    <div class="count">${item.count}</div>
                `;
                
                slot.addEventListener('click', () => {
                    gameState.activeSlot = index;
                    updateInventoryUI();
                });
                
                inventoryContainer.appendChild(slot);
            });
            
            // Update preview
            const previewIcon = blockPreview.querySelector('.preview-icon');
            previewIcon.style.background = gameState.inventory[gameState.activeSlot].color;
        }

        function updateInventoryUI() {
            document.querySelectorAll('.inventory-slot').forEach((slot, index) => {
                slot.classList.toggle('active', index === gameState.activeSlot);
                const countElement = slot.querySelector('.count');
                countElement.textContent = gameState.inventory[index].count;
            });
            
            // Update block preview
            const previewIcon = blockPreview.querySelector('.preview-icon');
            previewIcon.style.background = gameState.inventory[gameState.activeSlot].color;
        }

        function showMessage(text, duration = 2000) {
            messageElement.textContent = text;
            messageElement.classList.add('show');
            
            setTimeout(() => {
                messageElement.classList.remove('show');
            }, duration);
        }

        // Three.js setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a2b3c, 100, 200);
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(0, 5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 1.2);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(100, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);
        
        // Player setup
        const player = {
            position: new THREE.Vector3(0, 10, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            onGround: false,
            jumpCooldown: 0
        };
        
        // Physics parameters
        const GRAVITY = 0.08;
        const JUMP_STRENGTH = 0.6;
        const MOVE_SPEED = 0.15;
        const FRICTION = 0.85;
        
        // World generation parameters
        const CHUNK_SIZE = 16;
        const WORLD_SIZE = 5; // Number of chunks in each direction
        const MAX_HEIGHT = 64;
        const MIN_HEIGHT = 10;
        
        // World data structure
        const world = {};
        
        // Block types
        const BLOCK_TYPES = {
            AIR: 0,
            DIRT: 1,
            GRASS: 2,
            STONE: 3,
            WOOD: 4,
            LEAVES: 5,
            SAND: 6,
            WATER: 7,
            LAVA: 8,
            GOLD: 9
        };
        
        // Block properties
        const BLOCK_PROPERTIES = {
            [BLOCK_TYPES.DIRT]: { color: 0x8B4513, name: 'Dirt' },
            [BLOCK_TYPES.GRASS]: { color: 0x228B22, name: 'Grass' },
            [BLOCK_TYPES.STONE]: { color: 0x808080, name: 'Stone' },
            [BLOCK_TYPES.WOOD]: { color: 0xA0522D, name: 'Wood' },
            [BLOCK_TYPES.LEAVES]: { color: 0x006400, name: 'Leaves' },
            [BLOCK_TYPES.SAND]: { color: 0xF4A460, name: 'Sand' },
            [BLOCK_TYPES.WATER]: { color: 0x1E90FF, name: 'Water', transparent: true },
            [BLOCK_TYPES.LAVA]: { color: 0xFF4500, name: 'Lava', transparent: true },
            [BLOCK_TYPES.GOLD]: { color: 0xFFD700, name: 'Gold' }
        };
        
        // Item drops
        const items = [];
        
        // Generate noise for terrain
        function getNoise(x, z) {
            return Math.sin(x * 0.1) * Math.cos(z * 0.1) * 5 + 
                   Math.sin(x * 0.05) * Math.cos(z * 0.05) * 10;
        }
        
        // Generate a chunk
        function generateChunk(chunkX, chunkZ) {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const uvs = [];
            
            // Create a grid of vertices for the chunk
            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    // Calculate world position
                    const worldX = chunkX * CHUNK_SIZE + x;
                    const worldZ = chunkZ * CHUNK_SIZE + z;
                    
                    // Get terrain height
                    let height = 20 + getNoise(worldX, worldZ);
                    height = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, height));
                    
                    // Generate terrain
                    for (let y = 0; y < height; y++) {
                        let blockType = BLOCK_TYPES.DIRT;
                        
                        // Surface layer
                        if (y === height - 1) {
                            blockType = BLOCK_TYPES.GRASS;
                        }
                        // Stone layer
                        else if (y < 15) {
                            blockType = BLOCK_TYPES.STONE;
                        }
                        // Random features
                        else if (Math.random() < 0.02) {
                            blockType = BLOCK_TYPES.GOLD;
                        }
                        else if (Math.random() < 0.05) {
                            blockType = BLOCK_TYPES.SAND;
                        }
                        
                        // Add block to world data
                        if (!world[worldX]) world[worldX] = {};
                        if (!world[worldX][worldZ]) world[worldX][worldZ] = {};
                        world[worldX][worldZ][y] = blockType;
                        
                        // Add to geometry
                        addBlockToGeometry(positions, colors, uvs, worldX, y, worldZ, blockType);
                    }
                }
            }
            
            // Create the mesh
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            
            const material = new THREE.MeshBasicMaterial({
                vertexColors: true,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 1
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            
            return { mesh, chunkX, chunkZ };
        }
        
        // Add a single block to geometry
        function addBlockToGeometry(positions, colors, uvs, x, y, z, blockType) {
            const color = new THREE.Color(BLOCK_PROPERTIES[blockType].color);
            
            // Front face
            positions.push(x, y, z+1, x+1, y, z+1, x+1, y+1, z+1, x, y+1, z+1);
            colors.push(color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b);
            
            // Back face
            positions.push(x+1, y, z, x, y, z, x, y+1, z, x+1, y+1, z);
            colors.push(color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b);
            
            // Left face
            positions.push(x, y, z, x, y, z+1, x, y+1, z+1, x, y+1, z);
            colors.push(color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b);
            
            // Right face
            positions.push(x+1, y, z+1, x+1, y, z, x+1, y+1, z, x+1, y+1, z+1);
            colors.push(color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b);
            
            // Top face
            positions.push(x, y+1, z, x+1, y+1, z, x+1, y+1, z+1, x, y+1, z+1);
            colors.push(color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b);
            
            // Bottom face
            positions.push(x+1, y, z, x, y, z, x, y, z+1, x+1, y, z+1);
            colors.push(color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b, color.r, color.g, color.b);
        }
        
        // Check if a position is solid
        function isSolid(x, y, z) {
            // Check world boundaries
            if (x < 0 || z < 0) return true;
            
            // Check if block exists and is solid
            return world[x] && world[x][z] && world[x][z][y] && world[x][z][y] !== BLOCK_TYPES.AIR;
        }
        
        // Create an item drop
        function createItemDrop(x, y, z, blockType) {
            const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const material = new THREE.MeshBasicMaterial({ 
                color: BLOCK_PROPERTIES[blockType].color,
                transparent: true,
                opacity: 0.9
            });
            
            const item = new THREE.Mesh(geometry, material);
            item.position.set(x + 0.5, y + 0.5, z + 0.5);
            item.userData = {
                type: blockType,
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    0.5 + Math.random() * 0.3,
                    (Math.random() - 0.5) * 0.2
                ),
                rotationSpeed: new THREE.Vector3(
                    Math.random() * 0.2,
                    Math.random() * 0.2,
                    Math.random() * 0.2
                )
            };
            
            scene.add(item);
            items.push(item);
        }
        
        // Handle block breaking
        function breakBlock(intersection) {
            if (!intersection) return;
            
            const { blockX, blockY, blockZ } = getBlockCoordinates(intersection.point);
            
            // Check if block is valid
            if (!world[blockX] || !world[blockX][blockZ] || !world[blockX][blockZ][blockY]) {
                return;
            }
            
            const blockType = world[blockX][blockZ][blockY];
            
            // Don't break air
            if (blockType === BLOCK_TYPES.AIR) return;
            
            // Create item drop
            createItemDrop(blockX, blockY, blockZ, blockType);
            
            // Remove block from world
            delete world[blockX][blockZ][blockY];
            
            // Update inventory
            const inventoryIndex = gameState.inventory.findIndex(item => 
                item.type === Object.keys(BLOCK_TYPES).find(key => BLOCK_TYPES[key] === blockType).toLowerCase()
            );
            
            if (inventoryIndex !== -1) {
                gameState.inventory[inventoryIndex].count++;
                updateInventoryUI();
                showMessage(`Collected ${BLOCK_PROPERTIES[blockType].name}`);
            }
            
            // Regenerate chunk
            const chunkX = Math.floor(blockX / CHUNK_SIZE);
            const chunkZ = Math.floor(blockZ / CHUNK_SIZE);
            regenerateChunk(chunkX, chunkZ);
        }
        
        // Regenerate a chunk
        function regenerateChunk(chunkX, chunkZ) {
            // Remove existing chunk
            scene.children.forEach(child => {
                if (child.userData.chunkX === chunkX && child.userData.chunkZ === chunkZ) {
                    scene.remove(child);
                }
            });
            
            // Generate new chunk
            generateChunk(chunkX, chunkZ);
        }
        
        // Place block
        function placeBlock(intersection) {
            if (!intersection) return;
            
            const { blockX, blockY, blockZ } = getBlockCoordinates(intersection.point);
            const activeItem = gameState.inventory[gameState.activeSlot];
            
            // Check if we have items to place
            if (activeItem.count <= 0) return;
            
            // Determine where to place the block (on the face we're looking at)
            let placeX = blockX;
            let placeY = blockY;
            let placeZ = blockZ;
            
            // Adjust based on intersection normal
            if (intersection.face.normal.x !== 0) placeX += Math.sign(intersection.face.normal.x);
            if (intersection.face.normal.y !== 0) placeY += Math.sign(intersection.face.normal.y);
            if (intersection.face.normal.z !== 0) placeZ += Math.sign(intersection.face.normal.z);
            
            // Check if position is valid
            if (placeY < 0 || placeY >= MAX_HEIGHT) return;
            
            // Check if block is already there
            if (world[placeX] && world[placeX][placeZ] && world[placeX][placeZ][placeY]) {
                return;
            }
            
            // Place block in world
            if (!world[placeX]) world[placeX] = {};
            if (!world[placeX][placeZ]) world[placeX][placeZ] = {};
            world[placeX][placeZ][placeY] = BLOCK_TYPES[activeItem.type.toUpperCase()];
            
            // Update inventory
            activeItem.count--;
            updateInventoryUI();
            
            // Regenerate chunk
            const chunkX = Math.floor(placeX / CHUNK_SIZE);
            const chunkZ = Math.floor(placeZ / CHUNK_SIZE);
            regenerateChunk(chunkX, chunkZ);
            
            showMessage(`Placed ${activeItem.type}`);
        }
        
        // Get block coordinates from world point
        function getBlockCoordinates(point) {
            return {
                blockX: Math.floor(point.x),
                blockY: Math.floor(point.y),
                blockZ: Math.floor(point.z)
            };
        }
        
        // Raycasting for block interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function checkBlockInteraction() {
            // Set raycaster from camera
            raycaster.setFromCamera(mouse, camera);
            
            // Check for intersections
            const intersects = raycaster.intersectObjects(scene.children);
            let validIntersection = null;
            
            // Find the first valid block intersection
            for (const intersect of intersects) {
                if (intersect.object.geometry.attributes.position) {
                    validIntersection = intersect;
                    break;
                }
            }
            
            return validIntersection;
        }
        
        // Player movement
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            space: false
        };
        
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'w') keys.w = true;
            if (e.key.toLowerCase() === 'a') keys.a = true;
            if (e.key.toLowerCase() === 's') keys.s = true;
            if (e.key.toLowerCase() === 'd') keys.d = true;
            if (e.key === ' ') keys.space = true;
            
            // Inventory slot selection
            const slot = parseInt(e.key) - 1;
            if (slot >= 0 && slot < 9) {
                gameState.activeSlot = slot;
                updateInventoryUI();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'w') keys.w = false;
            if (e.key.toLowerCase() === 'a') keys.a = false;
            if (e.key.toLowerCase() === 's') keys.s = false;
            if (e.key.toLowerCase() === 'd') keys.d = false;
            if (e.key === ' ') keys.space = false;
        });
        
        // Mouse controls
        let isPointerLocked = false;
        let yaw = 0;
        let pitch = 0;
        
        container.addEventListener('click', () => {
            if (!isPointerLocked) {
                renderer.domElement.requestPointerLock();
            }
        });
        
        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = document.pointerLockElement === renderer.domElement;
            if (!isPointerLocked) {
                yaw = 0;
                pitch = 0;
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (isPointerLocked) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                
                // Limit pitch
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            }
        });
        
        // Mouse click handling
        document.addEventListener('mousedown', (e) => {
            if (!isPointerLocked) return;
            
            const intersection = checkBlockInteraction();
            
            if (e.button === 0) { // Left click - break block
                breakBlock(intersection);
            } else if (e.button === 2) { // Right click - place block
                placeBlock(intersection);
            }
        });
        
        // Prevent context menu
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });
        
        // Game loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Update player movement
            updatePlayer();
            
            // Update item drops
            updateItems();
            
            // Update camera position
            updateCamera();
            
            // Check game over condition
            if (player.position.y < 0 && !gameState.gameOver) {
                gameOver();
            }
            
            renderer.render(scene, camera);
        }
        
        function updatePlayer() {
            // Apply gravity
            player.velocity.y -= GRAVITY;
            
            // Check if on ground
            const onGround = isSolid(
                Math.floor(player.position.x),
                Math.floor(player.position.y - 1),
                Math.floor(player.position.z)
            );
            
            if (onGround) {
                player.velocity.y = Math.max(0, player.velocity.y);
                player.onGround = true;
            } else {
                player.onGround = false;
            }
            
            // Handle jumping
            if (keys.space && player.onGround && player.jumpCooldown <= 0) {
                player.velocity.y = JUMP_STRENGTH;
                player.jumpCooldown = 15;
                player.onGround = false;
            }
            
            if (player.jumpCooldown > 0) player.jumpCooldown--;
            
            // Handle movement
            let moveX = 0;
            let moveZ = 0;
            
            if (keys.w) moveZ -= 1;
            if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            
            // Normalize diagonal movement
            if (moveX !== 0 && moveZ !== 0) {
                moveX *= 0.7071;
                moveZ *= 0.7071;
            }
            
            // Apply movement with rotation
            const moveDirection = new THREE.Vector3(moveX, 0, moveZ);
            moveDirection.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            
            player.velocity.x = moveDirection.x * MOVE_SPEED;
            player.velocity.z = moveDirection.z * MOVE_SPEED;
            
            // Apply friction
            player.velocity.x *= FRICTION;
            player.velocity.z *= FRICTION;
            player.velocity.y *= FRICTION;
            
            // Update position
            player.position.x += player.velocity.x;
            player.position.y += player.velocity.y;
            player.position.z += player.velocity.z;
            
            // Simple collision with world
            const px = Math.floor(player.position.x);
            const py = Math.floor(player.position.y);
            const pz = Math.floor(player.position.z);
            
            if (isSolid(px, py, pz)) {
                // Move back if inside a block
                player.position.x -= player.velocity.x;
                player.position.z -= player.velocity.z;
                player.velocity.x = 0;
                player.velocity.z = 0;
            }
            
            // Keep player above ground
            if (!onGround && player.position.y < 1) {
                player.position.y = 1;
            }
        }
        
        function updateItems() {
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                
                // Apply gravity
                item.userData.velocity.y -= GRAVITY * 0.5;
                
                // Update position
                item.position.x += item.userData.velocity.x;
                item.position.y += item.userData.velocity.y;
                item.position.z += item.userData.velocity.z;
                
                // Rotate
                item.rotation.x += item.userData.rotationSpeed.x;
                item.rotation.y += item.userData.rotationSpeed.y;
                item.rotation.z += item.userData.rotationSpeed.z;
                
                // Check collision with ground
                const ix = Math.floor(item.position.x);
                const iy = Math.floor(item.position.y);
                const iz = Math.floor(item.position.z);
                
                if (isSolid(ix, iy - 1, iz)) {
                    item.position.y = iy;
                    item.userData.velocity.y = 0;
                    
                    // Check if player is close to item
                    const distance = player.position.distanceTo(item.position);
                    if (distance < 1.5) {
                        // Add to inventory
                        const blockType = item.userData.type;
                        const inventoryIndex = gameState.inventory.findIndex(item => 
                            item.type === Object.keys(BLOCK_TYPES).find(key => BLOCK_TYPES[key] === blockType).toLowerCase()
                        );
                        
                        if (inventoryIndex !== -1) {
                            gameState.inventory[inventoryIndex].count++;
                            updateInventoryUI();
                            showMessage(`Collected ${BLOCK_PROPERTIES[blockType].name}`);
                        }
                        
                        // Remove item
                        scene.remove(item);
                        items.splice(i, 1);
                    }
                }
                
                // Remove items that fall too far
                if (item.position.y < -10) {
                    scene.remove(item);
                    items.splice(i, 1);
                }
            }
        }
        
        function updateCamera() {
            // Position camera at player position
            camera.position.copy(player.position);
            camera.position.y += 1.6; // Eye height
            
            // Apply rotation
            camera.rotation.set(0, 0, 0);
            camera.rotateY(yaw);
            camera.rotateX(pitch);
        }
        
        function gameOver() {
            gameState.gameOver = true;
            gameState.health = 0;
            healthFill.style.width = '0%';
            
            // Show game over screen
            gameOverElement.style.display = 'block';
            
            // Reset player position
            player.position.set(0, 10, 0);
            player.velocity.set(0, 0, 0);
        }
        
        // Initialize game
        function initGame() {
            // Hide loading screen
            loadingElement.style.display = 'none';
            gameState.worldGenerated = true;
            
            // Show welcome message
            showMessage("Welcome to Voxel World! Start mining to collect resources", 4000);
            
            // Generate initial chunks
            for (let x = -WORLD_SIZE; x <= WORLD_SIZE; x++) {
                for (let z = -WORLD_SIZE; z <= WORLD_SIZE; z++) {
                    generateChunk(x, z);
                }
            }
            
            // Initialize inventory UI
            initInventory();
            
            // Start game loop
            animate();
            
            // Set initial player position
            player.position.set(0, 30, 0);
            camera.position.set(0, 31.6, 0);
        }
        
        // Restart game
        restartBtn.addEventListener('click', () => {
            gameOverElement.style.display = 'none';
            gameState.gameOver = false;
            gameState.health = 100;
            healthFill.style.width = '100%';
            
            // Clear world
            scene.children.forEach(child => {
                if (child.geometry) {
                    scene.remove(child);
                }
            });
            
            // Reset world data
            for (const x in world) {
                delete world[x];
            }
            
            // Regenerate world
            for (let x = -WORLD_SIZE; x <= WORLD_SIZE; x++) {
                for (let z = -WORLD_SIZE; z <= WORLD_SIZE; z++) {
                    generateChunk(x, z);
                }
            }
            
            // Reset player
            player.position.set(0, 30, 0);
            player.velocity.set(0, 0, 0);
            camera.position.set(0, 31.6, 0);
            
            // Reset inventory
            gameState.inventory.forEach(item => {
                item.count = 0;
            });
            updateInventoryUI();
        });
        
        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Simulate loading
        let loadingProgress = 0;
        const loadingInterval = setInterval(() => {
            loadingProgress += 5;
            loadingFill.style.width = `${loadingProgress}%`;
            
            if (loadingProgress >= 100) {
                clearInterval(loadingInterval);
                setTimeout(initGame, 500);
            }
        }, 100);
        
        // Initial setup
        initInventory();
    </script>
</body>
</html>
