<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Voxel Sandbox</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: "Courier New", Courier, monospace;
                user-select: none;
            }

            /* HUD Overlay */
            #ui-container {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 10px;
                pointer-events: none; /* Let clicks pass through to canvas if needed */
            }

            .slot {
                width: 50px;
                height: 50px;
                background: rgba(0, 0, 0, 0.5);
                border: 2px solid #555;
                color: white;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                position: relative;
            }

            .slot.active {
                border-color: #ffff00;
                background: rgba(50, 50, 0, 0.6);
            }

            .slot-count {
                position: absolute;
                top: 2px;
                right: 4px;
                font-weight: bold;
            }

            .slot-icon {
                width: 20px;
                height: 20px;
                margin-bottom: 2px;
            }

            /* Crosshair */
            #crosshair {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 10px;
                height: 10px;
                background: transparent;
                border: 2px solid rgba(255, 255, 255, 0.8);
                border-radius: 50%;
                transform: translate(-50%, -50%);
                pointer-events: none;
            }

            /* Instructions */
            #instructions {
                position: absolute;
                top: 10px;
                left: 10px;
                color: white;
                background: rgba(0, 0, 0, 0.5);
                padding: 10px;
                border-radius: 5px;
            }
        </style>
    </head>
    <body>
        <!-- UI Elements -->
        <div id="crosshair"></div>

        <div id="instructions">
            <b>Click to Start</b><br />
            WASD: Move | SPACE: Jump<br />
            LMB: Mine Block | RMB: Place Block<br />
            1-3: Select Item
        </div>

        <div id="ui-container">
            <!-- Slots generated by JS -->
        </div>

        <!-- Import Three.js -->
        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";
            import { SimplexNoise } from "three/addons/math/SimplexNoise.js"; // Note: SimplexNoise isn't standard in addons, we'll implement a simple one below or use Math.sin

            // --- CONFIGURATION ---
            const CHUNK_SIZE = 16;
            const WORLD_HEIGHT = 32;
            const BLOCK_SIZE = 1;

            // Block Types Definition
            const BLOCKS = {
                AIR: 0,
                GRASS: 1,
                DIRT: 2,
                STONE: 3,
                WOOD: 4,
            };

            const BLOCK_PROPS = {
                [BLOCKS.GRASS]: { color: 0x55aa55, name: "Grass" },
                [BLOCKS.DIRT]: { color: 0x885533, name: "Dirt" },
                [BLOCKS.STONE]: { color: 0x777777, name: "Stone" },
                [BLOCKS.WOOD]: { color: 0x8b4513, name: "Wood" },
            };

            // Inventory State
            let inventory = {
                [BLOCKS.GRASS]: 0,
                [BLOCKS.DIRT]: 0,
                [BLOCKS.STONE]: 0,
                [BLOCKS.WOOD]: 0,
            };
            let selectedBlockType = BLOCKS.GRASS;

            // --- SCENE SETUP ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Sky blue
            scene.fog = new THREE.Fog(0x87ceeb, 10, 60);

            const camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000,
            );

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // --- WORLD DATA & GENERATION ---
            // Map key: "x,y,z", Value: Mesh object
            const worldData = new Map();
            const dummyMesh = new THREE.Mesh(); // Helper for positioning

            // Shared Geometry/Materials for performance
            const boxGeometry = new THREE.BoxGeometry(
                BLOCK_SIZE,
                BLOCK_SIZE,
                BLOCK_SIZE,
            );
            const materials = {};
            for (const [id, prop] of Object.entries(BLOCK_PROPS)) {
                materials[id] = new THREE.MeshStandardMaterial({
                    color: prop.color,
                });
            }

            // Simple pseudo-random noise function
            function noise(x, z) {
                return (
                    Math.sin(x / 15) * Math.cos(z / 15) * 5 +
                    Math.sin(x / 5) * Math.cos(z / 5) * 2
                );
            }

            function getBlockKey(x, y, z) {
                return `${x},${y},${z}`;
            }

            function createBlock(x, y, z, typeId) {
                const key = getBlockKey(x, y, z);
                if (worldData.has(key)) return; // Already exists

                const material = materials[typeId];
                const mesh = new THREE.Mesh(boxGeometry, material);
                mesh.position.set(x, y, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                // Store metadata on the mesh for raycasting
                mesh.userData = { isBlock: true, type: typeId, x, y, z };

                scene.add(mesh);
                worldData.set(key, mesh);
            }

            function removeBlock(mesh) {
                const key = getBlockKey(
                    mesh.userData.x,
                    mesh.userData.y,
                    mesh.userData.z,
                );
                worldData.delete(key);
                scene.remove(mesh);

                // Create Drop
                spawnDrop(
                    mesh.userData.x,
                    mesh.userData.y + 0.5,
                    mesh.userData.z,
                    mesh.userData.type,
                );
            }

            function generateChunk(cx, cz) {
                for (let x = cx * CHUNK_SIZE; x < (cx + 1) * CHUNK_SIZE; x++) {
                    for (
                        let z = cz * CHUNK_SIZE;
                        z < (cz + 1) * CHUNK_SIZE;
                        z++
                    ) {
                        // Terrain Height
                        const h = Math.floor(noise(x, z));

                        // Bedrock up to height
                        for (let y = -5; y <= h; y++) {
                            let type = BLOCKS.STONE;
                            if (y === h) type = BLOCKS.GRASS;
                            else if (y > h - 3) type = BLOCKS.DIRT;

                            createBlock(x, y, z, type);
                        }

                        // Trees (Simple random chance)
                        if (Math.random() < 0.02 && h > -2) {
                            createTree(x, h + 1, z);
                        }
                    }
                }
            }

            function createTree(x, y, z) {
                // Trunk
                for (let i = 0; i < 4; i++)
                    createBlock(x, y + i, z, BLOCKS.WOOD);
                // Leaves (using Grass blocks for simplicity in this demo)
                for (let lx = x - 1; lx <= x + 1; lx++) {
                    for (let lz = z - 1; lz <= z + 1; lz++) {
                        createBlock(lx, y + 3, lz, BLOCKS.GRASS);
                        createBlock(lx, y + 4, lz, BLOCKS.GRASS);
                    }
                }
                createBlock(x, y + 5, z, BLOCKS.GRASS);
            }

            // Initial Generation
            generateChunk(0, 0);
            generateChunk(1, 0);
            generateChunk(-1, 0);
            generateChunk(0, 1);
            generateChunk(0, -1);

            // --- PHYSICS & PLAYER CONTROLS ---
            const controls = new PointerLockControls(camera, document.body);
            const player = {
                velocity: new THREE.Vector3(),
                direction: new THREE.Vector3(),
                speed: 10,
                jumpForce: 12,
                gravity: 30,
                height: 1.6,
                radius: 0.3,
                onGround: false,
            };

            // Input handling
            const keys = {
                w: false,
                a: false,
                s: false,
                d: false,
                space: false,
            };

            document.addEventListener("keydown", (e) => {
                switch (e.code) {
                    case "KeyW":
                        keys.w = true;
                        break;
                    case "KeyA":
                        keys.a = true;
                        break;
                    case "KeyS":
                        keys.s = true;
                        break;
                    case "KeyD":
                        keys.d = true;
                        break;
                    case "Space":
                        if (player.onGround)
                            player.velocity.y = player.jumpForce;
                        break;
                    case "Digit1":
                        selectSlot(0);
                        break;
                    case "Digit2":
                        selectSlot(1);
                        break;
                    case "Digit3":
                        selectSlot(2);
                        break;
                    case "Digit4":
                        selectSlot(3);
                        break;
                }
            });

            document.addEventListener("keyup", (e) => {
                switch (e.code) {
                    case "KeyW":
                        keys.w = false;
                        break;
                    case "KeyA":
                        keys.a = false;
                        break;
                    case "KeyS":
                        keys.s = false;
                        break;
                    case "KeyD":
                        keys.d = false;
                        break;
                }
            });

            // Click to lock
            document.body.addEventListener("click", () => {
                controls.lock();
            });

            // Collision Detection (AABB vs Voxel Grid)
            function checkCollision(newPos) {
                // Check surrounding blocks
                const minX = Math.floor(newPos.x - player.radius);
                const maxX = Math.floor(newPos.x + player.radius);
                const minY = Math.floor(newPos.y - player.height); // Feet
                const maxY = Math.floor(newPos.y + 0.1); // Head
                const minZ = Math.floor(newPos.z - player.radius);
                const maxZ = Math.floor(newPos.z + player.radius);

                for (let x = minX; x <= maxX; x++) {
                    for (let y = minY; y <= maxY; y++) {
                        for (let z = minZ; z <= maxZ; z++) {
                            if (worldData.has(getBlockKey(x, y, z))) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            // --- GAMEPLAY LOOP LOGIC (Mining/Building/Drops) ---

            // Drops System
            const drops = []; // Array of drop objects { mesh, velocity, type, age }
            const dropGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);

            function spawnDrop(x, y, z, type) {
                const mat = materials[type].clone();
                mat.emissive = new THREE.Color(0x333333); // Highlight slightly

                const mesh = new THREE.Mesh(dropGeo, mat);
                mesh.position.set(x, y, z);
                mesh.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                );

                scene.add(mesh);

                drops.push({
                    mesh: mesh,
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 2,
                        5,
                        (Math.random() - 0.5) * 2,
                    ), // Pop up
                    type: type,
                    grounded: false,
                });
            }

            function updateDrops(dt) {
                for (let i = drops.length - 1; i >= 0; i--) {
                    const drop = drops[i];

                    // Gravity
                    if (!drop.grounded) {
                        drop.velocity.y -= 20 * dt;
                    }

                    // Apply movement
                    drop.mesh.position.addScaledVector(drop.velocity, dt);
                    drop.mesh.rotation.x += 2 * dt;
                    drop.mesh.rotation.y += 2 * dt;

                    // Ground collision for drops
                    const floorY = Math.floor(drop.mesh.position.y - 0.2);
                    const key = getBlockKey(
                        Math.round(drop.mesh.position.x),
                        floorY,
                        Math.round(drop.mesh.position.z),
                    );

                    if (worldData.has(key)) {
                        drop.mesh.position.y = floorY + 0.5 + 0.15; // Snap to top
                        drop.velocity.set(0, 0, 0);
                        drop.grounded = true;
                    }

                    // Pickup Logic
                    const dist = camera.position.distanceTo(drop.mesh.position);
                    if (dist < 2.5) {
                        // Collect
                        inventory[drop.type]++;
                        updateUI();
                        scene.remove(drop.mesh);
                        drops.splice(i, 1);
                        continue;
                    }
                }
            }

            // Interaction (Raycaster)
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2(0, 0); // Center of screen

            document.addEventListener("mousedown", (event) => {
                if (!controls.isLocked) return;

                raycaster.setFromCamera(mouse, camera);
                // Raycast against world blocks AND drops (though we only care about blocks here)
                const intersects = raycaster.intersectObjects(scene.children);

                if (intersects.length > 0) {
                    const hit = intersects.find(
                        (i) => i.object.userData.isBlock,
                    );

                    if (hit) {
                        if (event.button === 0) {
                            // Left Click: Break
                            removeBlock(hit.object);
                        } else if (event.button === 2) {
                            // Right Click: Place
                            if (inventory[selectedBlockType] > 0) {
                                const pos = hit.point
                                    .add(hit.face.normal.multiplyScalar(0.5))
                                    .floor();

                                // Prevent placing inside player
                                const pPos = camera.position.clone();
                                // Simple distance check to avoid getting stuck
                                if (pos.distanceTo(pPos) > 1.5) {
                                    createBlock(
                                        pos.x,
                                        pos.y,
                                        pos.z,
                                        selectedBlockType,
                                    );
                                    inventory[selectedBlockType]--;
                                    updateUI();
                                }
                            }
                        }
                    }
                }
            });

            // --- UI SYSTEM ---
            const uiContainer = document.getElementById("ui-container");
            const slotTypes = [
                BLOCKS.GRASS,
                BLOCKS.DIRT,
                BLOCKS.STONE,
                BLOCKS.WOOD,
            ];

            function initUI() {
                slotTypes.forEach((type, index) => {
                    const slot = document.createElement("div");
                    slot.className = "slot";
                    if (index === 0) slot.classList.add("active");
                    slot.id = `slot-${index}`;

                    const icon = document.createElement("div");
                    icon.className = "slot-icon";
                    icon.style.backgroundColor =
                        "#" +
                        BLOCK_PROPS[type].color.toString(16).padStart(6, "0");

                    const count = document.createElement("span");
                    count.className = "slot-count";
                    count.innerText = "0";

                    slot.appendChild(count);
                    slot.appendChild(icon);
                    uiContainer.appendChild(slot);
                });
            }

            function updateUI() {
                slotTypes.forEach((type, index) => {
                    const slot = document.getElementById(`slot-${index}`);
                    slot.querySelector(".slot-count").innerText =
                        inventory[type];
                });
            }

            function selectSlot(index) {
                if (index >= slotTypes.length) return;
                selectedBlockType = slotTypes[index];

                // Update visuals
                document
                    .querySelectorAll(".slot")
                    .forEach((el) => el.classList.remove("active"));
                document
                    .getElementById(`slot-${index}`)
                    .classList.add("active");
            }

            initUI();

            // --- MAIN LOOP ---
            const clock = new THREE.Clock();
            let prevTime = performance.now();

            function animate() {
                requestAnimationFrame(animate);

                const time = performance.now();
                const delta = (time - prevTime) / 1000;
                prevTime = time;

                if (controls.isLocked) {
                    // 1. Physics Movement
                    player.velocity.x -= player.velocity.x * 10.0 * delta;
                    player.velocity.z -= player.velocity.z * 10.0 * delta;
                    player.velocity.y -= player.gravity * delta;

                    player.direction.z = Number(keys.w) - Number(keys.s);
                    player.direction.x = Number(keys.d) - Number(keys.a);
                    player.direction.normalize();

                    if (keys.w || keys.s)
                        player.velocity.z -=
                            player.direction.z * player.speed * delta;
                    if (keys.a || keys.d)
                        player.velocity.x -=
                            player.direction.x * player.speed * delta;

                    // Apply Horizontal Movement with Collision
                    controls.moveRight(-player.velocity.x * delta);
                    if (checkCollision(camera.position)) {
                        controls.moveRight(player.velocity.x * delta); // Undo
                        player.velocity.x = 0;
                    }

                    controls.moveForward(-player.velocity.z * delta);
                    if (checkCollision(camera.position)) {
                        controls.moveForward(player.velocity.z * delta); // Undo
                        player.velocity.z = 0;
                    }

                    // Apply Vertical Movement with Collision
                    camera.position.y += player.velocity.y * delta;
                    if (checkCollision(camera.position)) {
                        camera.position.y -= player.velocity.y * delta; // Undo

                        if (player.velocity.y < 0) {
                            player.onGround = true;
                            player.velocity.y = 0;
                        } else {
                            player.velocity.y = 0; // Hit head
                        }
                    } else {
                        player.onGround = false;
                    }

                    // Infinite World Gen (Simple distance check)
                    const px = Math.floor(camera.position.x / CHUNK_SIZE);
                    const pz = Math.floor(camera.position.z / CHUNK_SIZE);
                    // Generate chunks around player if they don't exist (simplified logic for demo)
                    // In a real engine, you'd track loaded chunks. Here we just assume infinite flat extension if needed
                    // but for this demo, we stick to the initial generated area to keep memory low.
                }

                // 2. Update Game Objects
                updateDrops(delta);

                renderer.render(scene, camera);
            }

            // Handle Window Resize
            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Start Loop
            camera.position.y = 10; // Spawn high
            animate();
        </script>
    </body>
</html>
