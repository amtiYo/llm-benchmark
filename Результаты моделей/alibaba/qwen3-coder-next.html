<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Voxel Sandbox</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                user-select: none;
            }

            #crosshair {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 20px;
                height: 20px;
                background-color: transparent;
                border: 2px solid rgba(255, 255, 255, 0.8);
                border-radius: 50%;
                transform: translate(-50%, -50%);
                pointer-events: none;
                z-index: 10;
            }

            #crosshair::after {
                content: "";
                position: absolute;
                top: 50%;
                left: 50%;
                width: 4px;
                height: 4px;
                background: white;
                transform: translate(-50%, -50%);
            }

            #instructions {
                position: absolute;
                top: 10px;
                left: 10px;
                color: white;
                background: rgba(0, 0, 0, 0.5);
                padding: 10px;
                border-radius: 8px;
                pointer-events: none;
            }

            #inventory {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 10px;
                background: rgba(0, 0, 0, 0.6);
                padding: 10px;
                border-radius: 10px;
                border: 2px solid #555;
            }

            .slot {
                width: 50px;
                height: 50px;
                background: #333;
                border: 2px solid #666;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 12px;
                position: relative;
                transition: transform 0.1s;
            }

            .slot.active {
                border-color: #00ffff;
                transform: scale(1.1);
                background: #444;
                box-shadow: 0 0 10px #00ffff;
            }

            .slot-count {
                position: absolute;
                bottom: 2px;
                right: 5px;
                font-weight: bold;
                text-shadow: 1px 1px 0 #000;
            }

            .block-icon {
                width: 24px;
                height: 24px;
                border: 1px solid rgba(0, 0, 0, 0.2);
            }

            #blocker {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 20;
                cursor: pointer;
            }

            #start-text {
                color: white;
                font-size: 2rem;
                text-align: center;
            }

            .key {
                display: inline-block;
                background: #eee;
                color: #333;
                padding: 2px 6px;
                border-radius: 4px;
                font-weight: bold;
                font-size: 0.9em;
            }
        </style>
    </head>
    <body>
        <div id="crosshair"></div>

        <div id="instructions">
            <h3>Sandbox Controls</h3>
            <p><b>W, A, S, D</b> - Move</p>
            <p><b>SPACE</b> - Jump</p>
            <p><b>Click Screen</b> - Lock Cursor</p>
            <p><b>LMB</b> - Break Block</p>
            <p><b>RMB</b> - Place Block</p>
            <p><b>1-5</b> - Select Block Type</p>
        </div>

        <div id="inventory">
            <!-- Slots generated by JS -->
        </div>

        <div id="blocker">
            <div id="start-text">
                <h1>VOXEL SANDBOX</h1>
                <p>Click anywhere to Play</p>
                <p style="font-size: 1rem; margin-top: 20px">
                    Left Click: Mine | Right Click: Build<br />
                    1-5: Select Block
                </p>
            </div>
        </div>

        <!-- Import Three.js from CDN -->
        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";

            // --- CONFIGURATION ---
            const CHUNK_SIZE = 16;
            const WORLD_HEIGHT = 64; // Total height
            const GRAVITY = 30.0;
            const JUMP_FORCE = 12.0;
            const MOVE_SPEED = 8.0;
            const PLAYER_HEIGHT = 1.8;
            const REACH = 6;

            // Block Definitions
            const BLOCKS = {
                DIRT: { id: 1, name: "Grass", color: "#5b8d42", type: "solid" },
                DIRT_PLAIN: {
                    id: 2,
                    name: "Dirt",
                    color: "#5c4033",
                    type: "solid",
                },
                STONE: {
                    id: 3,
                    name: "Stone",
                    color: "#7d7d7d",
                    type: "solid",
                },
                WOOD: { id: 4, name: "Wood", color: "#654321", type: "solid" },
                LEAVES: {
                    id: 5,
                    name: "Leaves",
                    color: "#3a5f0b",
                    type: "solid",
                },
                BEDROCK: {
                    id: 99,
                    name: "Bedrock",
                    color: "#222222",
                    type: "solid",
                },
            };

            const INVENTORY_ITEMS = [
                BLOCKS.DIRT,
                BLOCKS.DIRT_PLAIN,
                BLOCKS.STONE,
                BLOCKS.WOOD,
                BLOCKS.LEAVES,
            ];
            let inventory = {};
            INVENTORY_ITEMS.forEach((b) => (inventory[b.id] = 0));

            // Global Game State
            let camera, scene, renderer, controls;
            let raycaster;
            let moveForward = false,
                moveBackward = false,
                moveLeft = false,
                moveRight = false,
                canJump = false;
            let velocity = new THREE.Vector3();
            let direction = new THREE.Vector3();
            let prevTime = performance.now();

            // World Data
            const chunks = new Map(); // Key: "x,z", Value: { mesh, heightMap }
            const objects = []; // Array for raycasting
            const drops = []; // Array of spinning items
            const playerPosition = new THREE.Vector3(0, 30, 0);

            // UI Elements
            const blocker = document.getElementById("blocker");
            const inventoryUI = document.getElementById("inventory");
            let selectedBlockId = BLOCKS.DIRT.id;

            // --- INITIALIZATION ---
            init();
            animate();

            function init() {
                // Scene Setup
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87ceeb); // Sky blue
                scene.fog = new THREE.Fog(0x87ceeb, 10, 60);

                // Camera
                camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000,
                );

                // Renderer
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(50, 100, 50);
                dirLight.castShadow = true;
                scene.add(dirLight);

                // Controls
                controls = new PointerLockControls(camera, document.body);

                blocker.addEventListener("click", () => {
                    controls.lock();
                });

                controls.addEventListener("lock", () => {
                    blocker.style.display = "none";
                });

                controls.addEventListener("unlock", () => {
                    blocker.style.display = "flex";
                });

                // Raycaster
                raycaster = new THREE.Raycaster();

                // Event Listeners
                document.addEventListener("keydown", onKeyDown);
                document.addEventListener("keyup", onKeyUp);
                document.addEventListener("mousedown", onMouseDown);
                window.addEventListener("resize", onWindowResize);

                // Generate Initial World
                generateChunk(0, 0); // Start chunk
                generateChunk(1, 0);
                generateChunk(-1, 0);
                generateChunk(0, 1);
                generateChunk(0, -1);

                // Setup UI
                setupInventoryUI();

                // Set Player Start
                playerPosition.y = 40;
                playerPosition.x = 0;
                playerPosition.z = 0;
                camera.position.copy(playerPosition);

                console.log("Game Initialized. Click to start.");
            }

            // --- WORLD GENERATION ---
            // Simple pseudo-random noise function for terrain
            function noise(x, z) {
                const sin = Math.sin(x * 0.1 + z * 0.1);
                const cos = Math.cos(x * 0.05 - z * 0.05);
                return (sin + cos) * 5;
            }

            function generateChunk(chunkX, chunkZ) {
                const key = `${chunkX},${chunkZ}`;
                if (chunks.has(key)) return;

                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshLambertMaterial({
                    transparent: true,
                    opacity: 0.9,
                });

                const chunkMesh = new THREE.Mesh(
                    new THREE.BufferGeometry(),
                    material,
                );
                const positions = [];
                const colors = [];
                const colorAttribute = new THREE.BufferAttribute(
                    new Float32Array(0),
                    3,
                );

                let vertexCount = 0;
                const offset = new THREE.Vector3(
                    chunkX * CHUNK_SIZE,
                    0,
                    chunkZ * CHUNK_SIZE,
                );

                // Generate Blocks
                for (let x = 0; x < CHUNK_SIZE; x++) {
                    for (let z = 0; z < CHUNK_SIZE; z++) {
                        // Terrain Height
                        const worldX = x + chunkX * CHUNK_SIZE;
                        const worldZ = z + chunkZ * CHUNK_SIZE;
                        const h = Math.floor(noise(worldX, worldZ) + 10); // Base height

                        for (let y = 0; y <= h; y++) {
                            let type = BLOCKS.STONE;

                            if (y === h) {
                                type = BLOCKS.DIRT;
                                if (y > 15) type = BLOCKS.LEAVES; // Trees
                            } else if (y > h - 4) {
                                type = BLOCKS.DIRT_PLAIN;
                            }

                            // Simple tree generation
                            if (
                                y === h &&
                                type === BLOCKS.DIRT &&
                                Math.random() < 0.05
                            ) {
                                createTree(worldX, worldZ, y + 1);
                            }

                            // Bedrock at bottom
                            if (y === 0) type = BLOCKS.BEDROCK;

                            // Store data for placement
                            const voxelPos = new THREE.Vector3(x, y, z).add(
                                offset,
                            );
                            placeBlock(
                                voxelPos,
                                type,
                                chunkMesh,
                                positions,
                                colors,
                                false,
                            ); // False = don't add to objects list yet (optimization)
                            vertexCount += 24; // 6 faces * 4 verts
                        }
                    }
                }

                // Setup Geometry
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute(
                    "position",
                    new THREE.Float32BufferAttribute(positions, 3),
                );
                geometry.setAttribute(
                    "color",
                    new THREE.Float32BufferAttribute(colors, 3),
                );

                // Simple face coloring logic for performance
                chunkMesh.geometry = geometry;

                // Apply material based on first block color roughly or just generic
                const uniqueColors = [...new Set(colors.map((c) => c))];
                // For a robust implementation, we'd group by material.
                // For this single-file demo, we will use a texture or just flat colors.
                // To keep it simple and performant without texture atlases:
                // We will just use the mesh colors.

                scene.add(chunkMesh);
                chunks.set(key, { mesh: chunkMesh, x: chunkX, z: chunkZ });

                // Add all blocks in this chunk to the global objects array for raycasting
                // (Re-parsing the mesh for raycasting is hard, so we manually track them)
                // For this demo, we will just raycast against the Chunk Mesh, but we need specific blocks.
                // Alternative approach: Simple Grid Map for collision/interaction.
            }

            // Simplified Block Storage for Interaction
            const worldBlocks = new Map(); // Key: "x,y,z", Value: { type, mesh, position }

            function placeBlock(
                pos,
                type,
                chunkMesh,
                positions,
                colors,
                addToGlobalList = true,
            ) {
                const key = `${pos.x},${pos.y},${pos.z}`;

                // Store data
                if (addToGlobalList) {
                    worldBlocks.set(key, {
                        type: type,
                        position: pos.clone(),
                    });

                    // Create visual mesh for this specific block
                    const geometry = new THREE.BoxGeometry(1, 1, 1);
                    const material = new THREE.MeshLambertMaterial({
                        color: type.color,
                    });
                    const blockMesh = new THREE.Mesh(geometry, material);
                    blockMesh.position.copy(pos);

                    // Add extra edges for definition
                    const edges = new THREE.EdgesGeometry(geometry);
                    const line = new THREE.LineSegments(
                        edges,
                        new THREE.LineBasicMaterial({
                            color: 0x000000,
                            linewidth: 1,
                        }),
                    );
                    blockMesh.add(line);

                    scene.add(blockMesh);
                    objects.push(blockMesh);

                    // Link back
                    worldBlocks.get(key).visual = blockMesh;
                }

                // If building chunk geometry (batch)
                if (chunkMesh) {
                    const x = pos.x;
                    const y = pos.y;
                    const z = pos.z;
                    const c = new THREE.Color(type.color);

                    // Helper to add a face (2 triangles, 6 vertices)
                    const addFace = (p1, p2, p3, p4) => {
                        positions.push(
                            p1.x,
                            p1.y,
                            p1.z,
                            p2.x,
                            p2.y,
                            p2.z,
                            p3.x,
                            p3.y,
                            p3.z,
                        );
                        positions.push(
                            p1.x,
                            p1.y,
                            p1.z,
                            p3.x,
                            p3.y,
                            p3.z,
                            p4.x,
                            p4.y,
                            p4.z,
                        );
                        colors.push(
                            c.r,
                            c.g,
                            c.b,
                            c.r,
                            c.g,
                            c.b,
                            c.r,
                            c.g,
                            c.b,
                        );
                        colors.push(
                            c.r,
                            c.g,
                            c.b,
                            c.r,
                            c.g,
                            c.b,
                            c.r,
                            c.g,
                            c.b,
                        );
                    };

                    // Hardcoded voxel faces relative to 0,0,0
                    const v = [
                        { x: 0, y: 0, z: 0 },
                        { x: 1, y: 0, z: 0 },
                        { x: 1, y: 1, z: 0 },
                        { x: 0, y: 1, z: 0 },
                        { x: 0, y: 0, z: 1 },
                        { x: 1, y: 0, z: 1 },
                        { x: 1, y: 1, z: 1 },
                        { x: 0, y: 1, z: 1 },
                    ];
                    addFace(v[0], v[1], v[2], v[3]); // Front
                    addFace(v[1], v[5], v[6], v[2]); // Right
                    addFace(v[5], v[4], v[7], v[6]); // Back
                    addFace(v[4], v[0], v[3], v[7]); // Left
                    addFace(v[3], v[2], v[6], v[7]); // Top
                    addFace(v[4], v[5], v[1], v[0]); // Bottom
                }
            }

            function createTree(x, z, y) {
                // Trunk
                for (let i = 0; i < 4; i++) {
                    placeBlock(
                        new THREE.Vector3(x, y + i, z),
                        BLOCKS.WOOD,
                        null,
                        null,
                        null,
                        true,
                    );
                }
                // Leaves
                for (let lx = x - 2; lx <= x + 2; lx++) {
                    for (let lz = z - 2; lz <= z + 2; lz++) {
                        for (let ly = y + 2; ly <= y + 3; ly++) {
                            if (
                                Math.abs(lx - x) === 2 &&
                                Math.abs(lz - z) === 2
                            )
                                continue; // Rounded corners
                            if (!getBlock(lx, ly, lz)) {
                                placeBlock(
                                    new THREE.Vector3(lx, ly, lz),
                                    BLOCKS.LEAVES,
                                    null,
                                    null,
                                    null,
                                    true,
                                );
                            }
                        }
                    }
                }
                // Top leaves
                placeBlock(
                    new THREE.Vector3(x, y + 4, z),
                    BLOCKS.LEAVES,
                    null,
                    null,
                    null,
                    true,
                );
            }

            function getBlock(x, y, z) {
                return worldBlocks.get(`${x},${y},${z}`);
            }

            function removeBlock(blockData) {
                if (!blockData) return;

                const pos = blockData.position;
                const key = `${pos.x},${pos.y},${pos.z}`;

                // 1. Drop Item
                createLoot(pos, blockData.type);

                // 2. Remove Visual
                if (blockData.visual) {
                    scene.remove(blockData.visual);
                    blockData.visual.geometry.dispose();
                    blockData.visual.material.dispose();
                }

                // 3. Remove from Logic Map
                worldBlocks.delete(key);

                // 4. Update Raycaster objects array
                const index = objects.indexOf(blockData.visual); // Might be null if it was chunk geometry, but in this simplified logic, we use individual meshes for interactables
                if (index > -1) {
                    objects.splice(index, 1);
                }
            }

            // --- LOOT SYSTEM ---
            function createLoot(pos, type) {
                const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                const material = new THREE.MeshLambertMaterial({
                    color: type.color,
                });
                const drop = new THREE.Mesh(geometry, material);

                // Randomize spawn position slightly so they don't stack perfectly inside each other
                drop.position.copy(pos).add(new THREE.Vector3(0.5, 0.5, 0.5));
                // Add some random upward velocity
                drop.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.2,
                        0.5,
                        (Math.random() - 0.5) * 0.2,
                    ),
                    type: type,
                    life: 600, // Frames before despawn (10s)
                };

                drop.castShadow = true;
                scene.add(drop);
                drops.push(drop);
            }

            // --- INVENTORY & UI ---
            function setupInventoryUI() {
                inventoryUI.innerHTML = "";
                INVENTORY_ITEMS.forEach((block, index) => {
                    const slot = document.createElement("div");
                    slot.className = "slot";
                    if (index === 0) slot.classList.add("active");
                    slot.dataset.id = block.id;
                    slot.dataset.index = index;

                    // Color Icon
                    const icon = document.createElement("div");
                    icon.className = "block-icon";
                    icon.style.backgroundColor = block.color;

                    // Name & Count
                    const name = document.createElement("span");
                    name.innerText = block.name;
                    const count = document.createElement("span");
                    count.className = "slot-count";
                    count.innerText = "0";

                    slot.appendChild(icon);
                    slot.appendChild(name);
                    slot.appendChild(count);
                    inventoryUI.appendChild(slot);
                });
                updateUI();
            }

            function updateUI() {
                const slots = document.querySelectorAll(".slot");
                slots.forEach((slot) => {
                    const id = parseInt(slot.dataset.id);
                    const count = inventory[id];
                    slot.querySelector(".slot-count").innerText = count;
                });
            }

            function selectSlot(index) {
                if (index < 0 || index >= INVENTORY_ITEMS.length) return;

                const slots = document.querySelectorAll(".slot");
                slots.forEach((s) => s.classList.remove("active"));

                const selected = slots[index];
                selected.classList.add("active");
                selectedBlockId = INVENTORY_ITEMS[index].id;
            }

            // --- INPUT HANDLING ---
            function onKeyDown(event) {
                switch (event.code) {
                    case "ArrowUp":
                    case "KeyW":
                        moveForward = true;
                        break;
                    case "ArrowLeft":
                    case "KeyA":
                        moveLeft = true;
                        break;
                    case "ArrowDown":
                    case "KeyS":
                        moveBackward = true;
                        break;
                    case "ArrowRight":
                    case "KeyD":
                        moveRight = true;
                        break;
                    case "Space":
                        if (canJump) {
                            velocity.y += JUMP_FORCE;
                            canJump = false;
                        }
                        break;
                    case "Digit1":
                        selectSlot(0);
                        break;
                    case "Digit2":
                        selectSlot(1);
                        break;
                    case "Digit3":
                        selectSlot(2);
                        break;
                    case "Digit4":
                        selectSlot(3);
                        break;
                    case "Digit5":
                        selectSlot(4);
                        break;
                }
            }

            function onKeyUp(event) {
                switch (event.code) {
                    case "ArrowUp":
                    case "KeyW":
                        moveForward = false;
                        break;
                    case "ArrowLeft":
                    case "KeyA":
                        moveLeft = false;
                        break;
                    case "ArrowDown":
                    case "KeyS":
                        moveBackward = false;
                        break;
                    case "ArrowRight":
                    case "KeyD":
                        moveRight = false;
                        break;
                }
            }

            function onMouseDown(event) {
                if (!controls.isLocked) return;

                // Center Raycast
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(objects);

                if (intersects.length > 0) {
                    const hit = intersects[0];

                    // Check distance
                    if (hit.distance > REACH) return;

                    if (event.button === 0) {
                        // Left Click: Mine
                        removeBlock(
                            hit.object.userData.blockData ||
                                getBlockAtMesh(hit.object),
                        );
                    } else if (event.button === 2) {
                        // Right Click: Place
                        const normal = hit.face.normal;
                        const pos = hit.object.position.clone().add(normal);

                        // Prevent placing inside player
                        const playerBox = new THREE.Box3().setFromCenterAndSize(
                            camera.position,
                            new THREE.Vector3(1, 2, 1),
                        );
                        const blockBox = new THREE.Box3().setFromCenterAndSize(
                            pos,
                            new THREE.Vector3(1, 1, 1),
                        );

                        if (!playerBox.intersectsBox(blockBox)) {
                            if (inventory[selectedBlockId] > 0) {
                                placeBlock(
                                    pos,
                                    INVENTORY_ITEMS.find(
                                        (i) => i.id === selectedBlockId,
                                    ),
                                    null,
                                    null,
                                    null,
                                    true,
                                );
                                inventory[selectedBlockId]--;
                                updateUI();
                            } else {
                                // Empty hand visual feedback (simple flash)
                                camera.position.y += 0.1;
                                setTimeout(
                                    () => (camera.position.y -= 0.1),
                                    100,
                                );
                            }
                        }
                    }
                }
            }

            // Helper to link visual mesh to world data
            function getBlockAtMesh(mesh) {
                // This is a bit of a hack for this demo to find the logical block associated with the visual
                // In a production game, the mesh would hold a reference to the data object
                const x = Math.round(mesh.position.x);
                const y = Math.round(mesh.position.y);
                const z = Math.round(mesh.position.z);
                return worldBlocks.get(`${x},${y},${z}`);
            }

            // Monkey-patch raycast hits to store block data
            const originalIntersect = THREE.Raycaster.prototype.intersectObject;
            // We can't easily monkey patch the whole raycaster without deep understanding of internal structure
            // Instead, we will check hit.object.userData for a reference if we stored it.
            // Let's ensure placeBlock stores the block data.
            const origPlace = placeBlock;
            placeBlock = function (
                pos,
                type,
                chunkMesh,
                positions,
                colors,
                addToGlobalList,
            ) {
                if (addToGlobalList) {
                    // We need to access the mesh we just created
                    const geometry = new THREE.BoxGeometry(1, 1, 1);
                    const material = new THREE.MeshLambertMaterial({
                        color: type.color,
                    });
                    const blockMesh = new THREE.Mesh(geometry, material);
                    blockMesh.position.copy(pos);

                    // Add edges
                    const edges = new THREE.EdgesGeometry(geometry);
                    const line = new THREE.LineSegments(
                        edges,
                        new THREE.LineBasicMaterial({ color: 0x000000 }),
                    );
                    blockMesh.add(line);

                    scene.add(blockMesh);
                    objects.push(blockMesh);

                    const blockData = {
                        type: type,
                        position: pos,
                        visual: blockMesh,
                    };
                    worldBlocks.set(`${pos.x},${pos.y},${pos.z}`, blockData);
                    blockMesh.userData.blockData = blockData;
                }
            };

            // --- PHYSICS & UPDATE LOOP ---
            function checkCollision(pos) {
                const x = Math.round(pos.x);
                const y = Math.round(pos.y);
                const z = Math.round(pos.z);

                // Player bounding box (approximate)
                const pBox = new THREE.Box3().setFromCenterAndSize(
                    pos,
                    new THREE.Vector3(0.8, 1.8, 0.8),
                );

                // Check surrounding blocks
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 2; dy++) {
                        // Check head and feet
                        for (let dz = -1; dz <= 1; dz++) {
                            const checkKey = `${x + dx},${y + dy},${z + dz}`;
                            if (worldBlocks.has(checkKey)) {
                                const blockPos =
                                    worldBlocks.get(checkKey).position;
                                const bBox =
                                    new THREE.Box3().setFromCenterAndSize(
                                        blockPos,
                                        new THREE.Vector3(1, 1, 1),
                                    );
                                if (pBox.intersectsBox(bBox)) {
                                    return true;
                                }
                            }
                        }
                    }
                }
                return false;
            }

            function updatePhysics(delta) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= GRAVITY * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward)
                    velocity.z -= direction.z * MOVE_SPEED * 10.0 * delta;
                if (moveLeft || moveRight)
                    velocity.x -= direction.x * MOVE_SPEED * 10.0 * delta;

                // Apply X movement
                const nextPos = camera.position.clone();
                nextPos.x += velocity.x * delta;
                if (!checkCollision(nextPos)) {
                    camera.position.x += velocity.x * delta;
                } else {
                    velocity.x = 0;
                }

                // Apply Z movement
                const nextPosZ = camera.position.clone();
                nextPosZ.z += velocity.z * delta;
                if (!checkCollision(nextPosZ)) {
                    camera.position.z += velocity.z * delta;
                } else {
                    velocity.z = 0;
                }

                // Apply Y movement
                const nextPosY = camera.position.clone();
                nextPosY.y += velocity.y * delta;
                if (!checkCollision(nextPosY)) {
                    camera.position.y += velocity.y * delta;
                    canJump = false;
                } else {
                    if (velocity.y < 0) {
                        canJump = true; // Landed
                    }
                    velocity.y = 0;
                    // Snap to grid top
                    camera.position.y =
                        Math.round(camera.position.y) + 1 - (PLAYER_HEIGHT - 1);
                }

                // Floor safety net (Void)
                if (camera.position.y < -20) {
                    camera.position.set(0, 40, 0);
                    velocity.set(0, 0, 0);
                }
            }

            function updateLoot(delta) {
                const playerPos = camera.position.clone();
                playerPos.y -= PLAYER_HEIGHT / 2; // Center of player

                for (let i = drops.length - 1; i >= 0; i--) {
                    const drop = drops[i];
                    const data = drop.userData;

                    // Physics
                    data.velocity.y -= GRAVITY * delta * 0.5; // Lighter gravity for items
                    drop.position.add(
                        data.velocity.clone().multiplyScalar(delta),
                    );

                    // Floor collision for loot
                    const floorY = Math.floor(drop.position.y);
                    const blockBelow = getBlock(
                        Math.round(drop.position.x),
                        floorY,
                        Math.round(drop.position.z),
                    );

                    if (
                        blockBelow &&
                        drop.position.y - 0.5 < blockBelow.position.y + 0.5
                    ) {
                        drop.position.y = blockBelow.position.y + 1.0;
                        data.velocity.y = 0;
                        data.velocity.x *= 0.8;
                        data.velocity.z *= 0.8;
                    }

                    // Rotation
                    drop.rotation.x += delta * 2;
                    drop.rotation.y += delta * 2;

                    // Auto Pickup
                    if (drop.position.distanceTo(playerPos) < 1.5) {
                        // Add to inventory
                        inventory[data.type.id]++;
                        updateUI();

                        // Remove drop
                        scene.remove(drop);
                        drops.splice(i, 1);
                        continue;
                    }

                    // Despawn
                    data.life -= delta * 60;
                    if (data.life <= 0) {
                        scene.remove(drop);
                        drops.splice(i, 1);
                    }
                }
            }

            function updateWorld() {
                const playerChunkX = Math.floor(camera.position.x / CHUNK_SIZE);
                const playerChunkZ = Math.floor(camera.position.z / CHUNK_SIZE);

                // Simple chunk loading loop
                for (let x = playerChunkX - 2; x <= playerChunkX + 2; x++) {
                    for (let z = playerChunkZ - 2; z <= playerChunkZ + 2; z++) {
                        generateChunk(x, z);
                    }
                }

                // Cleanup distant chunks (Optional optimization)
                for (let [key, chunk] of chunks) {
                    const [cx, cz] = key.split(",").map(Number);
                    if (
                        Math.abs(cx - playerChunkX) > 5 ||
                        Math.abs(cz - playerChunkZ) > 5
                    ) {
                        scene.remove(chunk.mesh);
                        chunks.delete(key);
                    }
                }
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            function animate() {
                requestAnimationFrame(animate);

                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                if (controls.isLocked) {
                    updatePhysics(delta);
                    updateLoot(delta);
                    updateWorld();
                }

                renderer.render(scene, camera);
                prevTime = time;
            }
        </script>
    </body>
</html>
