<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Voxel Sandbox 3D</title>
    <style>
        /* CSS Reset & Basic Styling */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB; /* Sky blue fallback */
            user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before {
            top: 9px; left: 0; width: 20px; height: 2px;
        }
        #crosshair::after {
            top: 0; left: 9px; width: 2px; height: 20px;
        }

        /* HUD: Info */
        #info-panel {
            padding: 10px;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 14px;
        }

        /* Inventory Bar */
        #inventory-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding-bottom: 20px;
            pointer-events: auto;
        }

        .inv-slot {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #555;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            position: relative;
            transition: transform 0.1s, border-color 0.1s;
        }

        .inv-slot.active {
            border-color: #ffcc00;
            transform: scale(1.1);
            background: rgba(50, 50, 50, 0.8);
        }

        .slot-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        .slot-count {
            font-size: 12px;
        }

        .slot-key {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 10px;
            color: #aaa;
        }

        /* Start Screen */
        #blocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
            pointer-events: auto;
            text-align: center;
        }

        #instructions {
            font-size: 24px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .key {
            display: inline-block;
            padding: 2px 8px;
            border: 1px solid #fff;
            border-radius: 4px;
            background: #333;
            font-size: 0.8em;
            margin: 0 2px;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #ffcc00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #222;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }

        #start-btn:hover {
            background: #ffdd44;
        }

        /* Notifications */
        #notification-area {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        
        .toast {
            display: inline-block;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 5px;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 0; transform: translateY(10px); }
            10% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; pointer-events: none; }
        }

    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="info-panel">
            <div>FPS: <span id="fps-counter">60</span></div>
            <div>Pos: <span id="pos-counter">0, 0, 0</span></div>
        </div>
        
        <div id="crosshair"></div>
        <div id="notification-area"></div>

        <div id="inventory-bar">
            <!-- Slots injected by JS -->
        </div>
    </div>

    <div id="blocker">
        <div id="instructions">
            <h1>Voxel World</h1>
            <p>Explore, Mine, Build.</p>
            <p>
                <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move
                <span class="key">SPACE</span> Jump
            </p>
            <p>
                <span class="key">LMB</span> Break Block
                <span class="key">RMB</span> Place Block
                <span class="key">1</span>-<span class="key">5</span> Select Item
            </p>
        </div>
        <button id="start-btn">CLICK TO PLAY</button>
    </div>

    <!-- Import Three.js as ES module -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three @0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three @0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Configuration ---
        const CHUNK_SIZE = 16;
        const WORLD_HEIGHT = 32;
        const RENDER_DISTANCE = 3; // Radius in chunks
        const BLOCK_SIZE = 1;
        
        // --- Block Types ---
        const BLOCKS = {
            AIR: 0,
            DIRT: 1,
            GRASS: 2,
            STONE: 3,
            WOOD: 4,
            LEAVES: 5
        };

        const BLOCK_PROPS = {
            [BLOCKS.DIRT]: { color: 0x8B4513, name: "Dirt" },
            [BLOCKS.GRASS]: { color: 0x567d46, name: "Grass" }, // Top is green
            [BLOCKS.STONE]: { color: 0x757575, name: "Stone" },
            [BLOCKS.WOOD]: { color: 0x5C4033, name: "Wood" },
            [BLOCKS.LEAVES]: { color: 0x228B22, name: "Leaves" }
        };

        // --- Global State ---
        let scene, camera, renderer, controls;
        let clock = new THREE.Clock();
        const chunks = {}; // Map "x,z" key to Chunk data
        const activeDrops = []; // Array of drop objects
        let raycaster = new THREE.Raycaster();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();
        
        // Player Inventory
        const inventory = {
            slots: [
                { id: BLOCKS.DIRT, count: 0 },
                { id: BLOCKS.GRASS, count: 0 },
                { id: BLOCKS.STONE, count: 0 },
                { id: BLOCKS.WOOD, count: 0 },
                { id: BLOCKS.LEAVES, count: 0 }
            ],
            selectedSlot: 0
        };

        // --- Initialization ---
        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, (CHUNK_SIZE * RENDER_DISTANCE));

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // Controls
            controls = new PointerLockControls(camera, document.body);
            const blocker = document.getElementById('blocker');
            const startBtn = document.getElementById('start-btn');

            startBtn.addEventListener('click', () => {
                controls.lock();
            });

            controls.addEventListener('lock', () => {
                blocker.style.display = 'none';
            });

            controls.addEventListener('unlock', () => {
                blocker.style.display = 'flex';
            });

            scene.add(controls.getObject());

            // Input Handling
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', onMouseDown);
            window.addEventListener('resize', onWindowResize);

            // UI Init
            initInventoryUI();

            // Start Loop
            animate();
        }

        function initInventoryUI() {
            const bar = document.getElementById('inventory-bar');
            bar.innerHTML = '';
            inventory.slots.forEach((slot, index) => {
                const el = document.createElement('div');
                el.className = `inv-slot ${index === inventory.selectedSlot ? 'active' : ''}`;
                el.dataset.index = index;
                
                // Simple colored square icon
                const colorHex = '#' + (BLOCK_PROPS[slot.id].color || 0xffffff).toString(16).padStart(6, '0');
                
                el.innerHTML = `
                    <span class="slot-key">${index + 1}</span>
                    <div class="slot-icon" style="background:${colorHex}; border:1px solid #fff;"></div>
                    <span class="slot-count">${slot.count}</span>
                `;
                bar.appendChild(el);
            });
        }

        function updateInventoryUI() {
            const slots = document.querySelectorAll('.inv-slot');
            inventory.slots.forEach((slotData, idx) => {
                const el = slots[idx];
                el.querySelector('.slot-count').innerText = slotData.count;
                if(idx === inventory.selectedSlot) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
        }

        // --- World Generation ---

        // Simple Pseudo-Random Generator
        function pseudoRandom(x, z) {
            let n = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453;
            return n - Math.floor(n);
        }

        // Simple Noise function (Value noise)
        function noise(x, z) {
            const val = pseudoRandom(x, z);
            // Smoothing could be added here, but raw noise is fine for low-poly style
            return val; 
        }

        function getHeight(x, z) {
            // Combine a few frequencies for hills
            let y = 0;
            y += noise(x * 0.05, z * 0.05) * 10;
            y += noise(x * 0.01, z * 0.01) * 20;
            return Math.floor(y + 5); // Base height
        }

        function getBlockKey(x, y, z) {
            return `${x},${y},${z}`;
        }

        function createChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks[key]) return; // Already exists

            const chunkData = {}; // Local storage for block existence: { "x,y,z": type }
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const colors = [];
            const normals = [];

            // Offset for world coordinates
            const worldOriginX = cx * CHUNK_SIZE;
            const worldOriginZ = cz * CHUNK_SIZE;

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const wx = worldOriginX + x;
                    const wz = worldOriginZ + z;
                    const h = getHeight(wx, wz);

                    for (let y = 0; y <= h; y++) {
                        let type = BLOCKS.DIRT;
                        if (y === h) type = BLOCKS.GRASS;
                        else if (y < h - 3) type = BLOCKS.STONE;

                        // Simple tree generation
                        if (y === h && type === BLOCKS.GRASS) {
                             if (pseudoRandom(wx, wz) > 0.95) {
                                 type = BLOCKS.WOOD; // Trunk base
                                 // We generate the tree immediately in the loop
                                 // In a complex engine, we'd separate decoration pass
                                 // But for this, we just treat trunk as part of terrain mesh or add logic
                                 // To keep it simple: Terrain only. Trees are separate entities or blocks.
                                 // Let's skip complex trees for this simple generator to avoid mesh splitting complexity
                                 // and just ensure hills/valleys work well.
                             }
                        }

                        chunkData[getBlockKey(wx, y, wz)] = type;

                        // Add faces
                        // Optimization: Only add faces exposed to air (or a different block)
                        const up = chunkData[getBlockKey(wx, y + 1, wz)] !== type;
                        const down = (y === 0) || (chunkData[getBlockKey(wx, y - 1, wz)] !== type);
                        const left = (x === 0 && cx * CHUNK_SIZE + x - 1 < 0) ? true : chunkData[getBlockKey(wx - 1, y, wz)] !== type;
                        const right = (x === CHUNK_SIZE - 1) ? true : chunkData[getBlockKey(wx + 1, y, wz)] !== type;
                        const front = (z === CHUNK_SIZE - 1) ? true : chunkData[getBlockKey(wx, y, wz + 1)] !== type;
                        const back = (z === 0 && cz * CHUNK_SIZE + z - 1 < 0) ? true : chunkData[getBlockKey(wx, y, wz - 1)] !== type;

                        // Check neighbors across chunk boundaries roughly for this simple implementation
                        // (A robust chunk system would check neighbor chunks. Here we accept small cracks or render slightly more internal blocks)
                        // Simplified: Assume exposed if neighbor is null (Air) or different.
                        
                        // For this demo: We will only check strictly inside the chunk for simplicity, 
                        // OR we assume simple visibility rules.
                        // Let's stick to: if neighbor isn't in this chunk, render face (conservative, prevents holes, renders slightly more).
                        
                        const nUp = !chunkData[getBlockKey(wx, y + 1, wz)];
                        const nDown = !chunkData[getBlockKey(wx, y - 1, wz)];
                        const nLeft = !chunkData[getBlockKey(wx - 1, y, wz)];
                        const nRight = !chunkData[getBlockKey(wx + 1, y, wz)];
                        const nFront = !chunkData[getBlockKey(wx, y, wz + 1)];
                        const nBack = !chunkData[getBlockKey(wx, y, wz - 1)];

                        if (nUp) pushFace(vertices, colors, normals, wx, y, wz, 'up', type);
                        if (nDown) pushFace(vertices, colors, normals, wx, y, wz, 'down', type);
                        if (nLeft) pushFace(vertices, colors, normals, wx, y, wz, 'left', type);
                        if (nRight) pushFace(vertices, colors, normals, wx, y, wz, 'right', type);
                        if (nFront) pushFace(vertices, colors, normals, wx, y, wz, 'front', type);
                        if (nBack) pushFace(vertices, colors, normals, wx, y, wz, 'back', type);
                    }
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));

            const material = new THREE.MeshLambertMaterial({ vertexColors: true });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.receiveShadow = true;
            mesh.castShadow = true;

            scene.add(mesh);

            chunks[key] = {
                mesh: mesh,
                data: chunkData
            };
        }

        function pushFace(v, c, n, x, y, z, dir, type) {
            const props = BLOCK_PROPS[type];
            const color = new THREE.Color(props.color);
            
            // Apply simple shading to sides for definition
            if (dir === 'up') {
                // Grass top is greener
                if(type === BLOCKS.GRASS) color.setHex(0x567d46);
            } else if (dir === 'down') {
                 // Dirt bottom
                if(type === BLOCKS.GRASS) color.setHex(0x8B4513);
                else color.multiplyScalar(0.5); // Darker
            } else {
                // Sides
                if(type === BLOCKS.GRASS) color.setHex(0x684d2b); // Dirt side
                else color.multiplyScalar(0.8);
            }

            // Define vertices for a cube face
            // Helper to add vertex
            const addVert = (vx, vy, vz) => {
                v.push(x + vx, y + vy, z + vz);
                c.push(color.r, color.g, color.b);
            };

            // Normals
            let nx=0, ny=0, nz=0;

            switch(dir) {
                case 'up':
                    addVert(0, 1, 0); addVert(1, 1, 0); addVert(1, 1, 1);
                    addVert(0, 1, 0); addVert(1, 1, 1); addVert(0, 1, 1);
                    ny = 1;
                    break;
                case 'down':
                    addVert(0, 0, 1); addVert(1, 0, 1); addVert(1, 0, 0);
                    addVert(0, 0, 1); addVert(1, 0, 0); addVert(0, 0, 0);
                    ny = -1;
                    break;
                case 'front':
                    addVert(0, 0, 1); addVert(0, 1, 1); addVert(1, 1, 1);
                    addVert(0, 0, 1); addVert(1, 1, 1); addVert(1, 0, 1);
                    nz = 1;
                    break;
                case 'back':
                    addVert(1, 0, 0); addVert(1, 1, 0); addVert(0, 1, 0);
                    addVert(1, 0, 0); addVert(0, 1, 0); addVert(0, 0, 0);
                    nz = -1;
                    break;
                case 'right':
                    addVert(1, 0, 1); addVert(1, 1, 1); addVert(1, 1, 0);
                    addVert(1, 0, 1); addVert(1, 1, 0); addVert(1, 0, 0);
                    nx = 1;
                    break;
                case 'left':
                    addVert(0, 0, 0); addVert(0, 1, 0); addVert(0, 1, 1);
                    addVert(0, 0, 0); addVert(0, 1, 1); addVert(0, 0, 1);
                    nx = -1;
                    break;
            }

            // Push normals for the 6 vertices
            for(let i=0; i<6; i++) n.push(nx, ny, nz);
        }

        function updateChunks() {
            const p = controls.getObject().position;
            const cx = Math.floor(p.x / CHUNK_SIZE);
            const cz = Math.floor(p.z / CHUNK_SIZE);

            for (let x = cx - RENDER_DISTANCE; x <= cx + RENDER_DISTANCE; x++) {
                for (let z = cz - RENDER_DISTANCE; z <= cz + RENDER_DISTANCE; z++) {
                    createChunk(x, z);
                }
            }
        }

        // --- Physics & Collisions ---

        // Check if a coordinate is inside a solid block
        function isSolid(x, y, z) {
            // Find block key
            // Convert float to block integer coord
            const bx = Math.floor(x);
            const by = Math.floor(y);
            const bz = Math.floor(z);

            const cx = Math.floor(bx / CHUNK_SIZE);
            const cz = Math.floor(bz / CHUNK_SIZE);
            const key = `${cx},${cz}`;

            if (chunks[key] && chunks[key].data[getBlockKey(bx, by, bz)]) {
                return true;
            }
            return false;
        }

        function handleCollisions(newPos, delta) {
            const width = 0.3; // Player width radius
            const height = 1.6; // Player height

            // X Collision
            if (isSolid(newPos.x - width, newPos.y, newPos.z) || 
                isSolid(newPos.x + width, newPos.y, newPos.z) ||
                isSolid(newPos.x - width, newPos.y - 1, newPos.z) || // Check feet too
                isSolid(newPos.x + width, newPos.y - 1, newPos.z)) {
                newPos.x = controls.getObject().position.x;
                velocity.x = 0;
            }

            // Z Collision
            if (isSolid(newPos.x, newPos.y, newPos.z - width) || 
                isSolid(newPos.x, newPos.y, newPos.z + width) ||
                isSolid(newPos.x, newPos.y - 1, newPos.z - width) || 
                isSolid(newPos.x, newPos.y - 1, newPos.z + width)) {
                newPos.z = controls.getObject().position.z;
                velocity.z = 0;
            }

            // Y Collision (Head & Feet)
            // Check Head (ceiling)
            if (isSolid(newPos.x, newPos.y + height, newPos.z) ||
                isSolid(newPos.x - width, newPos.y + height, newPos.z) ||
                isSolid(newPos.x + width, newPos.y + height, newPos.z) ||
                isSolid(newPos.x, newPos.y + height, newPos.z - width) ||
                isSolid(newPos.x, newPos.y + height, newPos.z + width)) {
                velocity.y = Math.min(0, velocity.y);
                newPos.y = controls.getObject().position.y;
            }

            // Check Feet (Ground)
            // We check slightly below current Y
            const groundLevel = newPos.y;
            if (isSolid(newPos.x, groundLevel - 0.1, newPos.z) ||
                isSolid(newPos.x - width, groundLevel - 0.1, newPos.z) ||
                isSolid(newPos.x + width, groundLevel - 0.1, newPos.z) ||
                isSolid(newPos.x, groundLevel - 0.1, newPos.z - width) ||
                isSolid(newPos.x, groundLevel - 0.1, newPos.z + width)) {
                
                velocity.y = Math.max(0, velocity.y);
                canJump = true;
                
                // Snap to top of block roughly
                // This is simple: just stop falling
            } else {
                canJump = false;
            }

            // Floor failsafe
            if (newPos.y < -10) {
                velocity.y = 0;
                newPos.y = 20;
                newPos.x = 0;
                newPos.z = 0;
            }
        }

        // --- Interaction (Mining / Building) ---

        function getRayIntersection() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(Object.values(chunks).map(c => c.mesh));
            if (intersects.length > 0) {
                // Find closest intersection within distance
                for(let i=0; i<intersects.length; i++) {
                    if(intersects[i].distance < 5) {
                        return intersects[i];
                    }
                }
            }
            return null;
        }

        function breakBlock() {
            const hit = getRayIntersection();
            if (!hit) return;

            const p = hit.point;
            const n = hit.face.normal;

            // Adjust point slightly inside the block
            const bx = Math.floor(p.x - n.x * 0.1);
            const by = Math.floor(p.y - n.y * 0.1);
            const bz = Math.floor(p.z - n.z * 0.1);

            const cx = Math.floor(bx / CHUNK_SIZE);
            const cz = Math.floor(bz / CHUNK_SIZE);
            const chunkKey = `${cx},${cz}`;

            if (chunks[chunkKey]) {
                const blockKey = getBlockKey(bx, by, bz);
                const blockType = chunks[chunkKey].data[blockKey];
                
                if (blockType) {
                    // Remove block
                    delete chunks[chunkKey].data[blockKey];
                    
                    // Rebuild chunk mesh (Inefficient but works for this demo)
                    // Better: InstancedMesh or dynamic geometry updates.
                    // For this simple HTML file, we regenerate the whole chunk.
                    scene.remove(chunks[chunkKey].mesh);
                    chunks[chunkKey].mesh.geometry.dispose();
                    // Remove entry from map so createChunk redraws it
                    delete chunks[chunkKey];
                    createChunk(cx, cz);

                    // Spawn Drop
                    spawnDrop(bx + 0.5, by + 0.5, bz + 0.5, blockType);
                }
            }
        }

        function placeBlock() {
            const hit = getRayIntersection();
            if (!hit) return;

            const p = hit.point;
            const n = hit.face.normal;
            const bx = Math.floor(p.x + n.x * 0.1);
            const by = Math.floor(p.y + n.y * 0.1);
            const bz = Math.floor(p.z + n.z * 0.1);

            // Check if player is inside that block
            const playerPos = controls.getObject().position;
            const dx = Math.abs(bx + 0.5 - playerPos.x);
            const dz = Math.abs(bz + 0.5 - playerPos.z);
            const dy = by - playerPos.y; // player eyes at top

            // Simple check: if block center is too close to player feet/head
            if (dx < 0.6 && dz < 0.6 && (dy >= -1.8 && dy <= 0.5)) {
                showToast("Cannot place block inside yourself!");
                return;
            }

            const cx = Math.floor(bx / CHUNK_SIZE);
            const cz = Math.floor(bz / CHUNK_SIZE);
            const chunkKey = `${cx},${cz}`;

            const slot = inventory.slots[inventory.selectedSlot];
            
            if (slot.count > 0) {
                // Add block
                if (!chunks[chunkKey]) createChunk(cx, cz);
                
                chunks[chunkKey].data[getBlockKey(bx, by, bz)] = slot.id;
                slot.count--;
                updateInventoryUI();

                // Rebuild
                scene.remove(chunks[chunkKey].mesh);
                chunks[chunkKey].mesh.geometry.dispose();
                delete chunks[chunkKey];
                createChunk(cx, cz);
            } else {
                showToast("No blocks left!");
            }
        }

        // --- Loot System ---

        function spawnDrop(x, y, z, type) {
            const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const color = BLOCK_PROPS[type].color;
            const material = new THREE.MeshLambertMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            scene.add(mesh);

            activeDrops.push({
                mesh: mesh,
                type: type,
                velocity: new THREE.Vector3((Math.random()-0.5)*5, 4, (Math.random()-0.5)*5), // Pop up
                grounded: false
            });
        }

        function updateDrops(delta) {
            for (let i = activeDrops.length - 1; i >= 0; i--) {
                const drop = activeDrops[i];
                const mesh = drop.mesh;

                // Physics
                drop.velocity.y -= 20 * delta; // Gravity
                mesh.position.addScaledVector(drop.velocity, delta);

                // Rotation
                mesh.rotation.x += delta * 2;
                mesh.rotation.y += delta * 3;

                // Ground Collision (Simple y < terrain height)
                // For robustness, we use the isSolid check
                const cx = Math.floor(mesh.position.x / CHUNK_SIZE);
                const cz = Math.floor(mesh.position.z / CHUNK_SIZE);
                
                // If chunk exists, check ground
                // Simplified: If y < height at x,z
                // We can approximate ground y by checking block below
                const bx = Math.floor(mesh.position.x);
                const bz = Math.floor(mesh.position.z);
                const by = Math.floor(mesh.position.y - 0.2);

                if (isSolid(bx, by, bz)) {
                    mesh.position.y = by + 0.5 + 0.15; // Snap to top
                    drop.velocity.y = 0;
                    drop.velocity.x *= 0.9; // Friction
                    drop.velocity.z *= 0.9;
                    drop.grounded = true;
                }

                // Player Pickup
                const playerPos = controls.getObject().position;
                const dist = mesh.position.distanceTo(playerPos);
                
                if (dist < 1.5) {
                    // Pickup
                    // Find inventory slot
                    const slot = inventory.slots.find(s => s.id === drop.type);
                    if (slot) {
                        slot.count++;
                        updateInventoryUI();
                    }
                    
                    // Remove
                    scene.remove(mesh);
                    mesh.geometry.dispose();
                    mesh.material.dispose();
                    activeDrops.splice(i, 1);
                    showToast(`+1 ${BLOCK_PROPS[drop.type].name}`);
                }
                
                // Cleanup drops that fell out of world
                if (mesh.position.y < -20) {
                    scene.remove(mesh);
                    activeDrops.splice(i, 1);
                }
            }
        }

        function showToast(msg) {
            const area = document.getElementById('notification-area');
            const el = document.createElement('div');
            el.className = 'toast';
            el.innerText = msg;
            area.appendChild(el);
            setTimeout(() => {
                if (el.parentNode) el.parentNode.removeChild(el);
            }, 2000);
        }

        // --- Event Handlers ---

        function onKeyDown(event) {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW': moveForward = true; break;
                case 'ArrowLeft':
                case 'KeyA': moveLeft = true; break;
                case 'ArrowDown':
                case 'KeyS': moveBackward = true; break;
                case 'ArrowRight':
                case 'KeyD': moveRight = true; break;
                case 'Space': 
                    if (canJump) {
                        velocity.y = 10;
                        canJump = false;
                    }
                    break;
                case 'Digit1': inventory.selectedSlot = 0; updateInventoryUI(); break;
                case 'Digit2': inventory.selectedSlot = 1; updateInventoryUI(); break;
                case 'Digit3': inventory.selectedSlot = 2; updateInventoryUI(); break;
                case 'Digit4': inventory.selectedSlot = 3; updateInventoryUI(); break;
                case 'Digit5': inventory.selectedSlot = 4; updateInventoryUI(); break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW': moveForward = false; break;
                case 'ArrowLeft':
                case 'KeyA': moveLeft = false; break;
                case 'ArrowDown':
                case 'KeyS': moveBackward = false; break;
                case 'ArrowRight':
                case 'KeyD': moveRight = false; break;
            }
        }

        function onMouseDown(event) {
            if (!controls.isLocked) return;
            
            if (event.button === 0) { // LMB
                breakBlock();
            } else if (event.button === 2) { // RMB
                placeBlock();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Main Loop ---

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                // Movement Logic
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); // Ensure consistent speed in all directions

                const speed = 10.0; // Units per second
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * 10.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * 10.0 * delta;

                // Apply Gravity
                velocity.y -= 25.0 * delta;

                // Move Controls Object
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                const pos = controls.getObject().position;
                pos.y += velocity.y * delta;

                // Collision Detection & Resolution
                handleCollisions(pos, delta);

                // Friction
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                prevTime = time;

                // Chunk Generation
                updateChunks();

                // Drops
                updateDrops(delta);

                // UI Updates
                document.getElementById('pos-counter').innerText = 
                    `${Math.floor(pos.x)}, ${Math.floor(pos.y)}, ${Math.floor(pos.z)}`;
            } else {
                prevTime = performance.now();
            }

            renderer.render(scene, camera);
            
            // FPS Counter (approx)
            // document.getElementById('fps-counter').innerText = Math.round(1 / ((performance.now() - prevTime)/1000));
        }

        // Boot
        init();

    </script>
</body>
