<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Voxel Sandbox</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: "Segoe UI", Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }
    #slots {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      pointer-events: none;
      z-index: 5;
    }
    .slot {
      min-width: 90px;
      color: #fff;
      font-size: 12px;
      text-align: center;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.35);
    }
    .slot .name {
      display: block;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .slot .count {
      font-size: 11px;
      opacity: 0.85;
    }
    .slot.active {
      border-color: #ffd166;
      background: rgba(255, 209, 102, 0.2);
      box-shadow: 0 0 8px rgba(255, 209, 102, 0.5);
    }
    #hint {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 5;
      pointer-events: none;
    }
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 18px;
      text-shadow: 0 0 4px #000;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="hint">Click to lock mouse. WASD + Space. LMB break, RMB place.</div>
  <div id="crosshair">+</div>
  <div id="slots"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
  <script>
    (() => {
      // Basic setup
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.rotation.order = "YXZ";

      const ambient = new THREE.HemisphereLight(0xcde7ff, 0x4c3b2a, 0.5);
      const sun = new THREE.DirectionalLight(0xffffff, 0.9);
      sun.position.set(60, 100, 20);
      scene.add(ambient, sun);

      // UI elements
      const slotsEl = document.getElementById("slots");
      const hintEl = document.getElementById("hint");
      const crosshairEl = document.getElementById("crosshair");

      // Block definitions
      const BLOCK_TYPES = [
        null,
        { id: 1, name: "Grass", color: 0x62b25a },
        { id: 2, name: "Dirt", color: 0x8b5a2b },
        { id: 3, name: "Stone", color: 0x8f8f8f },
        { id: 4, name: "Plank", color: 0xc69c6d }
      ];

      const boxGeo = new THREE.BoxGeometry(1, 1, 1);
      const materials = BLOCK_TYPES.map(type => type ? new THREE.MeshLambertMaterial({ color: type.color }) : null);

      // Noise helpers for terrain
      const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
      const lerp = (a, b, t) => a + (b - a) * t;
      const hash2 = (x, z) => {
        let h = x * 374761393 + z * 668265263;
        h = (h ^ (h >>> 13)) * 1274126177;
        h = (h ^ (h >>> 16)) >>> 0;
        return h / 4294967295;
      };
      const valueNoise2D = (x, z) => {
        const xi = Math.floor(x);
        const zi = Math.floor(z);
        const xf = x - xi;
        const zf = z - zi;
        const tl = hash2(xi, zi);
        const tr = hash2(xi + 1, zi);
        const bl = hash2(xi, zi + 1);
        const br = hash2(xi + 1, zi + 1);
        const u = fade(xf);
        const v = fade(zf);
        const top = lerp(tl, tr, u);
        const bottom = lerp(bl, br, u);
        return lerp(top, bottom, v) * 2 - 1;
      };
      const fbm = (x, z, octaves = 4, lac = 2, gain = 0.5) => {
        let amp = 1;
        let freq = 1;
        let sum = 0;
        let norm = 0;
        for (let i = 0; i < octaves; i++) {
          sum += valueNoise2D(x * freq, z * freq) * amp;
          norm += amp;
          amp *= gain;
          freq *= lac;
        }
        return sum / norm;
      };
      const smoothstep = (a, b, x) => {
        const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
        return t * t * (3 - 2 * t);
      };

      // World settings
      const CHUNK_SIZE = 16;
      const WORLD_HEIGHT = 64;
      const VIEW_DISTANCE = 2; // chunk radius

      const chunks = new Map(); // key -> chunk data
      const tmpMatrix = new THREE.Matrix4();

      const player = {
        pos: new THREE.Vector3(0, 32, 0),
        vel: new THREE.Vector3(),
        yaw: 0,
        pitch: 0,
        radius: 0.35,
        height: 1.8,
        eyeHeight: 1.6,
        onGround: false
      };

      const inventory = {};
      let activeBlockId = 1;
      let jumpQueued = false;

      BLOCK_TYPES.forEach(type => {
        if (type) {
          inventory[type.id] = type.id <= 3 ? 20 : 12;
        }
      });

      const drops = [];

      // Utility index helpers
      const chunkKey = (cx, cz) => cx + "," + cz;
      const idx = (x, y, z) => y * CHUNK_SIZE * CHUNK_SIZE + z * CHUNK_SIZE + x;

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

      // Terrain height function with plains and hills blended
      const terrainHeight = (x, z) => {
        const hillMask = smoothstep(0.2, 0.75, fbm(x * 0.01, z * 0.01));
        const hills = fbm(x * 0.05, z * 0.05, 4) * 12 + 20;
        const plains = fbm(x * 0.08, z * 0.08, 3) * 3 + 14;
        return Math.floor(clamp(plains * (1 - hillMask) + hills * hillMask, 4, WORLD_HEIGHT - 4));
      };

      const createChunk = (cx, cz) => {
        const data = new Uint8Array(CHUNK_SIZE * WORLD_HEIGHT * CHUNK_SIZE);
        for (let lx = 0; lx < CHUNK_SIZE; lx++) {
          for (let lz = 0; lz < CHUNK_SIZE; lz++) {
            const wx = cx * CHUNK_SIZE + lx;
            const wz = cz * CHUNK_SIZE + lz;
            const h = terrainHeight(wx, wz);
            for (let y = 0; y < h; y++) {
              let block = 3; // stone default
              if (y === h - 1) block = 1;
              else if (y >= h - 4) block = 2;
              data[idx(lx, y, lz)] = block;
            }
          }
        }
        return { cx, cz, data, group: null };
      };

      const getChunk = (cx, cz) => {
        const key = chunkKey(cx, cz);
        if (!chunks.has(key)) {
          const chunk = createChunk(cx, cz);
          chunks.set(key, chunk);
          rebuildChunkMesh(chunk);
        }
        return chunks.get(key);
      };

      const chunkForWorld = (x, z) => {
        const cx = Math.floor(x / CHUNK_SIZE);
        const cz = Math.floor(z / CHUNK_SIZE);
        return getChunk(cx, cz);
      };

      const localCoord = (v) => ((v % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;

      const getBlock = (wx, wy, wz) => {
        if (wy < 0 || wy >= WORLD_HEIGHT) return 0;
        const chunk = chunkForWorld(wx, wz);
        const lx = localCoord(wx);
        const lz = localCoord(wz);
        return chunk.data[idx(lx, wy, lz)];
      };

      const setBlock = (wx, wy, wz, id) => {
        if (wy < 0 || wy >= WORLD_HEIGHT) return;
        const cx = Math.floor(wx / CHUNK_SIZE);
        const cz = Math.floor(wz / CHUNK_SIZE);
        const chunk = getChunk(cx, cz);
        const lx = localCoord(wx);
        const lz = localCoord(wz);
        chunk.data[idx(lx, wy, lz)] = id;
        rebuildChunkMesh(chunk);
      };

      function rebuildChunkMesh(chunk) {
        if (chunk.group) {
          scene.remove(chunk.group);
        }
        const byType = new Map();
        for (let y = 0; y < WORLD_HEIGHT; y++) {
          for (let z = 0; z < CHUNK_SIZE; z++) {
            for (let x = 0; x < CHUNK_SIZE; x++) {
              const id = chunk.data[idx(x, y, z)];
              if (!id) continue;
              if (!byType.has(id)) byType.set(id, []);
              byType.get(id).push([x, y, z]);
            }
          }
        }
        const group = new THREE.Group();
        byType.forEach((positions, id) => {
          const mesh = new THREE.InstancedMesh(boxGeo, materials[id], positions.length);
          positions.forEach((p, i) => {
            const wx = chunk.cx * CHUNK_SIZE + p[0] + 0.5;
            const wy = p[1] + 0.5;
            const wz = chunk.cz * CHUNK_SIZE + p[2] + 0.5;
            tmpMatrix.makeTranslation(wx, wy, wz);
            mesh.setMatrixAt(i, tmpMatrix);
          });
          mesh.instanceMatrix.needsUpdate = true;
          group.add(mesh);
        });
        chunk.group = group;
        scene.add(group);
      }

      // Drops
      const spawnDrop = (wx, wy, wz, blockId) => {
        const mesh = new THREE.Mesh(boxGeo, materials[blockId]);
        mesh.scale.setScalar(0.4);
        const pos = new THREE.Vector3(wx + 0.5, wy + 0.5, wz + 0.5);
        mesh.position.copy(pos);
        scene.add(mesh);
        drops.push({
          mesh,
          pos,
          vel: new THREE.Vector3((Math.random() - 0.5) * 2, 5, (Math.random() - 0.5) * 2),
          blockId,
          life: 0
        });
      };

      const removeDrop = (drop) => {
        scene.remove(drop.mesh);
      };

      const addToInventory = (id, amount) => {
        inventory[id] = (inventory[id] || 0) + amount;
        updateSlotsUI();
      };

      // UI
      const updateSlotsUI = () => {
        slotsEl.innerHTML = "";
        BLOCK_TYPES.forEach((type, index) => {
          if (!type) return;
          const slot = document.createElement("div");
          slot.className = "slot" + (activeBlockId === type.id ? " active" : "");
          const count = inventory[type.id] || 0;
          slot.innerHTML = '<span class="name">' + type.name + "</span><span class=\"count\">x" + count + "</span>";
          slotsEl.appendChild(slot);
        });
      };

      // Input handling
      const keys = new Set();
      let pointerLocked = false;

      window.addEventListener("contextmenu", e => e.preventDefault());

      window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });

      const onPointerLockChange = () => {
        pointerLocked = document.pointerLockElement === renderer.domElement;
        hintEl.style.display = pointerLocked ? "none" : "block";
      };

      renderer.domElement.addEventListener("click", () => {
        renderer.domElement.requestPointerLock();
      });
      document.addEventListener("pointerlockchange", onPointerLockChange);

      document.addEventListener("mousemove", (e) => {
        if (!pointerLocked) return;
        const sensitivity = 0.0025;
        player.yaw -= e.movementX * sensitivity;
        player.pitch -= e.movementY * sensitivity;
        const limit = Math.PI / 2 - 0.01;
        player.pitch = clamp(player.pitch, -limit, limit);
      });

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          jumpQueued = true;
        }
        if (e.code.startsWith("Digit")) {
          const num = parseInt(e.code.replace("Digit", ""), 10);
          const type = BLOCK_TYPES[num];
          if (type) {
            activeBlockId = type.id;
            updateSlotsUI();
          }
        }
        keys.add(e.code);
      });

      document.addEventListener("keyup", (e) => {
        keys.delete(e.code);
      });

      // Raycast into voxel grid (3D DDA)
      const voxelRaycast = (origin, dir, maxDist = 6) => {
        const pos = origin.clone().floor();
        const step = new THREE.Vector3(
          dir.x > 0 ? 1 : -1,
          dir.y > 0 ? 1 : -1,
          dir.z > 0 ? 1 : -1
        );
        const tDelta = new THREE.Vector3(
          Math.abs(1 / dir.x),
          Math.abs(1 / dir.y),
          Math.abs(1 / dir.z)
        );
        const nextVoxel = (axis) => (pos[axis] + (dir[axis] > 0 ? 1 : 0) - origin[axis]) * (1 / dir[axis]);
        const tMax = new THREE.Vector3(
          isFinite(tDelta.x) ? nextVoxel("x") : Infinity,
          isFinite(tDelta.y) ? nextVoxel("y") : Infinity,
          isFinite(tDelta.z) ? nextVoxel("z") : Infinity
        );
        let face = new THREE.Vector3();
        let dist = 0;
        while (dist <= maxDist) {
          const block = getBlock(pos.x, pos.y, pos.z);
          if (block) {
            return { position: pos.clone(), normal: face.clone(), id: block };
          }
          if (tMax.x < tMax.y) {
            if (tMax.x < tMax.z) {
              pos.x += step.x;
              dist = tMax.x;
              tMax.x += tDelta.x;
              face.set(-step.x, 0, 0);
            } else {
              pos.z += step.z;
              dist = tMax.z;
              tMax.z += tDelta.z;
              face.set(0, 0, -step.z);
            }
          } else {
            if (tMax.y < tMax.z) {
              pos.y += step.y;
              dist = tMax.y;
              tMax.y += tDelta.y;
              face.set(0, -step.y, 0);
            } else {
              pos.z += step.z;
              dist = tMax.z;
              tMax.z += tDelta.z;
              face.set(0, 0, -step.z);
            }
          }
        }
        return null;
      };

      // Block interactions
      const breakBlock = () => {
        const origin = camera.position.clone();
        const dir = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation).normalize();
        const hit = voxelRaycast(origin, dir, 6);
        if (!hit) return;
        setBlock(hit.position.x, hit.position.y, hit.position.z, 0);
        spawnDrop(hit.position.x, hit.position.y, hit.position.z, hit.id);
      };

      const placeBlock = () => {
        if (!inventory[activeBlockId] || inventory[activeBlockId] <= 0) return;
        const origin = camera.position.clone();
        const dir = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation).normalize();
        const hit = voxelRaycast(origin, dir, 6);
        if (!hit) return;
        const target = hit.position.clone().add(hit.normal);
        const dist = target.clone().addScalar(0.5).distanceTo(camera.position);
        if (dist > 7) return;
        if (getBlock(target.x, target.y, target.z)) return;
        const collidesPlayer = isInsidePlayer(target.x, target.y, target.z);
        if (collidesPlayer) return;
        setBlock(target.x, target.y, target.z, activeBlockId);
        inventory[activeBlockId] -= 1;
        updateSlotsUI();
      };

      const isInsidePlayer = (bx, by, bz) => {
        const r = player.radius + 0.01;
        const h = player.height;
        const min = new THREE.Vector3(bx, by, bz);
        const max = min.clone().addScalar(1);
        const pMin = new THREE.Vector3(player.pos.x - r, player.pos.y, player.pos.z - r);
        const pMax = new THREE.Vector3(player.pos.x + r, player.pos.y + h, player.pos.z + r);
        return !(max.x < pMin.x || min.x > pMax.x || max.y < pMin.y || min.y > pMax.y || max.z < pMin.z || min.z > pMax.z);
      };

      document.addEventListener("mousedown", (e) => {
        if (!pointerLocked) return;
        if (e.button === 0) breakBlock();
        if (e.button === 2) placeBlock();
      });

      // Player movement and collisions
      const solid = (x, y, z) => getBlock(x, y, z) !== 0;

      const movePlayer = (delta) => {
        const forward = new THREE.Vector3(Math.sin(player.yaw), 0, Math.cos(player.yaw));
        const right = new THREE.Vector3(forward.z, 0, -forward.x);
        const move = new THREE.Vector3();
        if (keys.has("KeyW")) move.add(forward);
        if (keys.has("KeyS")) move.sub(forward);
        if (keys.has("KeyA")) move.sub(right);
        if (keys.has("KeyD")) move.add(right);
        if (move.lengthSq() > 0) move.normalize();
        const speed = player.onGround ? 6 : 4;
        const desired = move.multiplyScalar(speed);
        player.vel.x = desired.x;
        player.vel.z = desired.z;
        player.vel.y -= 25 * delta;
        if (player.onGround && jumpQueued) {
          player.vel.y = 8;
          player.onGround = false;
        }
        jumpQueued = false;
        const step = player.vel.clone().multiplyScalar(delta);
        player.pos = resolveCollisions(player.pos, step);
        const eyePos = player.pos.clone();
        eyePos.y += player.eyeHeight;
        camera.position.copy(eyePos);
        camera.rotation.set(player.pitch, player.yaw, 0, "YXZ");
      };

      const resolveCollisions = (pos, delta) => {
        const newPos = pos.clone();
        player.onGround = false;
        const sweepAxis = (axis, amount) => {
          if (amount === 0) return;
          newPos[axis] += amount;
          const r = player.radius;
          const h = player.height;
          const minX = Math.floor(newPos.x - r);
          const maxX = Math.floor(newPos.x + r);
          const minY = Math.floor(newPos.y);
          const maxY = Math.floor(newPos.y + h);
          const minZ = Math.floor(newPos.z - r);
          const maxZ = Math.floor(newPos.z + r);
          outer: for (let x = minX; x <= maxX; x++) {
            for (let y = minY; y <= maxY; y++) {
              for (let z = minZ; z <= maxZ; z++) {
                if (!solid(x, y, z)) continue;
                if (axis === "x") {
                  if (amount > 0) newPos.x = x - r - 0.001;
                  else newPos.x = x + 1 + r + 0.001;
                } else if (axis === "y") {
                  if (amount > 0) {
                    newPos.y = y - h - 0.001;
                    player.vel.y = 0;
                  } else {
                    newPos.y = y + 1 + 0.001;
                    player.vel.y = 0;
                    player.onGround = true;
                  }
                } else if (axis === "z") {
                  if (amount > 0) newPos.z = z - r - 0.001;
                  else newPos.z = z + 1 + r + 0.001;
                }
                break outer;
              }
            }
          }
        };
        sweepAxis("x", delta.x);
        sweepAxis("y", delta.y);
        sweepAxis("z", delta.z);
        return newPos;
      };

      // Chunk management
      const loadChunksAroundPlayer = () => {
        const pcx = Math.floor(player.pos.x / CHUNK_SIZE);
        const pcz = Math.floor(player.pos.z / CHUNK_SIZE);
        for (let dx = -VIEW_DISTANCE; dx <= VIEW_DISTANCE; dx++) {
          for (let dz = -VIEW_DISTANCE; dz <= VIEW_DISTANCE; dz++) {
            getChunk(pcx + dx, pcz + dz);
          }
        }
        // Optionally remove far meshes to save draw calls
        chunks.forEach(chunk => {
          const dist = Math.max(Math.abs(chunk.cx - pcx), Math.abs(chunk.cz - pcz));
          if (chunk.group) {
            chunk.group.visible = dist <= VIEW_DISTANCE + 1;
          }
        });
      };

      // Drops update
      const updateDrops = (dt) => {
        const gravity = 18;
        const playerHead = player.pos.clone().add(new THREE.Vector3(0, player.eyeHeight, 0));
        for (let i = drops.length - 1; i >= 0; i--) {
          const d = drops[i];
          d.life += dt;
          d.vel.y -= gravity * dt;
          d.pos.addScaledVector(d.vel, dt);
          // simple ground stop
          const below = solid(Math.floor(d.pos.x), Math.floor(d.pos.y - 0.3), Math.floor(d.pos.z));
          if (below && d.vel.y < 0) {
            d.vel.y = 0;
            d.pos.y = Math.floor(d.pos.y) + 0.3;
            d.vel.x *= 0.6;
            d.vel.z *= 0.6;
          }
          d.mesh.position.copy(d.pos);
          d.mesh.rotation.y += dt * 6;
          if (d.pos.distanceTo(playerHead) < 1.5) {
            addToInventory(d.blockId, 1);
            removeDrop(d);
            drops.splice(i, 1);
            continue;
          }
          if (d.life > 60) {
            removeDrop(d);
            drops.splice(i, 1);
          }
        }
      };

      // Initial world setup
      loadChunksAroundPlayer();
      player.pos.y = terrainHeight(0, 0) + 4;
      updateSlotsUI();

      // Main loop
      let last = performance.now();
      const tick = (t) => {
        const dt = Math.min(0.05, (t - last) / 1000);
        last = t;
        loadChunksAroundPlayer();
        if (pointerLocked) movePlayer(dt);
        updateDrops(dt);
        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
