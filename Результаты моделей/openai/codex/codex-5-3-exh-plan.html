<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voxel Sandbox Loop</title>
  <style>
    :root {
      --ui-bg: rgba(15, 20, 28, 0.7);
      --ui-border: rgba(255, 255, 255, 0.25);
      --ui-text: #ecf2ff;
      --ui-accent: #79d6ff;
      --ui-active: #ffe07a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #9dc4f2 0%, #d9ecff 100%);
    }

    #game-root {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: var(--ui-text);
      user-select: none;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      transform: translate(-50%, -50%);
      opacity: 0.92;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.95);
    }

    #crosshair::before {
      left: 6px;
      top: 0;
      width: 2px;
      height: 14px;
    }

    #crosshair::after {
      left: 0;
      top: 6px;
      width: 14px;
      height: 2px;
    }

    #hotbar {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 10px;
      border-radius: 12px;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    .slot {
      width: 86px;
      height: 60px;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.22);
      padding: 6px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 120ms ease, transform 120ms ease;
    }

    .slot.active {
      border-color: var(--ui-active);
      box-shadow: 0 0 0 1px rgba(255, 224, 122, 0.65) inset;
      transform: translateY(-2px);
    }

    .slot .chip {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, 0.3);
      flex: 0 0 auto;
    }

    .slot .name {
      font-size: 12px;
      line-height: 1.05;
      color: var(--ui-text);
      max-width: 42px;
    }

    .slot .count {
      position: absolute;
      right: 6px;
      bottom: 5px;
      font-size: 12px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.65);
    }

    .slot .key {
      position: absolute;
      left: 6px;
      bottom: 5px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }

    #hint {
      position: absolute;
      left: 16px;
      top: 14px;
      max-width: 560px;
      font-size: 13px;
      line-height: 1.4;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      color: var(--ui-text);
    }

    #debug {
      position: absolute;
      left: 16px;
      bottom: 16px;
      font-size: 12px;
      line-height: 1.35;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(13, 18, 24, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(230, 240, 255, 0.9);
      max-width: 88vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #lock-prompt {
      position: absolute;
      left: 50%;
      top: 24%;
      transform: translateX(-50%);
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(12, 17, 24, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #f0f6ff;
      text-align: center;
      font-size: 15px;
      line-height: 1.45;
      min-width: 290px;
      max-width: 88vw;
    }
  </style>
</head>
<body>
  <div id="game-root"></div>
  <div id="hud">
    <div id="crosshair"></div>
    <div id="hint">
      Click to lock cursor. Move: WASD, Jump: Space, Mine: LMB, Build: RMB, Select slot: 1-8 or Mouse Wheel.
    </div>
    <div id="lock-prompt">
      Click to start first-person mode.<br />
      Press Esc any time to unlock cursor.
    </div>
    <div id="hotbar"></div>
    <div id="debug"></div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.1/build/three.module.js";

    const CHUNK_SIZE = 16;
    const WORLD_HEIGHT = 64;
    const RENDER_RADIUS = 4;

    const FIXED_DT = 1 / 60;
    const FIXED_MS = 1000 / 60;
    const GRAVITY = -24;
    const DROP_GRAVITY = -18;
    const DROP_LIFETIME = 45;
    const BREAK_INTERVAL = 0.17;
    const PLACE_INTERVAL = 0.12;
    const EPSILON = 0.0001;
    const SEED = 94721;

    const PLAYER_HALF_WIDTH = 0.3;
    const PLAYER_HEIGHT = 1.8;
    const PLAYER_EYE_HEIGHT = 1.62;
    const PLAYER_GROUND_SPEED = 6.2;
    const PLAYER_AIR_SPEED = 4.6;
    const PLAYER_JUMP_SPEED = 8.3;
    const PICKUP_RADIUS = 1.25;

    /** @type {{AIR:0,GRASS:1,DIRT:2,STONE:3,WOOD:4,LEAVES:5,BEDROCK:6}} */
    const BLOCK = Object.freeze({
      AIR: 0,
      GRASS: 1,
      DIRT: 2,
      STONE: 3,
      WOOD: 4,
      LEAVES: 5,
      BEDROCK: 6
    });

    const BLOCK_IDS = [BLOCK.GRASS, BLOCK.DIRT, BLOCK.STONE, BLOCK.WOOD, BLOCK.LEAVES, BLOCK.BEDROCK];

    const BLOCK_META = {
      [BLOCK.AIR]: { name: "Air", color: 0x000000 },
      [BLOCK.GRASS]: { name: "Grass", color: 0x59a33f },
      [BLOCK.DIRT]: { name: "Dirt", color: 0x855f42 },
      [BLOCK.STONE]: { name: "Stone", color: 0x7e7e87 },
      [BLOCK.WOOD]: { name: "Wood", color: 0xa0703f },
      [BLOCK.LEAVES]: { name: "Leaves", color: 0x4f8d42 },
      [BLOCK.BEDROCK]: { name: "Bedrock", color: 0x2f3238 }
    };

    const rootEl = document.getElementById("game-root");
    const hotbarEl = document.getElementById("hotbar");
    const debugEl = document.getElementById("debug");
    const lockPromptEl = document.getElementById("lock-prompt");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9dc4f2);
    scene.fog = new THREE.Fog(0x9dc4f2, 70, 220);

    const camera = new THREE.PerspectiveCamera(76, window.innerWidth / window.innerHeight, 0.05, 600);
    camera.rotation.order = "YXZ";

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    rootEl.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xd9e9ff, 0x6a8f50, 1.05);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 0.72);
    sun.position.set(70, 120, 35);
    scene.add(sun);

    const selectWire = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(1.02, 1.02, 1.02)),
      new THREE.LineBasicMaterial({ color: 0xf6f9ff })
    );
    selectWire.visible = false;
    scene.add(selectWire);

    const raycaster = new THREE.Raycaster();
    raycaster.far = 6;
    const centerNdc = new THREE.Vector2(0, 0);
    const tempNormalMatrix = new THREE.Matrix3();
    const tempObj = new THREE.Object3D();

    /** @type {Map<string, {cx:number,cz:number,blocks:Uint8Array,dirty:boolean,group:THREE.Group|null,instanceMaps:Map<number, Array<[number,number,number]>>}>} */
    const chunks = new Map();
    const dirtyQueue = [];
    const dirtySet = new Set();
    let raycastMeshes = [];

    /** @type {Array<{id:number, blockId:number, pos:THREE.Vector3, vel:THREE.Vector3, rot:number, age:number, mesh:THREE.Mesh}>} */
    const drops = [];
    let nextDropId = 1;
    const dropGeometry = new THREE.BoxGeometry(0.25, 0.25, 0.25);

    const player = {
      pos: new THREE.Vector3(0.5, 24, 0.5),
      vel: new THREE.Vector3(0, 0, 0),
      yaw: 0,
      pitch: -0.35,
      onGround: false
    };

    /** @type {{slots:number[], counts:Record<number, number>, activeSlot:number}} */
    const inventory = {
      slots: [BLOCK.GRASS, BLOCK.DIRT, BLOCK.STONE, BLOCK.WOOD, BLOCK.LEAVES, BLOCK.BEDROCK, BLOCK.STONE, BLOCK.DIRT],
      counts: makeZeroCounts(),
      activeSlot: 0
    };

    const input = {
      forward: false,
      back: false,
      left: false,
      right: false,
      jumpQueued: false,
      leftMouse: false,
      rightMouse: false
    };

    const slotNodes = [];

    let pointerLocked = false;
    let lastTimestamp = performance.now();
    let accumulator = 0;
    let chunkCheckTimer = 0;
    let breakCooldown = 0;
    let placeCooldown = 0;

    let targetInfo = null;
    let usingVirtualPointerLock = false;

    function makeZeroCounts() {
      const counts = {};
      for (const id of BLOCK_IDS) {
        counts[id] = 0;
      }
      return counts;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function smoothstep(t) {
      return t * t * (3 - 2 * t);
    }

    function mod(n, m) {
      return ((n % m) + m) % m;
    }

    function hash2i(x, z) {
      let h = (Math.imul(x, 374761393) ^ Math.imul(z, 668265263) ^ SEED) >>> 0;
      h ^= h >>> 13;
      h = Math.imul(h, 1274126177) >>> 0;
      h ^= h >>> 16;
      return h / 4294967295;
    }

    function valueNoise2(x, z, scale) {
      const fx = x / scale;
      const fz = z / scale;
      const x0 = Math.floor(fx);
      const z0 = Math.floor(fz);
      const x1 = x0 + 1;
      const z1 = z0 + 1;

      const tx = smoothstep(fx - x0);
      const tz = smoothstep(fz - z0);

      const v00 = hash2i(x0, z0);
      const v10 = hash2i(x1, z0);
      const v01 = hash2i(x0, z1);
      const v11 = hash2i(x1, z1);

      const vx0 = lerp(v00, v10, tx);
      const vx1 = lerp(v01, v11, tx);
      return lerp(vx0, vx1, tz);
    }

    function chunkKey(cx, cz) {
      return `${cx},${cz}`;
    }

    function blockIndex(lx, y, lz) {
      return y * CHUNK_SIZE * CHUNK_SIZE + lz * CHUNK_SIZE + lx;
    }

    function worldToChunk(wx, wz) {
      const cx = Math.floor(wx / CHUNK_SIZE);
      const cz = Math.floor(wz / CHUNK_SIZE);
      const lx = mod(wx, CHUNK_SIZE);
      const lz = mod(wz, CHUNK_SIZE);
      return { cx, cz, lx, lz };
    }

    function getBiomeBlend(wx, wz) {
      return valueNoise2(wx, wz, 180);
    }

    function getTerrainHeight(wx, wz) {
      const plains = 18 + (valueNoise2(wx, wz, 48) - 0.5) * 4 + (valueNoise2(wx, wz, 15) - 0.5) * 2;
      const hills = 21 + (valueNoise2(wx, wz, 96) - 0.5) * 22 + (valueNoise2(wx, wz, 31) - 0.5) * 9;
      const blend = Math.pow(getBiomeBlend(wx, wz), 1.2);
      const mixed = Math.round(lerp(plains, hills, blend));
      return clamp(mixed, 3, WORLD_HEIGHT - 6);
    }

    function shouldSpawnTree(wx, wz, topY) {
      if (Math.abs(wx) < 6 && Math.abs(wz) < 6) {
        return false;
      }
      if (topY > WORLD_HEIGHT - 11) {
        return false;
      }
      const biome = getBiomeBlend(wx, wz);
      if (biome > 0.84) {
        return false;
      }
      return valueNoise2(wx + 999, wz - 341, 17) > 0.79;
    }

    function isSolidRender(id) {
      return id !== BLOCK.AIR;
    }

    function isSolidCollision(id) {
      return id !== BLOCK.AIR && id !== BLOCK.LEAVES;
    }

    function queueChunkDirtyByKey(key) {
      const chunk = chunks.get(key);
      if (!chunk) {
        return;
      }
      chunk.dirty = true;
      if (!dirtySet.has(key)) {
        dirtySet.add(key);
        dirtyQueue.push(key);
      }
    }

    function queueChunkDirty(cx, cz) {
      queueChunkDirtyByKey(chunkKey(cx, cz));
    }

    function createChunk(cx, cz) {
      const chunk = {
        cx,
        cz,
        blocks: new Uint8Array(CHUNK_SIZE * WORLD_HEIGHT * CHUNK_SIZE),
        dirty: true,
        group: null,
        instanceMaps: new Map()
      };
      generateChunkTerrain(chunk);
      chunks.set(chunkKey(cx, cz), chunk);
      queueChunkDirty(cx, cz);
      return chunk;
    }

    function getChunk(cx, cz, createIfMissing = false) {
      const key = chunkKey(cx, cz);
      let chunk = chunks.get(key);
      if (!chunk && createIfMissing) {
        chunk = createChunk(cx, cz);
      }
      return chunk || null;
    }

    function setLocalBlock(chunk, lx, y, lz, id) {
      if (lx < 0 || lx >= CHUNK_SIZE || lz < 0 || lz >= CHUNK_SIZE || y < 0 || y >= WORLD_HEIGHT) {
        return;
      }
      chunk.blocks[blockIndex(lx, y, lz)] = id;
    }

    function getLocalBlock(chunk, lx, y, lz) {
      if (lx < 0 || lx >= CHUNK_SIZE || lz < 0 || lz >= CHUNK_SIZE || y < 0 || y >= WORLD_HEIGHT) {
        return BLOCK.AIR;
      }
      return chunk.blocks[blockIndex(lx, y, lz)];
    }

    function generateChunkTerrain(chunk) {
      const topHeights = new Int16Array(CHUNK_SIZE * CHUNK_SIZE);

      for (let lz = 0; lz < CHUNK_SIZE; lz += 1) {
        for (let lx = 0; lx < CHUNK_SIZE; lx += 1) {
          const wx = chunk.cx * CHUNK_SIZE + lx;
          const wz = chunk.cz * CHUNK_SIZE + lz;
          const topY = getTerrainHeight(wx, wz);
          topHeights[lz * CHUNK_SIZE + lx] = topY;

          for (let y = 0; y <= topY; y += 1) {
            let id = BLOCK.STONE;
            if (y === 0) {
              id = BLOCK.BEDROCK;
            } else if (y === topY) {
              id = BLOCK.GRASS;
            } else if (y >= topY - 3) {
              id = BLOCK.DIRT;
            }
            setLocalBlock(chunk, lx, y, lz, id);
          }
        }
      }

      for (let lz = 2; lz < CHUNK_SIZE - 2; lz += 1) {
        for (let lx = 2; lx < CHUNK_SIZE - 2; lx += 1) {
          const topY = topHeights[lz * CHUNK_SIZE + lx];
          if (topY <= 4 || topY >= WORLD_HEIGHT - 10) {
            continue;
          }
          if (getLocalBlock(chunk, lx, topY, lz) !== BLOCK.GRASS) {
            continue;
          }

          const wx = chunk.cx * CHUNK_SIZE + lx;
          const wz = chunk.cz * CHUNK_SIZE + lz;
          if (!shouldSpawnTree(wx, wz, topY)) {
            continue;
          }

          const trunkHeight = 3 + Math.floor(valueNoise2(wx * 2 + 11, wz * 2 - 5, 10) * 3);
          for (let dy = 1; dy <= trunkHeight; dy += 1) {
            const y = topY + dy;
            if (y >= WORLD_HEIGHT - 1) {
              break;
            }
            setLocalBlock(chunk, lx, y, lz, BLOCK.WOOD);
          }

          const leafCenterY = topY + trunkHeight;
          for (let oy = -1; oy <= 2; oy += 1) {
            for (let oz = -2; oz <= 2; oz += 1) {
              for (let ox = -2; ox <= 2; ox += 1) {
                const dist = Math.abs(ox) + Math.abs(oz) + Math.abs(oy * 1.25);
                if (dist > 3.7) {
                  continue;
                }
                const tx = lx + ox;
                const ty = leafCenterY + oy;
                const tz = lz + oz;
                if (tx < 0 || tx >= CHUNK_SIZE || tz < 0 || tz >= CHUNK_SIZE || ty < 1 || ty >= WORLD_HEIGHT) {
                  continue;
                }
                if (getLocalBlock(chunk, tx, ty, tz) === BLOCK.AIR) {
                  setLocalBlock(chunk, tx, ty, tz, BLOCK.LEAVES);
                }
              }
            }
          }
        }
      }
    }

    function getBlock(wx, y, wz) {
      if (y < 0) {
        return BLOCK.BEDROCK;
      }
      if (y >= WORLD_HEIGHT) {
        return BLOCK.AIR;
      }

      const ix = Math.floor(wx);
      const iz = Math.floor(wz);
      const { cx, cz, lx, lz } = worldToChunk(ix, iz);
      const chunk = chunks.get(chunkKey(cx, cz));
      if (!chunk) {
        return BLOCK.AIR;
      }
      return chunk.blocks[blockIndex(lx, y, lz)];
    }

    function setBlock(wx, y, wz, blockId) {
      if (y < 0 || y >= WORLD_HEIGHT) {
        return false;
      }

      const ix = Math.floor(wx);
      const iz = Math.floor(wz);
      const { cx, cz, lx, lz } = worldToChunk(ix, iz);
      const chunk = getChunk(cx, cz, true);
      if (!chunk) {
        return false;
      }

      const idx = blockIndex(lx, y, lz);
      const prev = chunk.blocks[idx];
      if (prev === blockId) {
        return false;
      }
      chunk.blocks[idx] = blockId;
      queueChunkDirty(cx, cz);

      if (lx === 0) queueChunkDirty(cx - 1, cz);
      if (lx === CHUNK_SIZE - 1) queueChunkDirty(cx + 1, cz);
      if (lz === 0) queueChunkDirty(cx, cz - 1);
      if (lz === CHUNK_SIZE - 1) queueChunkDirty(cx, cz + 1);

      return prev;
    }

    function isBlockVisible(wx, y, wz) {
      if (!isSolidRender(getBlock(wx, y, wz))) {
        return false;
      }
      if (!isSolidRender(getBlock(wx + 1, y, wz))) return true;
      if (!isSolidRender(getBlock(wx - 1, y, wz))) return true;
      if (!isSolidRender(getBlock(wx, y + 1, wz))) return true;
      if (!isSolidRender(getBlock(wx, y - 1, wz))) return true;
      if (!isSolidRender(getBlock(wx, y, wz + 1))) return true;
      if (!isSolidRender(getBlock(wx, y, wz - 1))) return true;
      return false;
    }

    function disposeChunkGroup(chunk) {
      if (!chunk.group) {
        return;
      }
      scene.remove(chunk.group);
      for (const child of chunk.group.children) {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) {
            for (const material of child.material) material.dispose();
          } else {
            child.material.dispose();
          }
        }
      }
      chunk.group.clear();
      chunk.group = null;
      chunk.instanceMaps.clear();
    }

    function buildChunkMesh(chunk) {
      disposeChunkGroup(chunk);
      chunk.instanceMaps = new Map();

      const key = chunkKey(chunk.cx, chunk.cz);
      const group = new THREE.Group();
      group.name = `chunk-${key}`;

      const byType = new Map();
      for (const id of BLOCK_IDS) byType.set(id, []);

      for (let y = 0; y < WORLD_HEIGHT; y += 1) {
        for (let lz = 0; lz < CHUNK_SIZE; lz += 1) {
          for (let lx = 0; lx < CHUNK_SIZE; lx += 1) {
            const id = chunk.blocks[blockIndex(lx, y, lz)];
            if (id === BLOCK.AIR) {
              continue;
            }

            const wx = chunk.cx * CHUNK_SIZE + lx;
            const wz = chunk.cz * CHUNK_SIZE + lz;
            if (!isBlockVisible(wx, y, wz)) {
              continue;
            }

            byType.get(id).push([wx, y, wz]);
          }
        }
      }

      for (const [id, positions] of byType) {
        if (positions.length === 0) {
          continue;
        }
        const material = new THREE.MeshLambertMaterial({
          color: BLOCK_META[id].color,
          transparent: id === BLOCK.LEAVES,
          opacity: id === BLOCK.LEAVES ? 0.9 : 1
        });
        const mesh = new THREE.InstancedMesh(new THREE.BoxGeometry(1, 1, 1), material, positions.length);
        mesh.userData.blockId = id;
        mesh.userData.chunkKey = key;
        mesh.frustumCulled = true;

        for (let i = 0; i < positions.length; i += 1) {
          const [wx, y, wz] = positions[i];
          tempObj.position.set(wx + 0.5, y + 0.5, wz + 0.5);
          tempObj.rotation.set(0, 0, 0);
          tempObj.updateMatrix();
          mesh.setMatrixAt(i, tempObj.matrix);
        }
        mesh.instanceMatrix.needsUpdate = true;
        group.add(mesh);
        chunk.instanceMaps.set(id, positions);
      }

      chunk.group = group;
      chunk.dirty = false;
      scene.add(group);
    }

    function rebuildRaycastMeshList() {
      raycastMeshes = [];
      for (const chunk of chunks.values()) {
        if (!chunk.group) continue;
        for (const child of chunk.group.children) {
          raycastMeshes.push(child);
        }
      }
    }

    function processDirtyChunks(limit = 2) {
      let rebuiltAny = false;
      for (let i = 0; i < limit && dirtyQueue.length > 0; i += 1) {
        const key = dirtyQueue.shift();
        dirtySet.delete(key);
        const chunk = chunks.get(key);
        if (!chunk || !chunk.dirty) {
          continue;
        }
        buildChunkMesh(chunk);
        rebuiltAny = true;
      }
      if (rebuiltAny) {
        rebuildRaycastMeshList();
      }
    }

    function unloadFarChunks(centerCx, centerCz) {
      let changed = false;
      for (const [key, chunk] of chunks) {
        if (Math.abs(chunk.cx - centerCx) > RENDER_RADIUS + 1 || Math.abs(chunk.cz - centerCz) > RENDER_RADIUS + 1) {
          disposeChunkGroup(chunk);
          chunks.delete(key);
          dirtySet.delete(key);
          changed = true;
        }
      }
      if (changed) {
        for (let i = dirtyQueue.length - 1; i >= 0; i -= 1) {
          if (!chunks.has(dirtyQueue[i])) {
            dirtyQueue.splice(i, 1);
          }
        }
        rebuildRaycastMeshList();
      }
    }

    function ensureChunksAroundPlayer() {
      const centerCx = Math.floor(player.pos.x / CHUNK_SIZE);
      const centerCz = Math.floor(player.pos.z / CHUNK_SIZE);
      for (let dz = -RENDER_RADIUS; dz <= RENDER_RADIUS; dz += 1) {
        for (let dx = -RENDER_RADIUS; dx <= RENDER_RADIUS; dx += 1) {
          getChunk(centerCx + dx, centerCz + dz, true);
        }
      }
      unloadFarChunks(centerCx, centerCz);
    }

    function playerAabbAt(x, y, z) {
      return {
        minX: x - PLAYER_HALF_WIDTH,
        maxX: x + PLAYER_HALF_WIDTH,
        minY: y,
        maxY: y + PLAYER_HEIGHT,
        minZ: z - PLAYER_HALF_WIDTH,
        maxZ: z + PLAYER_HALF_WIDTH
      };
    }

    function aabbHitsSolid(minX, maxX, minY, maxY, minZ, maxZ) {
      const x0 = Math.floor(minX);
      const x1 = Math.floor(maxX - EPSILON);
      const y0 = Math.floor(minY);
      const y1 = Math.floor(maxY - EPSILON);
      const z0 = Math.floor(minZ);
      const z1 = Math.floor(maxZ - EPSILON);
      for (let y = y0; y <= y1; y += 1) {
        for (let z = z0; z <= z1; z += 1) {
          for (let x = x0; x <= x1; x += 1) {
            if (isSolidCollision(getBlock(x, y, z))) {
              return true;
            }
          }
        }
      }
      return false;
    }

    function resolveX(delta) {
      if (delta === 0) return;
      player.pos.x += delta;
      const a = playerAabbAt(player.pos.x, player.pos.y, player.pos.z);
      if (aabbHitsSolid(a.minX, a.maxX, a.minY, a.maxY, a.minZ, a.maxZ)) {
        if (delta > 0) {
          const blockX = Math.floor(a.maxX);
          player.pos.x = blockX - PLAYER_HALF_WIDTH - EPSILON;
        } else {
          const blockX = Math.floor(a.minX);
          player.pos.x = blockX + 1 + PLAYER_HALF_WIDTH + EPSILON;
        }
        player.vel.x = 0;
      }
    }

    function resolveY(delta) {
      if (delta === 0) return;
      player.onGround = false;
      player.pos.y += delta;
      const a = playerAabbAt(player.pos.x, player.pos.y, player.pos.z);
      if (aabbHitsSolid(a.minX, a.maxX, a.minY, a.maxY, a.minZ, a.maxZ)) {
        if (delta > 0) {
          const blockY = Math.floor(a.maxY);
          player.pos.y = blockY - PLAYER_HEIGHT - EPSILON;
        } else {
          const blockY = Math.floor(a.minY);
          player.pos.y = blockY + 1 + EPSILON;
          player.onGround = true;
        }
        player.vel.y = 0;
      }
    }

    function resolveZ(delta) {
      if (delta === 0) return;
      player.pos.z += delta;
      const a = playerAabbAt(player.pos.x, player.pos.y, player.pos.z);
      if (aabbHitsSolid(a.minX, a.maxX, a.minY, a.maxY, a.minZ, a.maxZ)) {
        if (delta > 0) {
          const blockZ = Math.floor(a.maxZ);
          player.pos.z = blockZ - PLAYER_HALF_WIDTH - EPSILON;
        } else {
          const blockZ = Math.floor(a.minZ);
          player.pos.z = blockZ + 1 + PLAYER_HALF_WIDTH + EPSILON;
        }
        player.vel.z = 0;
      }
    }

    function syncCamera() {
      camera.rotation.y = player.yaw;
      camera.rotation.x = player.pitch;
      camera.position.set(player.pos.x, player.pos.y + PLAYER_EYE_HEIGHT, player.pos.z);
    }

    function updateTargetInfo() {
      targetInfo = null;
      selectWire.visible = false;
      if (raycastMeshes.length === 0) {
        return;
      }

      raycaster.setFromCamera(centerNdc, camera);
      const intersections = raycaster.intersectObjects(raycastMeshes, false);
      if (!intersections.length) {
        return;
      }

      const hit = intersections[0];
      const mesh = hit.object;
      const hitBlockId = mesh.userData.blockId;
      const ckey = mesh.userData.chunkKey;
      const chunk = chunks.get(ckey);
      if (!chunk) {
        return;
      }

      const positions = chunk.instanceMaps.get(hitBlockId);
      if (!positions || !positions[hit.instanceId]) {
        return;
      }

      const [bx, by, bz] = positions[hit.instanceId];
      if (getBlock(bx, by, bz) !== hitBlockId) {
        return;
      }

      const normal = hit.face?.normal ? hit.face.normal.clone() : new THREE.Vector3(0, 1, 0);
      tempNormalMatrix.getNormalMatrix(mesh.matrixWorld);
      normal.applyMatrix3(tempNormalMatrix);
      normal.set(Math.round(normal.x), Math.round(normal.y), Math.round(normal.z));
      if (normal.lengthSq() < 0.5) {
        normal.set(0, 1, 0);
      }

      const placeX = bx + normal.x;
      const placeY = by + normal.y;
      const placeZ = bz + normal.z;

      targetInfo = {
        block: { x: bx, y: by, z: bz, id: hitBlockId },
        normal: { x: normal.x, y: normal.y, z: normal.z },
        place: { x: placeX, y: placeY, z: placeZ }
      };

      selectWire.visible = true;
      selectWire.position.set(bx + 0.5, by + 0.5, bz + 0.5);
    }

    function blockOverlapsPlayer(wx, wy, wz) {
      const p = playerAabbAt(player.pos.x, player.pos.y, player.pos.z);
      const minX = wx;
      const minY = wy;
      const minZ = wz;
      const maxX = wx + 1;
      const maxY = wy + 1;
      const maxZ = wz + 1;
      return !(maxX <= p.minX || minX >= p.maxX || maxY <= p.minY || minY >= p.maxY || maxZ <= p.minZ || minZ >= p.maxZ);
    }

    function addInventory(blockId, amount = 1) {
      if (!inventory.counts[blockId]) inventory.counts[blockId] = 0;
      inventory.counts[blockId] += amount;
      updateHotbar();
    }

    function spawnDrop(blockId, wx, wy, wz) {
      const mesh = new THREE.Mesh(
        dropGeometry,
        new THREE.MeshLambertMaterial({
          color: BLOCK_META[blockId].color
        })
      );
      const rx = (hash2i(wx * 13 + nextDropId, wz * 7 + 111) - 0.5) * 0.34;
      const rz = (hash2i(wx * 17 + 9, wz * 19 + nextDropId) - 0.5) * 0.34;
      mesh.position.set(wx + 0.5 + rx, wy + 0.55, wz + 0.5 + rz);
      scene.add(mesh);

      drops.push({
        id: nextDropId++,
        blockId,
        pos: mesh.position.clone(),
        vel: new THREE.Vector3((Math.random() - 0.5) * 2.4, 3 + Math.random() * 1.1, (Math.random() - 0.5) * 2.4),
        rot: 0,
        age: 0,
        mesh
      });
    }

    function removeDropAt(index) {
      const drop = drops[index];
      scene.remove(drop.mesh);
      if (drop.mesh.material) drop.mesh.material.dispose();
      drops.splice(index, 1);
    }

    function updateDrops(dt) {
      const pickupY = player.pos.y + 0.9;
      const pickupSq = PICKUP_RADIUS * PICKUP_RADIUS;

      for (let i = drops.length - 1; i >= 0; i -= 1) {
        const drop = drops[i];
        drop.age += dt;
        drop.vel.y += DROP_GRAVITY * dt;

        drop.pos.x += drop.vel.x * dt;
        drop.pos.y += drop.vel.y * dt;
        drop.pos.z += drop.vel.z * dt;

        const radius = 0.125;

        const underY = Math.floor(drop.pos.y - radius);
        const underX = Math.floor(drop.pos.x);
        const underZ = Math.floor(drop.pos.z);
        if (isSolidCollision(getBlock(underX, underY, underZ)) && drop.vel.y <= 0) {
          drop.pos.y = underY + 1 + radius + EPSILON;
          drop.vel.y *= -0.25;
          drop.vel.x *= 0.72;
          drop.vel.z *= 0.72;
          if (Math.abs(drop.vel.y) < 0.45) {
            drop.vel.y = 0;
          }
        }

        const xProbe = Math.floor(drop.pos.x + Math.sign(drop.vel.x || 1) * radius);
        if (isSolidCollision(getBlock(xProbe, Math.floor(drop.pos.y), Math.floor(drop.pos.z)))) {
          drop.vel.x *= -0.3;
        }

        const zProbe = Math.floor(drop.pos.z + Math.sign(drop.vel.z || 1) * radius);
        if (isSolidCollision(getBlock(Math.floor(drop.pos.x), Math.floor(drop.pos.y), zProbe))) {
          drop.vel.z *= -0.3;
        }

        drop.rot += dt * 6;
        drop.mesh.position.copy(drop.pos);
        drop.mesh.rotation.set(drop.rot * 0.65, drop.rot, 0);

        const dx = drop.pos.x - player.pos.x;
        const dy = drop.pos.y - pickupY;
        const dz = drop.pos.z - player.pos.z;
        if (dx * dx + dy * dy + dz * dz <= pickupSq) {
          addInventory(drop.blockId, 1);
          removeDropAt(i);
          continue;
        }

        if (drop.age > DROP_LIFETIME) {
          removeDropAt(i);
        }
      }
    }

    function tryBreakBlock() {
      if (!targetInfo) return;
      const { x, y, z, id } = targetInfo.block;
      if (id === BLOCK.AIR || id === BLOCK.BEDROCK) return;
      if (getBlock(x, y, z) !== id) return;
      const prev = setBlock(x, y, z, BLOCK.AIR);
      if (prev === false) return;
      spawnDrop(id, x, y, z);
      targetInfo = null;
      selectWire.visible = false;
    }

    function tryPlaceBlock() {
      if (!targetInfo) return;
      const place = targetInfo.place;
      if (place.y <= 0 || place.y >= WORLD_HEIGHT) return;
      if (getBlock(place.x, place.y, place.z) !== BLOCK.AIR) return;
      if (blockOverlapsPlayer(place.x, place.y, place.z)) return;

      const blockId = inventory.slots[inventory.activeSlot];
      if (!inventory.counts[blockId] || inventory.counts[blockId] <= 0) return;

      const prev = setBlock(place.x, place.y, place.z, blockId);
      if (prev === false) return;
      inventory.counts[blockId] -= 1;
      updateHotbar();
    }

    function selectSlot(next) {
      const count = inventory.slots.length;
      inventory.activeSlot = ((next % count) + count) % count;
      updateHotbar();
    }

    function updateHotbar() {
      for (let i = 0; i < slotNodes.length; i += 1) {
        const node = slotNodes[i];
        const blockId = inventory.slots[i];
        node.classList.toggle("active", i === inventory.activeSlot);
        node.querySelector(".chip").style.background = `#${BLOCK_META[blockId].color.toString(16).padStart(6, "0")}`;
        node.querySelector(".name").textContent = BLOCK_META[blockId].name;
        node.querySelector(".count").textContent = String(inventory.counts[blockId] || 0);
      }
    }

    function createHotbarUi() {
      hotbarEl.innerHTML = "";
      slotNodes.length = 0;
      for (let i = 0; i < 8; i += 1) {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.innerHTML = `
          <div class="chip"></div>
          <div class="name"></div>
          <div class="count">0</div>
          <div class="key">${i + 1}</div>
        `;
        hotbarEl.appendChild(slot);
        slotNodes.push(slot);
      }
      updateHotbar();
    }

    function updateMovement(dt) {
      let inputX = 0;
      let inputZ = 0;
      if (pointerLocked) {
        if (input.forward) inputZ += 1;
        if (input.back) inputZ -= 1;
        if (input.right) inputX += 1;
        if (input.left) inputX -= 1;
      }

      let worldMoveX = 0;
      let worldMoveZ = 0;
      if (inputX !== 0 || inputZ !== 0) {
        const len = Math.hypot(inputX, inputZ);
        inputX /= len;
        inputZ /= len;
        // Keep movement basis aligned with camera yaw (Three.js looks toward -Z at yaw=0).
        const forwardX = -Math.sin(player.yaw);
        const forwardZ = -Math.cos(player.yaw);
        const rightX = Math.cos(player.yaw);
        const rightZ = -Math.sin(player.yaw);
        worldMoveX = rightX * inputX + forwardX * inputZ;
        worldMoveZ = rightZ * inputX + forwardZ * inputZ;
      }

      const accel = player.onGround ? 16 : 4;
      const maxSpeed = player.onGround ? PLAYER_GROUND_SPEED : PLAYER_AIR_SPEED;
      const targetVX = worldMoveX * maxSpeed;
      const targetVZ = worldMoveZ * maxSpeed;
      const blend = Math.min(1, accel * dt);
      player.vel.x += (targetVX - player.vel.x) * blend;
      player.vel.z += (targetVZ - player.vel.z) * blend;

      if (pointerLocked && input.jumpQueued && player.onGround) {
        player.vel.y = PLAYER_JUMP_SPEED;
        player.onGround = false;
      }
      input.jumpQueued = false;

      if (player.onGround && inputX === 0 && inputZ === 0) {
        const friction = Math.max(0, 1 - dt * 11);
        player.vel.x *= friction;
        player.vel.z *= friction;
      }

      player.vel.y += GRAVITY * dt;

      resolveX(player.vel.x * dt);
      resolveY(player.vel.y * dt);
      resolveZ(player.vel.z * dt);

      if (player.pos.y < -22) {
        respawnPlayer();
      }
    }

    function respawnPlayer() {
      const sx = 0;
      const sz = 0;
      const sy = findSpawnY(sx, sz);
      player.pos.set(sx + 0.5, sy, sz + 0.5);
      player.vel.set(0, 0, 0);
      player.onGround = false;
    }

    function findSpawnY(wx, wz) {
      let y = clamp(getTerrainHeight(wx, wz) + 2, 2, WORLD_HEIGHT - 3);
      for (let i = 0; i < 20; i += 1) {
        const feet = getBlock(wx, y, wz);
        const head = getBlock(wx, y + 1, wz);
        const floor = getBlock(wx, y - 1, wz);
        if (!isSolidCollision(feet) && !isSolidCollision(head) && isSolidCollision(floor)) {
          return y + EPSILON;
        }
        y += 1;
      }
      return getTerrainHeight(wx, wz) + 3;
    }

    function updateInteraction(dt) {
      breakCooldown = Math.max(0, breakCooldown - dt);
      placeCooldown = Math.max(0, placeCooldown - dt);

      if (!pointerLocked) {
        return;
      }

      if (input.leftMouse && breakCooldown <= 0) {
        tryBreakBlock();
        breakCooldown = BREAK_INTERVAL;
      }

      if (input.rightMouse && placeCooldown <= 0) {
        tryPlaceBlock();
        placeCooldown = PLACE_INTERVAL;
      }
    }

    function fixedUpdate(dt) {
      updateMovement(dt);
      chunkCheckTimer += dt;
      if (chunkCheckTimer >= 0.22) {
        chunkCheckTimer = 0;
        ensureChunksAroundPlayer();
      }
      processDirtyChunks(2);
      syncCamera();
      updateTargetInfo();
      updateInteraction(dt);
      updateDrops(dt);
    }

    function updateDebug() {
      const activeId = inventory.slots[inventory.activeSlot];
      const ccx = Math.floor(player.pos.x / CHUNK_SIZE);
      const ccz = Math.floor(player.pos.z / CHUNK_SIZE);
      const t = targetInfo
        ? `${targetInfo.block.x},${targetInfo.block.y},${targetInfo.block.z}`
        : "none";
      debugEl.textContent =
        `Pos ${player.pos.x.toFixed(1)}, ${player.pos.y.toFixed(1)}, ${player.pos.z.toFixed(1)} | ` +
        `Chunk ${ccx},${ccz} | Loaded ${chunks.size} | Drops ${drops.length} | ` +
        `Active ${BLOCK_META[activeId].name}:${inventory.counts[activeId] || 0} | Target ${t}`;
    }

    function frame(now) {
      const frameMs = Math.min(100, now - lastTimestamp);
      lastTimestamp = now;
      accumulator += frameMs;

      while (accumulator >= FIXED_MS) {
        fixedUpdate(FIXED_DT);
        accumulator -= FIXED_MS;
      }

      processDirtyChunks(2);
      syncCamera();
      updateTargetInfo();
      updateDebug();
      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }

    function setupInput() {
      function clearMoveKeys() {
        input.forward = false;
        input.back = false;
        input.left = false;
        input.right = false;
        input.leftMouse = false;
        input.rightMouse = false;
      }

      function setLockUiState(locked) {
        pointerLocked = locked;
        lockPromptEl.style.display = locked ? "none" : "block";
      }

      function enableVirtualLock() {
        usingVirtualPointerLock = true;
        setLockUiState(true);
      }

      function disableVirtualLock() {
        usingVirtualPointerLock = false;
        clearMoveKeys();
        if (document.pointerLockElement !== renderer.domElement) {
          setLockUiState(false);
        }
      }

      renderer.domElement.addEventListener("click", () => {
        if (!pointerLocked) {
          try {
            const maybePromise = renderer.domElement.requestPointerLock();
            if (maybePromise && typeof maybePromise.then === "function") {
              maybePromise.catch(() => {
                enableVirtualLock();
              });
            }
          } catch {
            enableVirtualLock();
          }
        }
      });

      document.addEventListener("pointerlockchange", () => {
        const realLock = document.pointerLockElement === renderer.domElement;
        if (realLock) {
          usingVirtualPointerLock = false;
          setLockUiState(true);
        } else if (!usingVirtualPointerLock) {
          clearMoveKeys();
          setLockUiState(false);
        }
      });

      document.addEventListener("mousemove", (event) => {
        if (!pointerLocked) return;
        player.yaw -= event.movementX * 0.0025;
        player.pitch -= event.movementY * 0.0025;
        player.pitch = clamp(player.pitch, -Math.PI / 2 + 0.01, Math.PI / 2 - 0.01);
      });

      window.addEventListener("keydown", (event) => {
        if (event.code === "KeyW" || event.code === "ArrowUp") input.forward = true;
        if (event.code === "KeyS" || event.code === "ArrowDown") input.back = true;
        if (event.code === "KeyA" || event.code === "ArrowLeft") input.left = true;
        if (event.code === "KeyD" || event.code === "ArrowRight") input.right = true;
        if (event.code === "Space" && !event.repeat) {
          input.jumpQueued = true;
          event.preventDefault();
        }
        if (event.code === "Escape" && usingVirtualPointerLock) {
          disableVirtualLock();
        }
        if (event.code.startsWith("Digit")) {
          const n = Number(event.code.slice(5));
          if (n >= 1 && n <= 8) {
            selectSlot(n - 1);
          }
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.code === "KeyW" || event.code === "ArrowUp") input.forward = false;
        if (event.code === "KeyS" || event.code === "ArrowDown") input.back = false;
        if (event.code === "KeyA" || event.code === "ArrowLeft") input.left = false;
        if (event.code === "KeyD" || event.code === "ArrowRight") input.right = false;
      });

      renderer.domElement.addEventListener("mousedown", (event) => {
        if (!pointerLocked) return;
        if (event.button === 0) input.leftMouse = true;
        if (event.button === 2) input.rightMouse = true;
      });

      window.addEventListener("mouseup", (event) => {
        if (event.button === 0) input.leftMouse = false;
        if (event.button === 2) input.rightMouse = false;
      });

      renderer.domElement.addEventListener(
        "wheel",
        (event) => {
          if (!pointerLocked) return;
          const dir = event.deltaY > 0 ? 1 : -1;
          selectSlot(inventory.activeSlot + dir);
          event.preventDefault();
        },
        { passive: false }
      );

      window.addEventListener("contextmenu", (event) => {
        event.preventDefault();
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      window.addEventListener("blur", () => {
        clearMoveKeys();
      });
    }

    function bootstrapWorld() {
      ensureChunksAroundPlayer();
      processDirtyChunks(9999);
      rebuildRaycastMeshList();
      respawnPlayer();
      ensureChunksAroundPlayer();
      processDirtyChunks(9999);
      rebuildRaycastMeshList();
      syncCamera();
      updateTargetInfo();
      updateDebug();
      renderer.render(scene, camera);
    }

    window.render_game_to_text = function renderGameToText() {
      const counts = {};
      for (const id of BLOCK_IDS) {
        counts[BLOCK_META[id].name.toLowerCase()] = inventory.counts[id] || 0;
      }
      const activeId = inventory.slots[inventory.activeSlot];
      const payload = {
        mode: pointerLocked ? "playing" : "unlocked",
        coordinate_system: "Right-handed world: +X east, +Y up, -Z forward at yaw=0. Player position is feet-center.",
        player: {
          x: Number(player.pos.x.toFixed(3)),
          y: Number(player.pos.y.toFixed(3)),
          z: Number(player.pos.z.toFixed(3)),
          vx: Number(player.vel.x.toFixed(3)),
          vy: Number(player.vel.y.toFixed(3)),
          vz: Number(player.vel.z.toFixed(3)),
          onGround: player.onGround
        },
        camera: {
          yaw: Number(player.yaw.toFixed(3)),
          pitch: Number(player.pitch.toFixed(3))
        },
        world: {
          loadedChunks: chunks.size,
          playerChunk: [Math.floor(player.pos.x / CHUNK_SIZE), Math.floor(player.pos.z / CHUNK_SIZE)]
        },
        inventory: {
          activeSlot: inventory.activeSlot,
          activeBlock: BLOCK_META[activeId].name,
          counts
        },
        drops: drops.length,
        target: targetInfo
          ? {
              block: targetInfo.block,
              place: targetInfo.place
            }
          : null
      };
      return JSON.stringify(payload);
    };

    window.advanceTime = function advanceTime(ms) {
      const steps = Math.max(1, Math.round(ms / FIXED_MS));
      for (let i = 0; i < steps; i += 1) {
        fixedUpdate(FIXED_DT);
      }
      processDirtyChunks(Math.max(2, Math.ceil(steps / 4)));
      syncCamera();
      updateTargetInfo();
      updateDebug();
      renderer.render(scene, camera);
    };

    createHotbarUi();
    setupInput();
    bootstrapWorld();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
