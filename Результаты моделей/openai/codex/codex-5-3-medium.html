<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxel Sandbox Loop</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87b6ff;
      font-family: "Trebuchet MS", sans-serif;
      color: #fff;
      user-select: none;
    }

    #game {
      width: 100%;
      height: 100%;
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      opacity: 0.95;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 2px #000;
    }

    #crosshair::before {
      width: 2px;
      height: 20px;
      left: 9px;
      top: 0;
    }

    #crosshair::after {
      width: 20px;
      height: 2px;
      left: 0;
      top: 9px;
    }

    #slots {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .slot {
      width: 68px;
      height: 68px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-radius: 10px;
      background: rgba(10, 18, 30, 0.52);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      backdrop-filter: blur(2px);
    }

    .slot.active {
      border-color: #fff58e;
      box-shadow: 0 0 14px rgba(255, 245, 142, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.28);
      transform: translateY(-2px);
    }

    .swatch {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.35);
    }

    .count {
      position: absolute;
      right: 7px;
      bottom: 5px;
      font-size: 16px;
      font-weight: 700;
      text-shadow: 0 1px 2px #000;
    }

    .key {
      position: absolute;
      left: 6px;
      top: 4px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.85);
    }

    #hint {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(7, 12, 20, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 14px;
      text-shadow: 0 1px 2px #000;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="crosshair"></div>
    <div id="hint">Click to lock pointer · WASD move · Space jump · LMB break · RMB place</div>
    <div id="slots"></div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.161.0/build/three.module.js";

    const BLOCK_TYPES = {
      grass: { color: 0x5dad4d },
      dirt: { color: 0x7d4f2c },
      stone: { color: 0x8d9299 },
      sand: { color: 0xd9c27a }
    };

    const SLOT_TYPES = ["grass", "dirt", "stone", "sand"];

    const CHUNK_SIZE = 16;
    const RENDER_DISTANCE = 2;
    const MAX_WORLD_Y = 28;
    const MIN_WORLD_Y = -4;
    const BLOCK_SIZE = 1;

    const PLAYER = {
      radius: 0.36,
      height: 1.8,
      eye: 1.62,
      moveSpeed: 6.2,
      jumpSpeed: 7.0,
      gravity: 22,
      friction: 9
    };

    const canvas = document.getElementById("game");
    const hint = document.getElementById("hint");
    const slotsEl = document.getElementById("slots");

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87b6ff);
    scene.fog = new THREE.Fog(0x87b6ff, 28, 95);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 220);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x6a88aa, 0.95);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xfff2d7, 0.95);
    sun.position.set(25, 40, 18);
    scene.add(sun);

    const blockGeometry = new THREE.BoxGeometry(1, 1, 1);

    const blockMaterials = {};
    for (const [type, info] of Object.entries(BLOCK_TYPES)) {
      blockMaterials[type] = new THREE.MeshLambertMaterial({ color: info.color });
    }

    const dropGeometry = new THREE.BoxGeometry(0.35, 0.35, 0.35);
    const dropMaterials = {};
    for (const [type, info] of Object.entries(BLOCK_TYPES)) {
      dropMaterials[type] = new THREE.MeshLambertMaterial({ color: info.color });
    }

    const keyState = {
      KeyW: false,
      KeyA: false,
      KeyS: false,
      KeyD: false,
      Space: false
    };

    const inventory = {};
    SLOT_TYPES.forEach((type) => (inventory[type] = 0));

    let activeSlot = 0;
    const slotNodes = [];

    const player = {
      pos: new THREE.Vector3(0.5, 18, 0.5),
      vel: new THREE.Vector3(),
      yaw: 0,
      pitch: 0,
      onGround: false
    };

    const chunks = new Map();
    const drops = [];

    const raycaster = new THREE.Raycaster();
    raycaster.far = 6;

    const interact = {
      breakCooldown: 0,
      placeCooldown: 0
    };

    function keyXYZ(x, y, z) {
      return `${x},${y},${z}`;
    }

    function keyChunk(cx, cz) {
      return `${cx},${cz}`;
    }

    function worldToChunkCoord(v) {
      return Math.floor(v / CHUNK_SIZE);
    }

    function floorDiv(n, d) {
      return Math.floor(n / d);
    }

    function mod(n, m) {
      return ((n % m) + m) % m;
    }

    function rand2(i, j) {
      const x = Math.sin(i * 127.1 + j * 311.7) * 43758.5453123;
      return x - Math.floor(x);
    }

    function smoothstep(t) {
      return t * t * (3 - 2 * t);
    }

    function valueNoise(x, z) {
      const x0 = Math.floor(x);
      const z0 = Math.floor(z);
      const xf = x - x0;
      const zf = z - z0;

      const v00 = rand2(x0, z0);
      const v10 = rand2(x0 + 1, z0);
      const v01 = rand2(x0, z0 + 1);
      const v11 = rand2(x0 + 1, z0 + 1);

      const sx = smoothstep(xf);
      const sz = smoothstep(zf);

      const i1 = v00 + (v10 - v00) * sx;
      const i2 = v01 + (v11 - v01) * sx;
      return i1 + (i2 - i1) * sz;
    }

    function fractalNoise(x, z) {
      let total = 0;
      let amp = 1;
      let freq = 1;
      let norm = 0;
      for (let o = 0; o < 4; o++) {
        total += valueNoise(x * freq, z * freq) * amp;
        norm += amp;
        amp *= 0.5;
        freq *= 2;
      }
      return total / norm;
    }

    function terrainHeight(wx, wz) {
      const broad = fractalNoise(wx * 0.018, wz * 0.018) * 13;
      const detail = fractalNoise(wx * 0.07, wz * 0.07) * 5;
      const raw = 4 + broad + detail;
      return Math.floor(Math.max(2, Math.min(MAX_WORLD_Y - 2, raw)));
    }

    function topBlockType(h) {
      if (h <= 5) return "sand";
      return "grass";
    }

    function ensureChunk(cx, cz) {
      const ck = keyChunk(cx, cz);
      if (chunks.has(ck)) return chunks.get(ck);

      const chunk = {
        cx,
        cz,
        blocks: new Map(),
        group: new THREE.Group(),
        dirty: true,
        instanced: [],
        instanceMeta: new Map()
      };

      chunk.group.name = `chunk_${cx}_${cz}`;

      const worldX0 = cx * CHUNK_SIZE;
      const worldZ0 = cz * CHUNK_SIZE;

      for (let lx = 0; lx < CHUNK_SIZE; lx++) {
        for (let lz = 0; lz < CHUNK_SIZE; lz++) {
          const wx = worldX0 + lx;
          const wz = worldZ0 + lz;
          const h = terrainHeight(wx, wz);

          for (let y = h - 3; y <= h; y++) {
            if (y < MIN_WORLD_Y || y > MAX_WORLD_Y) continue;
            let type = "stone";
            if (y === h) type = topBlockType(h);
            else if (y >= h - 2) type = "dirt";

            chunk.blocks.set(keyXYZ(wx, y, wz), type);
          }
        }
      }

      scene.add(chunk.group);
      chunks.set(ck, chunk);
      rebuildChunk(chunk);
      return chunk;
    }

    function rebuildChunk(chunk) {
      chunk.instanced.forEach((m) => {
        chunk.group.remove(m);
        m.dispose?.();
      });
      chunk.instanced.length = 0;
      chunk.instanceMeta.clear();

      const buckets = {};
      for (const type of SLOT_TYPES) buckets[type] = [];

      for (const [k, type] of chunk.blocks) {
        if (!buckets[type]) buckets[type] = [];
        const [x, y, z] = k.split(",").map(Number);
        buckets[type].push({ x, y, z });
      }

      const matrix = new THREE.Matrix4();
      const tempPos = new THREE.Vector3();

      for (const [type, list] of Object.entries(buckets)) {
        if (!list.length) continue;

        const mesh = new THREE.InstancedMesh(blockGeometry, blockMaterials[type], list.length);
        mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        mesh.userData.isBlockMesh = true;
        mesh.userData.chunkKey = keyChunk(chunk.cx, chunk.cz);
        mesh.userData.blockType = type;

        for (let i = 0; i < list.length; i++) {
          const p = list[i];
          tempPos.set(p.x + 0.5, p.y + 0.5, p.z + 0.5);
          matrix.compose(tempPos, new THREE.Quaternion(), new THREE.Vector3(1, 1, 1));
          mesh.setMatrixAt(i, matrix);
          chunk.instanceMeta.set(`${type}:${i}`, p);
        }

        mesh.instanceMatrix.needsUpdate = true;
        chunk.group.add(mesh);
        chunk.instanced.push(mesh);
      }

      chunk.dirty = false;
    }

    function unloadFarChunks() {
      const pcx = worldToChunkCoord(player.pos.x);
      const pcz = worldToChunkCoord(player.pos.z);

      for (const [ck, chunk] of chunks) {
        const dx = Math.abs(chunk.cx - pcx);
        const dz = Math.abs(chunk.cz - pcz);
        if (dx > RENDER_DISTANCE + 1 || dz > RENDER_DISTANCE + 1) {
          scene.remove(chunk.group);
          chunk.instanced.forEach((m) => {
            chunk.group.remove(m);
            m.dispose?.();
          });
          chunks.delete(ck);
        }
      }
    }

    function maintainChunks() {
      const pcx = worldToChunkCoord(player.pos.x);
      const pcz = worldToChunkCoord(player.pos.z);
      for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
        for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
          ensureChunk(pcx + dx, pcz + dz);
        }
      }
      unloadFarChunks();
    }

    function getChunkForWorld(wx, wz, create = false) {
      const cx = floorDiv(wx, CHUNK_SIZE);
      const cz = floorDiv(wz, CHUNK_SIZE);
      const ck = keyChunk(cx, cz);
      if (chunks.has(ck)) return chunks.get(ck);
      if (create) return ensureChunk(cx, cz);
      return null;
    }

    function getBlock(wx, wy, wz) {
      const chunk = getChunkForWorld(wx, wz, false);
      if (!chunk) return null;
      return chunk.blocks.get(keyXYZ(wx, wy, wz)) || null;
    }

    function setBlock(wx, wy, wz, typeOrNull) {
      const chunk = getChunkForWorld(wx, wz, true);
      const k = keyXYZ(wx, wy, wz);
      if (typeOrNull == null) {
        chunk.blocks.delete(k);
      } else {
        chunk.blocks.set(k, typeOrNull);
      }
      rebuildChunk(chunk);
    }

    function spawnDrop(type, wx, wy, wz) {
      const mesh = new THREE.Mesh(dropGeometry, dropMaterials[type]);
      mesh.position.set(wx + 0.5, wy + 0.75, wz + 0.5);
      scene.add(mesh);

      drops.push({
        type,
        mesh,
        vel: new THREE.Vector3((Math.random() - 0.5) * 2, 3 + Math.random() * 1.5, (Math.random() - 0.5) * 2),
        spin: (Math.random() * 2 + 1) * (Math.random() < 0.5 ? -1 : 1),
        age: 0
      });
    }

    function updateDrops(dt) {
      for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i];
        d.age += dt;

        d.vel.y -= 18 * dt;
        d.mesh.position.addScaledVector(d.vel, dt);
        d.mesh.rotation.y += d.spin * dt;
        d.mesh.rotation.x += d.spin * 0.6 * dt;

        const bx = Math.floor(d.mesh.position.x);
        const byBelow = Math.floor(d.mesh.position.y - 0.2);
        const bz = Math.floor(d.mesh.position.z);

        const below = getBlock(bx, byBelow, bz);
        if (below && d.vel.y < 0) {
          const floorY = byBelow + 1 + 0.175;
          if (d.mesh.position.y < floorY) {
            d.mesh.position.y = floorY;
            d.vel.y *= -0.22;
            d.vel.x *= 0.82;
            d.vel.z *= 0.82;
            if (Math.abs(d.vel.y) < 0.5) d.vel.y = 0;
          }
        }

        const dist = d.mesh.position.distanceTo(player.pos.clone().setY(player.pos.y + PLAYER.eye - 0.85));
        if (dist < 1.35) {
          inventory[d.type] = (inventory[d.type] || 0) + 1;
          refreshSlots();
          scene.remove(d.mesh);
          drops.splice(i, 1);
          continue;
        }

        if (d.age > 90 || d.mesh.position.y < MIN_WORLD_Y - 30) {
          scene.remove(d.mesh);
          drops.splice(i, 1);
        }
      }
    }

    function getNearbySolidBlocks(minX, minY, minZ, maxX, maxY, maxZ) {
      const solids = [];
      for (let x = Math.floor(minX); x <= Math.floor(maxX); x++) {
        for (let y = Math.floor(minY); y <= Math.floor(maxY); y++) {
          for (let z = Math.floor(minZ); z <= Math.floor(maxZ); z++) {
            const t = getBlock(x, y, z);
            if (t) solids.push({ x, y, z });
          }
        }
      }
      return solids;
    }

    function collidesAt(x, y, z) {
      const r = PLAYER.radius;
      const h = PLAYER.height;
      const minX = x - r;
      const maxX = x + r;
      const minY = y;
      const maxY = y + h;
      const minZ = z - r;
      const maxZ = z + r;

      const blocks = getNearbySolidBlocks(minX, minY, minZ, maxX, maxY, maxZ);
      for (const b of blocks) {
        const bx0 = b.x;
        const bx1 = b.x + 1;
        const by0 = b.y;
        const by1 = b.y + 1;
        const bz0 = b.z;
        const bz1 = b.z + 1;

        const overlap =
          maxX > bx0 &&
          minX < bx1 &&
          maxY > by0 &&
          minY < by1 &&
          maxZ > bz0 &&
          minZ < bz1;

        if (overlap) return true;
      }
      return false;
    }

    function moveWithCollisions(dt) {
      const desiredXZ = new THREE.Vector3();
      if (keyState.KeyW) desiredXZ.z -= 1;
      if (keyState.KeyS) desiredXZ.z += 1;
      if (keyState.KeyA) desiredXZ.x -= 1;
      if (keyState.KeyD) desiredXZ.x += 1;
      desiredXZ.normalize();

      const sin = Math.sin(player.yaw);
      const cos = Math.cos(player.yaw);

      const moveX = desiredXZ.x * cos - desiredXZ.z * sin;
      const moveZ = desiredXZ.x * sin + desiredXZ.z * cos;

      const accel = PLAYER.moveSpeed * 22;
      player.vel.x += moveX * accel * dt;
      player.vel.z += moveZ * accel * dt;

      const damping = Math.exp(-PLAYER.friction * dt);
      player.vel.x *= damping;
      player.vel.z *= damping;

      if (player.onGround && keyState.Space) {
        player.vel.y = PLAYER.jumpSpeed;
        player.onGround = false;
      }

      player.vel.y -= PLAYER.gravity * dt;
      if (player.vel.y < -30) player.vel.y = -30;

      let nx = player.pos.x + player.vel.x * dt;
      let ny = player.pos.y + player.vel.y * dt;
      let nz = player.pos.z + player.vel.z * dt;

      if (collidesAt(nx, player.pos.y, player.pos.z)) {
        nx = player.pos.x;
        player.vel.x = 0;
      }

      if (collidesAt(nx, player.pos.y, nz)) {
        nz = player.pos.z;
        player.vel.z = 0;
      }

      if (collidesAt(nx, ny, nz)) {
        if (player.vel.y < 0) player.onGround = true;
        ny = player.pos.y;
        player.vel.y = 0;
      } else {
        player.onGround = false;
      }

      player.pos.set(nx, ny, nz);

      if (player.pos.y < MIN_WORLD_Y - 20) {
        const h = terrainHeight(Math.floor(player.pos.x), Math.floor(player.pos.z));
        player.pos.y = h + 4;
        player.vel.set(0, 0, 0);
      }
    }

    function gatherBlockMeshes() {
      const meshes = [];
      for (const chunk of chunks.values()) {
        for (const mesh of chunk.instanced) meshes.push(mesh);
      }
      return meshes;
    }

    function getTargetedBlock() {
      const eye = new THREE.Vector3(player.pos.x, player.pos.y + PLAYER.eye, player.pos.z);
      camera.position.copy(eye);

      const dir = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation).normalize();
      raycaster.set(eye, dir);
      const hits = raycaster.intersectObjects(gatherBlockMeshes(), false);
      if (!hits.length) return null;

      const hit = hits[0];
      const mesh = hit.object;
      const chunk = chunks.get(mesh.userData.chunkKey);
      if (!chunk) return null;

      const key = `${mesh.userData.blockType}:${hit.instanceId}`;
      const block = chunk.instanceMeta.get(key);
      if (!block) return null;

      return {
        block,
        point: hit.point.clone(),
        normal: hit.face?.normal?.clone() || new THREE.Vector3(),
        distance: hit.distance
      };
    }

    function breakBlock() {
      const targeted = getTargetedBlock();
      if (!targeted) return;
      const { x, y, z } = targeted.block;
      const type = getBlock(x, y, z);
      if (!type) return;
      setBlock(x, y, z, null);
      spawnDrop(type, x, y, z);
    }

    function canPlaceAt(x, y, z) {
      if (getBlock(x, y, z)) return false;

      const r = PLAYER.radius;
      const minX = player.pos.x - r;
      const maxX = player.pos.x + r;
      const minY = player.pos.y;
      const maxY = player.pos.y + PLAYER.height;
      const minZ = player.pos.z - r;
      const maxZ = player.pos.z + r;

      const bx0 = x;
      const bx1 = x + 1;
      const by0 = y;
      const by1 = y + 1;
      const bz0 = z;
      const bz1 = z + 1;

      const overlap =
        maxX > bx0 && minX < bx1 &&
        maxY > by0 && minY < by1 &&
        maxZ > bz0 && minZ < bz1;

      return !overlap;
    }

    function placeBlock() {
      const type = SLOT_TYPES[activeSlot];
      if (!type) return;
      if ((inventory[type] || 0) <= 0) return;

      const targeted = getTargetedBlock();
      if (!targeted) return;

      const base = targeted.block;
      const n = targeted.normal;
      const placeX = base.x + Math.round(n.x);
      const placeY = base.y + Math.round(n.y);
      const placeZ = base.z + Math.round(n.z);

      if (!canPlaceAt(placeX, placeY, placeZ)) return;
      if (placeY < MIN_WORLD_Y || placeY > MAX_WORLD_Y) return;

      setBlock(placeX, placeY, placeZ, type);
      inventory[type] -= 1;
      refreshSlots();
    }

    function refreshSlots() {
      SLOT_TYPES.forEach((type, i) => {
        const el = slotNodes[i];
        if (!el) return;
        el.classList.toggle("active", i === activeSlot);
        el.querySelector(".count").textContent = String(inventory[type] || 0);
      });
    }

    function buildSlots() {
      slotsEl.innerHTML = "";
      slotNodes.length = 0;

      SLOT_TYPES.forEach((type, i) => {
        const slot = document.createElement("div");
        slot.className = "slot";

        const key = document.createElement("div");
        key.className = "key";
        key.textContent = String(i + 1);

        const swatch = document.createElement("div");
        swatch.className = "swatch";
        swatch.style.background = `#${BLOCK_TYPES[type].color.toString(16).padStart(6, "0")}`;

        const count = document.createElement("div");
        count.className = "count";
        count.textContent = "0";

        slot.appendChild(key);
        slot.appendChild(swatch);
        slot.appendChild(count);
        slotsEl.appendChild(slot);
        slotNodes.push(slot);
      });

      refreshSlots();
    }

    function clampPitch(v) {
      const limit = Math.PI * 0.5 - 0.001;
      return Math.max(-limit, Math.min(limit, v));
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener("resize", onResize);

    document.addEventListener("contextmenu", (e) => e.preventDefault());

    document.addEventListener("click", () => {
      if (document.pointerLockElement !== canvas) {
        canvas.requestPointerLock();
      }
    });

    document.addEventListener("pointerlockchange", () => {
      const locked = document.pointerLockElement === canvas;
      hint.style.display = locked ? "none" : "block";
    });

    document.addEventListener("mousemove", (e) => {
      if (document.pointerLockElement !== canvas) return;
      const sens = 0.0024;
      player.yaw -= e.movementX * sens;
      player.pitch = clampPitch(player.pitch - e.movementY * sens);
    });

    document.addEventListener("keydown", (e) => {
      if (e.code in keyState) keyState[e.code] = true;

      if (e.code.startsWith("Digit")) {
        const idx = Number(e.code.slice(5)) - 1;
        if (idx >= 0 && idx < SLOT_TYPES.length) {
          activeSlot = idx;
          refreshSlots();
        }
      }
    });

    document.addEventListener("keyup", (e) => {
      if (e.code in keyState) keyState[e.code] = false;
    });

    document.addEventListener("wheel", (e) => {
      const dir = e.deltaY > 0 ? 1 : -1;
      activeSlot = mod(activeSlot + dir, SLOT_TYPES.length);
      refreshSlots();
    }, { passive: true });

    document.addEventListener("mousedown", (e) => {
      if (document.pointerLockElement !== canvas) return;
      if (e.button === 0 && interact.breakCooldown <= 0) {
        breakBlock();
        interact.breakCooldown = 0.18;
      }
      if (e.button === 2 && interact.placeCooldown <= 0) {
        placeBlock();
        interact.placeCooldown = 0.13;
      }
    });

    function placePlayerAtSpawn() {
      maintainChunks();
      const h = terrainHeight(0, 0);
      player.pos.set(0.5, h + 4, 0.5);
      player.vel.set(0, 0, 0);
    }

    buildSlots();
    placePlayerAtSpawn();

    let lastTime = performance.now();

    function loop(now) {
      const dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;

      maintainChunks();
      moveWithCollisions(dt);
      updateDrops(dt);

      interact.breakCooldown = Math.max(0, interact.breakCooldown - dt);
      interact.placeCooldown = Math.max(0, interact.placeCooldown - dt);

      camera.position.set(player.pos.x, player.pos.y + PLAYER.eye, player.pos.z);
      camera.rotation.order = "YXZ";
      camera.rotation.y = player.yaw;
      camera.rotation.x = player.pitch;

      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
