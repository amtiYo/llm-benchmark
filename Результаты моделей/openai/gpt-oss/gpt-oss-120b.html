<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Sandbox (Single File)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        canvas { display: block; }
        
        #ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex;
            gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .slot {
            width: 50px; height: 50px; border: 3px solid #444;
            background: #222; position: relative; display: flex;
            align-items: center; justify-content: center; color: white;
            font-weight: bold; border-radius: 5px; cursor: pointer;
        }
        
        .slot.active { border-color: #fff; box-shadow: 0 0 15px #fff; }
        
        .slot .count {
            position: absolute; bottom: 2px; right: 5px;
            font-size: 12px; text-shadow: 1px 1px 2px black;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border-top: 2px solid white;
            border-left: 2px solid white; transform: translate(-50%, -50%) rotate(45deg);
            pointer-events: none;
        }

        #instructions {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px;
            font-size: 14px; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="instructions">
    <b>Управление:</b><br>
    ЛКМ: Разрушить | ПКМ: Поставить<br>
    WASD: Движение | Пробел: Прыжок<br>
    1-3: Выбор блока | Клик на экран: Начать
</div>

<div id="crosshair"></div>
<div id="ui">
    <div class="slot active" data-index="0"><div class="block-preview" style="background:#4CAF50; width:30px; height:30px;"></div><div class="count" id="count-grass">10</div></div>
    <div class="slot" data-index="1"><div class="block-preview" style="background:#795548; width:30px; height:30px;"></div><div class="count" id="count-dirt">10</div></div>
    <div class="slot" data-index="2"><div class="block-preview" style="background:#9E9E9E; width:30px; height:30px;"></div><div class="count" id="count-stone">10</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

<script>
/* --- НАСТРОЙКИ --- */
const CHUNK_SIZE = 16;
const WORLD_HEIGHT = 16;
const RENDER_DISTANCE = 2;
const BLOCK_SIZE = 1;
const PLAYER_HEIGHT = 1.8;

const BLOCK_TYPES = [
    { id: 1, name: 'grass', color: 0x4CAF50, count: 10 },
    { id: 2, name: 'dirt', color: 0x795548, count: 10 },
    { id: 3, name: 'stone', color: 0x9E9E9E, count: 10 }
];

/* --- ПЕРЕМЕННЫЕ --- */
let scene, camera, renderer, controls, simplex;
let world = new Map();
let activeSlot = 0;
let keys = {};
let velocity = new THREE.Vector3();
let canJump = false;
let clock = new THREE.Clock();
let drops = [];

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(8, 10, 8);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 0.5);
    sunLight.position.set(10, 20, 10);
    scene.add(sunLight);

    controls = new THREE.PointerLockControls(camera, document.body);
    document.body.addEventListener('click', () => controls.lock());

    simplex = new SimplexNoise();

    // Обработка ввода
    document.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code.startsWith('Digit')) {
            let digit = parseInt(e.code.replace('Digit', '')) - 1;
            if (digit >= 0 && digit < 3) setActiveSlot(digit);
        }
    });
    document.addEventListener('keyup', (e) => keys[e.code] = false);
    document.addEventListener('mousedown', onMouseDown);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    generateInitialWorld();
    updateUI();
}

function setActiveSlot(idx) {
    activeSlot = idx;
    document.querySelectorAll('.slot').forEach((s, i) => {
        s.classList.toggle('active', i === idx);
    });
}

function onMouseDown(e) {
    if (!controls.isLocked) return;
    if (e.button === 0) mine();
    if (e.button === 2) place();
}

/* --- ГЕНЕРАЦИЯ МИРА --- */
function getChunkKey(x, z) { return `${x},${z}`; }

function generateChunk(cx, cz) {
    const group = new THREE.Group();
    const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
    
    for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
            const wx = cx * CHUNK_SIZE + x;
            const wz = cz * CHUNK_SIZE + z;
            const noise = simplex.noise2D(wx * 0.05, wz * 0.05);
            const height = Math.floor((noise + 1) * 4) + 5;

            for (let y = 0; y < height; y++) {
                let type = BLOCK_TYPES[2]; // камень
                if (y === height - 1) type = BLOCK_TYPES[0]; // трава
                else if (y > height - 3) type = BLOCK_TYPES[1]; // земля

                const mat = new THREE.MeshLambertMaterial({ color: type.color });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(wx, y, wz);
                mesh.userData = { type: type.id };
                group.add(mesh);
            }
        }
    }
    world.set(getChunkKey(cx, cz), group);
    scene.add(group);
}

function generateInitialWorld() {
    for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
        for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
            generateChunk(x, z);
        }
    }
}

/* --- ГЕЙМПЛЕЙ --- */
function mine() {
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera({ x: 0, y: 0 }, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);

    if (intersects.length > 0 && intersects[0].distance < 5) {
        const obj = intersects[0].object;
        const typeId = obj.userData.type;
        
        // Добавляем в инвентарь
        BLOCK_TYPES[typeId - 1].count++;
        updateUI();

        // Спавним дроп (визуальный эффект)
        spawnDrop(obj.position.clone(), obj.material.color.getHex());

        obj.parent.remove(obj);
    }
}

function place() {
    const currentType = BLOCK_TYPES[activeSlot];
    if (currentType.count <= 0) return;

    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera({ x: 0, y: 0 }, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);

    if (intersects.length > 0 && intersects[0].distance < 5) {
        const normal = intersects[0].face.normal;
        const pos = intersects[0].object.position.clone().add(normal);

        const geo = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        const mat = new THREE.MeshLambertMaterial({ color: currentType.color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        mesh.userData = { type: currentType.id };
        
        intersects[0].object.parent.add(mesh);
        currentType.count--;
        updateUI();
    }
}

function spawnDrop(pos, color) {
    const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
    const mat = new THREE.MeshLambertMaterial({ color: color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    drops.push({ mesh, time: Date.now() });
}

function updateUI() {
    document.getElementById('count-grass').innerText = BLOCK_TYPES[0].count;
    document.getElementById('count-dirt').innerText = BLOCK_TYPES[1].count;
    document.getElementById('count-stone').innerText = BLOCK_TYPES[2].count;
}

/* --- ЦИКЛ --- */
function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if (controls.isLocked) {
        // Гравитация и движение
        velocity.y -= 9.8 * 2.0 * delta; // гравитация

        let moveVector = new THREE.Vector3();
        if (keys['KeyW']) moveVector.z += 1;
        if (keys['KeyS']) moveVector.z -= 1;
        if (keys['KeyA']) moveVector.x += 1;
        if (keys['KeyD']) moveVector.x -= 1;

        controls.moveRight(-moveVector.x * 5 * delta);
        controls.moveForward(moveVector.z * 5 * delta);

        camera.position.y += velocity.y * delta;

        // Простая коллизия с полом
        if (camera.position.y < PLAYER_HEIGHT + 2) {
            velocity.y = 0;
            camera.position.y = PLAYER_HEIGHT + 2;
            canJump = true;
        }

        if (keys['Space'] && canJump) {
            velocity.y = 8;
            canJump = false;
        }

        // Анимация дропа
        for (let i = drops.length - 1; i >= 0; i--) {
            drops[i].mesh.rotation.y += 0.05;
            if (Date.now() - drops[i].time > 2000) {
                scene.remove(drops[i].mesh);
                drops.splice(i, 1);
            }
        }
    }

    renderer.render(scene, camera);
}

// Отключаем контекстное меню для ПКМ
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
