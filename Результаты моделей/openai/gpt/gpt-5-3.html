<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Voxel Sandbox</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }

        #ui {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }

        .slot {
            width: 50px;
            height: 50px;
            border: 2px solid #aaa;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }

        .active {
            border-color: yellow;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: white;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <div id="crosshair"></div>
    <div id="ui"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(innerWidth, innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);

        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const blockSize = 1;
        const chunkSize = 16;
        const world = {};
        const meshes = {};

        function noise(x, z) {
            return Math.floor((Math.sin(x * 0.1) + Math.cos(z * 0.1)) * 3 + 8);
        }

        function key(x, y, z) { return `${x},${y},${z}`; }

        function createBlock(x, y, z, type = 1) {
            const k = key(x, y, z);
            if (world[k]) return;
            world[k] = type;

            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshLambertMaterial({ color: type === 1 ? 0x55aa33 : 0x888888 });
            const cube = new THREE.Mesh(geo, mat);
            cube.position.set(x, y, z);
            scene.add(cube);
            meshes[k] = cube;
        }

        function removeBlock(x, y, z) {
            const k = key(x, y, z);
            if (meshes[k]) {
                scene.remove(meshes[k]);
                delete meshes[k];
                delete world[k];
                spawnDrop(x, y, z);
            }
        }

        function generateChunk(cx, cz) {
            for (let x = 0; x < chunkSize; x++) {
                for (let z = 0; z < chunkSize; z++) {
                    let wx = cx * chunkSize + x;
                    let wz = cz * chunkSize + z;
                    let h = noise(wx, wz);
                    for (let y = 0; y < h; y++) {
                        createBlock(wx, y, wz, 1);
                    }
                }
            }
        }

        const loadedChunks = new Set();
        function updateChunks(px, pz) {
            const cx = Math.floor(px / chunkSize);
            const cz = Math.floor(pz / chunkSize);
            for (let dx = -2; dx <= 2; dx++) {
                for (let dz = -2; dz <= 2; dz++) {
                    let k = `${cx + dx},${cz + dz}`;
                    if (!loadedChunks.has(k)) {
                        generateChunk(cx + dx, cz + dz);
                        loadedChunks.add(k);
                    }
                }
            }
        }

        const player = {
            pos: new THREE.Vector3(0, 15, 0),
            vel: new THREE.Vector3(),
            onGround: false
        };

        let yaw = 0, pitch = 0;

        document.body.requestPointerLock = document.body.requestPointerLock;

        document.onclick = () => document.body.requestPointerLock();

        document.addEventListener("mousemove", (e) => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
            }
        });

        const keys = {};
        document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

        function controls() {
            const speed = 0.1;
            const dir = new THREE.Vector3(
                Math.sin(yaw),
                0,
                Math.cos(yaw)
            );
            const right = new THREE.Vector3(dir.z, 0, -dir.x);

            if (keys["w"]) player.vel.addScaledVector(dir, speed);
            if (keys["s"]) player.vel.addScaledVector(dir, -speed);
            if (keys["a"]) player.vel.addScaledVector(right, -speed);
            if (keys["d"]) player.vel.addScaledVector(right, speed);

            if (keys[" "] && player.onGround) {
                player.vel.y = 0.3;
                player.onGround = false;
            }
        }

        function physics() {
            player.vel.y -= 0.01;
            player.pos.add(player.vel);

            player.onGround = false;

            for (let dx = -1; dx <= 1; dx++) {
                for (let dz = -1; dz <= 1; dz++) {
                    for (let dy = -2; dy <= 0; dy++) {
                        let x = Math.floor(player.pos.x + dx);
                        let y = Math.floor(player.pos.y + dy);
                        let z = Math.floor(player.pos.z + dz);
                        if (world[key(x, y, z)]) {
                            if (player.pos.y < y + 2) {
                                player.pos.y = y + 2;
                                player.vel.y = 0;
                                player.onGround = true;
                            }
                        }
                    }
                }
            }
            player.vel.multiplyScalar(0.9);
        }

        const raycaster = new THREE.Raycaster();

        function interact(e) {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = raycaster.intersectObjects(Object.values(meshes));
            if (hits.length) {
                const p = hits[0].object.position;
                if (e.button === 0) {
                    removeBlock(p.x, p.y, p.z);
                } else if (e.button === 2) {
                    let n = hits[0].face.normal;
                    createBlock(p.x + n.x, p.y + n.y, p.z + n.z, selected);
                }
            }
        }

        document.addEventListener("mousedown", interact);
        document.addEventListener("contextmenu", e => e.preventDefault());

        const drops = [];
        function spawnDrop(x, y, z) {
            const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const m = new THREE.Mesh(geo, mat);
            m.position.set(x, y + 1, z);
            scene.add(m);
            drops.push({ mesh: m, vel: new THREE.Vector3(0, 0.1, 0) });
        }

        const inventory = { 1: 0 };
        let selected = 1;

        function updateDrops() {
            for (let d of drops) {
                d.vel.y -= 0.01;
                d.mesh.position.add(d.vel);
                d.mesh.rotation.y += 0.1;

                if (d.mesh.position.distanceTo(player.pos) < 1.5) {
                    inventory[1] = (inventory[1] || 0) + 1;
                    scene.remove(d.mesh);
                    d.remove = true;
                }
            }
            for (let i = drops.length - 1; i >= 0; i--) {
                if (drops[i].remove) drops.splice(i, 1);
            }
        }

        function buildUI() {
            const ui = document.getElementById("ui");
            ui.innerHTML = "";
            for (let i = 1; i <= 3; i++) {
                let d = document.createElement("div");
                d.className = "slot" + (selected === i ? " active" : "");
                d.textContent = inventory[i] || 0;
                d.onclick = () => selected = i;
                ui.appendChild(d);
            }
        }

        function loop() {
            requestAnimationFrame(loop);

            controls();
            physics();
            updateDrops();

            camera.position.copy(player.pos);
            camera.rotation.set(pitch, yaw, 0);

            updateChunks(player.pos.x, player.pos.z);
            buildUI();

            renderer.render(scene, camera);
        }

        loop();
    </script>
</body>

</html>
