<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxel Sandbox</title>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #87cfff;
            font-family: Arial, sans-serif;
        }

        #ui {
            position: fixed;
            inset: 0;
            pointer-events: none;
            color: #fff;
        }

        #crosshair {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 14px;
            height: 14px;
            transform: translate(-50%, -50%);
            opacity: 0.9;
        }

        #crosshair:before,
        #crosshair:after {
            content: "";
            position: absolute;
            background: white;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        #crosshair:before {
            width: 14px;
            height: 2px;
        }

        #crosshair:after {
            width: 2px;
            height: 14px;
        }

        #bar {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.18);
            border-radius: 12px;
        }

        .slot {
            width: 64px;
            height: 64px;
            background: rgba(20, 20, 20, 0.45);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            box-sizing: border-box;
            position: relative;
        }

        .slot.active {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.15) inset;
        }

        .slot .name {
            font-size: 12px;
            line-height: 1;
        }

        .slot .count {
            font-size: 18px;
            font-weight: bold;
            text-align: right;
            line-height: 1;
        }

        .swatch {
            position: absolute;
            inset: 6px 6px auto auto;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        #hint {
            position: absolute;
            left: 16px;
            top: 16px;
            background: rgba(0, 0, 0, 0.25);
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.35;
            max-width: 360px;
        }

        #centerMsg {
            position: absolute;
            left: 50%;
            top: 42%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.45);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <div id="ui">
        <div id="crosshair"></div>
        <div id="hint">
            Click to lock mouse.<br>
            WASD move, Space jump.<br>
            LMB break, RMB place.<br>
            1-4 / mouse wheel select.
        </div>
        <div id="centerMsg"></div>
        <div id="bar"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
        import { PointerLockControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/PointerLockControls.js";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87cfff);
        scene.fog = new THREE.Fog(0x87cfff, 40, 180);

        const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        scene.add(controls.getObject());

        const ambient = new THREE.AmbientLight(0xffffff, 0.75);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(30, 60, 20);
        scene.add(sun);

        const blockDefs = {
            grass: { color: 0x4caf50, solid: true },
            dirt: { color: 0x8d6e63, solid: true },
            stone: { color: 0x9e9e9e, solid: true },
            wood: { color: 0x8b5a2b, solid: true },
        };

        const blockTypes = Object.keys(blockDefs);
        const inventory = { grass: 0, dirt: 0, stone: 0, wood: 0 };

        const uiBar = document.getElementById("bar");
        const centerMsg = document.getElementById("centerMsg");

        let selectedIndex = 0;
        function buildInventoryUI() {
            uiBar.innerHTML = "";
            blockTypes.forEach((t, i) => {
                const slot = document.createElement("div");
                slot.className = "slot" + (i === selectedIndex ? " active" : "");
                slot.innerHTML = `
      <div class="name">${i + 1}. ${t}</div>
      <div class="count">${inventory[t]}</div>
      <div class="swatch" style="background:#${blockDefs[t].color.toString(16).padStart(6, '0')}"></div>
    `;
                slot.onclick = () => { selectedIndex = i; buildInventoryUI(); };
                uiBar.appendChild(slot);
            });
        }
        buildInventoryUI();

        function setMessage(text, ms = 1200) {
            centerMsg.textContent = text;
            centerMsg.style.display = "block";
            clearTimeout(setMessage._t);
            setMessage._t = setTimeout(() => centerMsg.style.display = "none", ms);
        }

        const CHUNK = 16;
        const HEIGHT = 28;
        const RENDER_DIST = 4;
        const world = new Map();
        const chunks = new Map();
        const drops = [];

        const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
        const blockMaterials = {};
        for (const [k, v] of Object.entries(blockDefs)) {
            blockMaterials[k] = new THREE.MeshLambertMaterial({ color: v.color });
        }
        const dropMaterials = {};
        for (const [k, v] of Object.entries(blockDefs)) {
            dropMaterials[k] = new THREE.MeshStandardMaterial({ color: v.color, roughness: 0.7, metalness: 0.0 });
        }
        const dropGeo = new THREE.IcosahedronGeometry(0.18, 0);

        function key(x, y, z) { return `${x},${y},${z}`; }
        function hash2(x, z) {
            let n = x * 374761393 + z * 668265263;
            n = (n ^ (n >> 13)) * 1274126177;
            return (n ^ (n >> 16)) >>> 0;
        }
        function rand01(x, z, seed = 0) { return ((hash2(x + seed * 13, z - seed * 7) % 10000) / 10000); }
        function noise2(x, z) {
            const x0 = Math.floor(x), z0 = Math.floor(z);
            const xf = x - x0, zf = z - z0;
            const a = rand01(x0, z0), b = rand01(x0 + 1, z0), c = rand01(x0, z0 + 1), d = rand01(x0 + 1, z0 + 1);
            const u = xf * xf * (3 - 2 * xf), v = zf * zf * (3 - 2 * zf);
            return a * (1 - u) * (1 - v) + b * u * (1 - v) + c * (1 - u) * v + d * u * v;
        }
        function terrainHeight(x, z) {
            const large = (noise2(x * 0.02, z * 0.02) - 0.5) * 14;
            const medium = (noise2(x * 0.06 + 100, z * 0.06 - 100) - 0.5) * 6;
            const flatness = noise2(x * 0.01 - 50, z * 0.01 + 50);
            const plains = flatness < 0.45 ? 0 : (flatness - 0.45) * 8;
            return Math.floor(10 + large + medium + plains);
        }

        function addBlock(x, y, z, type) {
            const k = key(x, y, z);
            if (world.has(k)) return;
            const mesh = new THREE.Mesh(cubeGeo, blockMaterials[type]);
            mesh.position.set(x, y, z);
            mesh.userData = { x, y, z, type };
            scene.add(mesh);
            world.set(k, mesh);
        }
        function removeBlock(x, y, z) {
            const k = key(x, y, z);
            const mesh = world.get(k);
            if (!mesh) return null;
            const type = mesh.userData.type;
            scene.remove(mesh);
            world.delete(k);
            return { type, position: mesh.position.clone() };
        }

        function generateChunk(cx, cz) {
            const ck = `${cx},${cz}`;
            if (chunks.has(ck)) return;
            const blocks = [];
            for (let lx = 0; lx < CHUNK; lx++) {
                for (let lz = 0; lz < CHUNK; lz++) {
                    const x = cx * CHUNK + lx;
                    const z = cz * CHUNK + lz;
                    const h = terrainHeight(x, z);
                    for (let y = 0; y <= h; y++) {
                        let type = y === h ? "grass" : (y > h - 3 ? "dirt" : "stone");
                        blocks.push([x, y, z, type]);
                    }
                    if (rand01(x, z, 99) > 0.985 && h > 6) {
                        for (let y = h + 1; y < h + 4; y++) blocks.push([x, y, z, "wood"]);
                    }
                }
            }
            blocks.forEach(b => addBlock(...b));
            chunks.set(ck, true);
        }

        function updateChunks() {
            const px = Math.floor(controls.getObject().position.x / CHUNK);
            const pz = Math.floor(controls.getObject().position.z / CHUNK);
            for (let cz = pz - RENDER_DIST; cz <= pz + RENDER_DIST; cz++) {
                for (let cx = px - RENDER_DIST; cx <= px + RENDER_DIST; cx++) {
                    generateChunk(cx, cz);
                }
            }
        }
        function cleanupChunks() {
            const px = Math.floor(controls.getObject().position.x / CHUNK);
            const pz = Math.floor(controls.getObject().position.z / CHUNK);
            for (const [k] of chunks) {
                const [cx, cz] = k.split(",").map(Number);
                if (Math.abs(cx - px) > RENDER_DIST + 2 || Math.abs(cz - pz) > RENDER_DIST + 2) {
                    chunks.delete(k);
                }
            }
        }

        function spawnDrop(type, pos) {
            const m = new THREE.Mesh(dropGeo, dropMaterials[type]);
            m.position.copy(pos).add(new THREE.Vector3((Math.random() - 0.5) * 0.25, 0.4, (Math.random() - 0.5) * 0.25));
            scene.add(m);
            drops.push({
                mesh: m,
                type,
                vel: new THREE.Vector3((Math.random() - 0.5) * 0.8, 2.5, (Math.random() - 0.5) * 0.8),
                age: 0
            });
        }

        function selectedBlockType() { return blockTypes[selectedIndex]; }

        const keys = new Set();
        let canJump = false;
        document.addEventListener("keydown", e => {
            keys.add(e.code);
            if (e.code.startsWith("Digit")) {
                const n = parseInt(e.code.replace("Digit", "")) - 1;
                if (n >= 0 && n < blockTypes.length) { selectedIndex = n; buildInventoryUI(); }
            }
            if (e.code === "Tab") e.preventDefault();
        });
        document.addEventListener("keyup", e => keys.delete(e.code));
        document.addEventListener("wheel", e => {
            if (!controls.isLocked) return;
            selectedIndex = (selectedIndex + (e.deltaY > 0 ? 1 : -1) + blockTypes.length) % blockTypes.length;
            buildInventoryUI();
        });

        document.addEventListener("contextmenu", e => e.preventDefault());
        document.body.addEventListener("click", () => {
            if (!controls.isLocked) controls.lock();
        });

        const raycaster = new THREE.Raycaster();
        function castBlockRay(maxDist = 6) {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            raycaster.far = maxDist;
            return raycaster.intersectObjects([...world.values()], false)[0] || null;
        }

        document.addEventListener("mousedown", (e) => {
            if (!controls.isLocked) return;
            if (e.button === 0) {
                const hit = castBlockRay();
                if (hit) {
                    const p = hit.object.position;
                    const type = hit.object.userData.type;
                    const removed = removeBlock(p.x, p.y, p.z);
                    if (removed) spawnDrop(type, removed.position);
                }
            } else if (e.button === 2) {
                const hit = castBlockRay();
                if (!hit) return;
                const placeType = selectedBlockType();
                if (inventory[placeType] <= 0) { setMessage("No blocks of that type"); return; }
                const n = hit.face.normal.clone();
                const target = hit.object.position.clone().add(n);
                const k = key(target.x, target.y, target.z);
                if (world.has(k)) return;
                // prevent placing inside player
                const playerPos = controls.getObject().position;
                const box = new THREE.Box3(
                    new THREE.Vector3(target.x - 0.5, target.y - 0.5, target.z - 0.5),
                    new THREE.Vector3(target.x + 0.5, target.y + 0.5, target.z + 0.5)
                );
                const playerBox = new THREE.Box3(
                    new THREE.Vector3(playerPos.x - 0.3, playerPos.y - 1.7, playerPos.z - 0.3),
                    new THREE.Vector3(playerPos.x + 0.3, playerPos.y + 0.1, playerPos.z + 0.3)
                );
                if (box.intersectsBox(playerBox)) return;
                addBlock(target.x, target.y, target.z, placeType);
                inventory[placeType]--;
                buildInventoryUI();
            }
        });

        function collidesAt(x, y, z) {
            const r = 0.3, h = 1.8;
            const minX = Math.floor(x - r), maxX = Math.floor(x + r);
            const minY = Math.floor(y - h), maxY = Math.floor(y);
            const minZ = Math.floor(z - r), maxZ = Math.floor(z + r);
            for (let bx = minX; bx <= maxX; bx++) {
                for (let by = minY; by <= maxY; by++) {
                    for (let bz = minZ; bz <= maxZ; bz++) {
                        if (world.has(key(bx, by, bz))) return true;
                    }
                }
            }
            return false;
        }

        function moveAxis(dx, dz, dt) {
            const obj = controls.getObject();
            const step = 0.08;
            const total = Math.max(Math.abs(dx), Math.abs(dz));
            const n = Math.ceil(total / step);
            for (let i = 0; i < n; i++) {
                const sx = dx / n, sz = dz / n;
                if (!collidesAt(obj.position.x + sx, obj.position.y, obj.position.z)) obj.position.x += sx;
                if (!collidesAt(obj.position.x, obj.position.y, obj.position.z + sz)) obj.position.z += sz;
            }
        }

        let prev = performance.now();
        function animate(now) {
            requestAnimationFrame(animate);
            const dt = Math.min(0.033, (now - prev) / 1000);
            prev = now;

            updateChunks();
            cleanupChunks();

            const obj = controls.getObject();

            // movement
            const speed = keys.has("ShiftLeft") ? 9 : 6;
            const dir = new THREE.Vector3();
            if (keys.has("KeyW")) dir.z -= 1;
            if (keys.has("KeyS")) dir.z += 1;
            if (keys.has("KeyA")) dir.x -= 1;
            if (keys.has("KeyD")) dir.x += 1;
            dir.normalize();

            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

            const move = new THREE.Vector3();
            move.addScaledVector(forward, -dir.z);
            move.addScaledVector(right, dir.x);
            if (move.lengthSq() > 0) move.normalize().multiplyScalar(speed * dt);

            moveAxis(move.x, move.z, dt);

            // gravity / jump
            const onGround = collidesAt(obj.position.x, obj.position.y - 0.05, obj.position.z);
            if (onGround) {
                canJump = true;
                if (velocityY < 0) velocityY = 0;
                obj.position.y = Math.ceil(obj.position.y * 100) / 100;
                while (collidesAt(obj.position.x, obj.position.y - 0.01, obj.position.z)) obj.position.y += 0.01;
            }
            if (keys.has("Space") && canJump && onGround) {
                velocityY = 6.4;
                canJump = false;
            }
            velocityY -= 14 * dt;
            obj.position.y += velocityY * dt;
            if (collidesAt(obj.position.x, obj.position.y, obj.position.z)) {
                if (velocityY > 0) {
                    while (collidesAt(obj.position.x, obj.position.y, obj.position.z)) obj.position.y -= 0.01;
                } else {
                    while (collidesAt(obj.position.x, obj.position.y, obj.position.z)) obj.position.y += 0.01;
                    canJump = true;
                }
                velocityY = 0;
            }

            // drops physics + pickup
            for (let i = drops.length - 1; i >= 0; i--) {
                const d = drops[i];
                d.age += dt;
                d.vel.y -= 12 * dt;
                d.mesh.position.addScaledVector(d.vel, dt);
                d.mesh.rotation.x += dt * 2;
                d.mesh.rotation.y += dt * 3;

                const p = d.mesh.position;
                const below = new THREE.Vector3(p.x, p.y - 0.25, p.z);
                if (collidesAt(below.x, below.y, below.z) && d.vel.y < 0) {
                    d.vel.y *= -0.15;
                    d.vel.x *= 0.7;
                    d.vel.z *= 0.7;
                    d.mesh.position.y = Math.ceil(d.mesh.position.y);
                }

                const dist = d.mesh.position.distanceTo(obj.position);
                if (dist < 1.6) {
                    inventory[d.type]++;
                    buildInventoryUI();
                    scene.remove(d.mesh);
                    drops.splice(i, 1);
                    continue;
                }
                if (d.age > 60) {
                    scene.remove(d.mesh);
                    drops.splice(i, 1);
                }
            }

            sun.position.copy(obj.position).add(new THREE.Vector3(30, 60, 20));
            renderer.render(scene, camera);
        }

        let velocityY = 0;

        // start position
        controls.getObject().position.set(0, 22, 0);
        updateChunks();

        animate(performance.now());

        addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        setMessage("Explore, mine, collect, and build.");
    </script>
</body>

</html>
