<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Voxel Sandbox</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: sans-serif;
                background: #111;
            }
            #inventory {
                position: fixed;
                bottom: 10px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 6px;
            }
            .slot {
                width: 42px;
                height: 42px;
                border: 2px solid #555;
                background: #222;
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                user-select: none;
            }
            .slot.active {
                border-color: #ff0;
                background: #333;
            }
            #crosshair {
                position: fixed;
                top: 50%;
                left: 50%;
                width: 20px;
                height: 20px;
                margin: -10px 0 0 -10px;
                pointer-events: none;
            }
            #crosshair::before,
            #crosshair::after {
                content: "";
                position: absolute;
                background: #fff;
            }
            #crosshair::before {
                width: 2px;
                height: 20px;
                left: 9px;
                top: 0;
            }
            #crosshair::after {
                width: 20px;
                height: 2px;
                left: 0;
                top: 9px;
            }
        </style>
    </head>
    <body>
        <div id="inventory"></div>
        <div id="crosshair"></div>
        <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
        <script>
            /* ====================== CONFIG ====================== */
            const CHUNK_SIZE = 16;
            const STACK_LIMIT = 64;
            const PLAYER_SIZE = new THREE.Vector3(0.6, 1.8, 0.6);
            const MOVE_SPEED = 5;
            const JUMP_SPEED = 5;
            const GRAVITY = -9.8;
            const REACH = 5;
            /* ====================== GLOBAL STATE ====================== */
            let scene, camera, renderer, clock;
            const keys = {};
            const inventory = Array.from({ length: 9 }, () => ({
                type: 0,
                count: 0,
            }));
            let selectedSlot = 0;
            const drops = [];
            let yaw = 0,
                pitch = 0;
            const sensitivity = 0.002;
            const playerPos = new THREE.Vector3(0, 50, 0);
            const playerVel = new THREE.Vector3(0, 0, 0);
            let canJump = false;
            /* ====================== WORLD ====================== */
            class VoxelWorld {
                constructor() {
                    this.chunkSize = CHUNK_SIZE;
                    this.chunks = new Map(); // key: "${cx}|${cy}|${cz}"
                    this.scene = new THREE.Scene();
                    this._initLights();
                }
                _initLights() {
                    const hemi = new THREE.HemisphereLight(
                        0xffffbb,
                        0x080820,
                        1,
                    );
                    this.scene.add(hemi);
                    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
                    dir.position.set(-30, 50, -100);
                    this.scene.add(dir);
                }
                getChunkKey(x, y, z) {
                    const cx = Math.floor(x / this.chunkSize);
                    const cy = Math.floor(y / this.chunkSize);
                    const cz = Math.floor(z / this.chunkSize);
                    return `${cx}|${cy}|${cz}`;
                }
                getChunk(cx, cy, cz) {
                    const key = this.getChunkKey(cx, cy, cz);
                    let chunk = this.chunks.get(key);
                    if (!chunk) {
                        chunk = this._generateChunk(cx, cy, cz);
                        this.chunks.set(key, chunk);
                    }
                    return chunk;
                }
                _generateChunk(cx, cy, cz) {
                    const data = new Uint8Array(this.chunkSize ** 3);
                    const worldYStart = cy * this.chunkSize;
                    for (let dx = 0; dx < this.chunkSize; dx++) {
                        for (let dz = 0; dz < this.chunkSize; dz++) {
                            const wx = cx * this.chunkSize + dx;
                            const wz = cz * this.chunkSize + dz;
                            const height = this._terrainHeight(wx, wz);
                            for (let dy = 0; dy < this.chunkSize; dy++) {
                                const wy = worldYStart + dy;
                                let id = 0;
                                if (wy < height)
                                    id = 3; // stone
                                else if (wy === height)
                                    id = 1; // grass
                                else if (wy < height + 3) id = 2; // dirt
                                const idx =
                                    (dx * this.chunkSize + dz) *
                                        this.chunkSize +
                                    dy;
                                data[idx] = id;
                            }
                        }
                    }
                    return data;
                }
                _terrainHeight(x, z) {
                    const n =
                        Math.sin(x * 0.02) * 0.5 +
                        Math.sin(z * 0.02) * 0.5 +
                        Math.sin(x * 0.05) * 0.3 +
                        Math.sin(z * 0.05) * 0.3;
                    const base = 10;
                    const variation = 12;
                    return Math.floor(base + n * variation);
                }
                getBlock(x, y, z) {
                    if (y < 0) return 3; // treat below world as stone
                    const key = this.getChunkKey(x, y, z);
                    const chunk = this.chunks.get(key);
                    if (!chunk) return 0;
                    const cx = Math.floor(x / this.chunkSize);
                    const cy = Math.floor(y / this.chunkSize);
                    const cz = Math.floor(z / this.chunkSize);
                    const dx =
                        (x - cx * this.chunkSize + this.chunkSize) %
                        this.chunkSize;
                    const dy =
                        (y - cy * this.chunkSize + this.chunkSize) %
                        this.chunkSize;
                    const dz =
                        (z - cz * this.chunkSize + this.chunkSize) %
                        this.chunkSize;
                    const idx =
                        (dx * this.chunkSize + dz) * this.chunkSize + dy;
                    return chunk[idx];
                }
                setBlock(x, y, z, id) {
                    const key = this.getChunkKey(x, y, z);
                    let chunk = this.chunks.get(key);
                    if (!chunk) {
                        const cx = Math.floor(x / this.chunkSize);
                        const cy = Math.floor(y / this.chunkSize);
                        const cz = Math.floor(z / this.chunkSize);
                        chunk = this._generateChunk(cx, cy, cz);
                        this.chunks.set(key, chunk);
                    }
                    const cx = Math.floor(x / this.chunkSize);
                    const cy = Math.floor(y / this.chunkSize);
                    const cz = Math.floor(z / this.chunkSize);
                    const dx =
                        (x - cx * this.chunkSize + this.chunkSize) %
                        this.chunkSize;
                    const dy =
                        (y - cy * this.chunkSize + this.chunkSize) %
                        this.chunkSize;
                    const dz =
                        (z - cz * this.chunkSize + this.chunkSize) %
                        this.chunkSize;
                    const idx =
                        (dx * this.chunkSize + dz) * this.chunkSize + dy;
                    chunk[idx] = id;
                }
            }
            const world = new VoxelWorld();
            /* ====================== DROP ENTITY ====================== */
            const blockColors = {
                1: 0x228b22, // grass
                2: 0x8b4513, // dirt
                3: 0x555555, // stone
            };
            class Drop {
                constructor(world, pos, type) {
                    this.world = world;
                    this.type = type;
                    this.mesh = new THREE.Mesh(
                        new THREE.BoxGeometry(0.5, 0.5, 0.5),
                        new THREE.MeshStandardMaterial({
                            color: blockColors[type],
                        }),
                    );
                    this.mesh.position.copy(pos);
                    this.position = pos.clone();
                    this.velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 0.3,
                        0.5 + Math.random() * 0.5,
                        (Math.random() - 0.5) * 0.3,
                    );
                    this.rotation = new THREE.Vector3(
                        (Math.random() - 0.5) * 0.2,
                        (Math.random() - 0.5) * 0.2,
                        (Math.random() - 0.5) * 0.2,
                    );
                    world.scene.add(this.mesh);
                }
                update(dt) {
                    this.velocity.y += GRAVITY * dt;
                    const next = this.position
                        .clone()
                        .addScaledVector(this.velocity, dt);
                    const rounded = new THREE.Vector3(
                        Math.floor(next.x),
                        Math.floor(next.y),
                        Math.floor(next.z),
                    );
                    if (
                        this.world.getBlock(rounded.x, rounded.y, rounded.z) !==
                        0
                    ) {
                        // hit ground – stop vertical movement
                        this.velocity.y = 0;
                        this.position.y = Math.floor(this.position.y) + 0.5;
                    } else {
                        this.position.copy(next);
                    }
                    this.mesh.position.copy(this.position);
                    this.mesh.rotation.x += this.rotation.x * dt;
                    this.mesh.rotation.y += this.rotation.y * dt;
                    this.mesh.rotation.z += this.rotation.z * dt;
                }
                remove() {
                    this.world.scene.remove(this.mesh);
                }
            }
            /* ====================== INPUT ====================== */
            window.addEventListener("keydown", (e) => {
                keys[e.code] = true;
            });
            window.addEventListener("keyup", (e) => {
                keys[e.code] = false;
            });
            window.addEventListener("mousedown", (e) => {
                if (!document.pointerLockElement) return;
                if (e.button === 0) {
                    // LMB – break
                    const res = _raycastBlocks(REACH);
                    if (res && res.hit) {
                        const b = world.getBlock(
                            res.hit.x,
                            res.hit.y,
                            res.hit.z,
                        );
                        if (b !== 0) {
                            world.setBlock(res.hit.x, res.hit.y, res.hit.z, 0);
                            const dropPos = new THREE.Vector3(
                                res.hit.x + 0.5,
                                res.hit.y + 0.5,
                                res.hit.z + 0.5,
                            );
                            drops.push(new Drop(world, dropPos, b));
                        }
                    }
                } else if (e.button === 2) {
                    // RMB – place
                    const res = _raycastBlocks(REACH);
                    if (res && res.prev) {
                        const type = inventory[selectedSlot].type;
                        if (type !== 0 && inventory[selectedSlot].count > 0) {
                            if (
                                world.getBlock(
                                    res.prev.x,
                                    res.prev.y,
                                    res.prev.z,
                                ) === 0
                            ) {
                                world.setBlock(
                                    res.prev.x,
                                    res.prev.y,
                                    res.prev.z,
                                    type,
                                );
                                inventory[selectedSlot].count--;
                                if (inventory[selectedSlot].count === 0)
                                    inventory[selectedSlot].type = 0;
                            }
                        }
                    }
                }
            });
            window.addEventListener("click", () => {
                if (!document.pointerLockElement) {
                    renderer.domElement.requestPointerLock();
                }
            });
            document.addEventListener("pointerlockchange", () => {
                const locked =
                    document.pointerLockElement === renderer.domElement;
                // nothing else needed – we already read mouse movement in the loop
            });
            window.addEventListener("keydown", (e) => {
                if (e.code >= "Digit1" && e.code <= "Digit9") {
                    selectedSlot = e.code.charAt(e.code.length - 1) - 1;
                }
            });
            /* ====================== HELPERS ====================== */
            function _raycastBlocks(maxDist) {
                const origin = playerPos
                    .clone()
                    .add(new THREE.Vector3(0, PLAYER_SIZE.y / 2, 0));
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                let prev = null;
                for (let i = 0; i < maxDist; i += 0.2) {
                    const test = origin
                        .clone()
                        .add(dir.clone().multiplyScalar(i));
                    const bx = Math.floor(test.x);
                    const by = Math.floor(test.y);
                    const bz = Math.floor(test.z);
                    if (world.getBlock(bx, by, bz) !== 0) {
                        return {
                            hit: new THREE.Vector3(bx, by, bz),
                            prev: prev
                                ? new THREE.Vector3(prev.x, prev.y, prev.z)
                                : null,
                        };
                    }
                    prev = { x: test.x, y: test.y, z: test.z };
                }
                return null;
            }
            function canMoveTo(pos) {
                const hs = PLAYER_SIZE.clone().multiplyScalar(0.5);
                for (let sx of [-hs.x, hs.x]) {
                    for (let sy of [-hs.y, hs.y]) {
                        for (let sz of [-hs.z, hs.z]) {
                            const x = Math.floor(pos.x + sx);
                            const y = Math.floor(pos.y + sy);
                            const z = Math.floor(pos.z + sz);
                            if (world.getBlock(x, y, z) !== 0) return false;
                        }
                    }
                }
                return true;
            }
            function updateInventoryUI() {
                const div = document.getElementById("inventory");
                div.innerHTML = "";
                for (let i = 0; i < 9; i++) {
                    const slot = document.createElement("div");
                    slot.className = "slot";
                    if (i === selectedSlot) slot.classList.add("active");
                    const it = inventory[i];
                    if (it.type !== 0) {
                        slot.textContent = it.count;
                        slot.style.backgroundColor = `#${blockColors[it.type].toString(16).padStart(6, "0")}`;
                    } else {
                        slot.textContent = "";
                    }
                    div.appendChild(slot);
                }
            }
            /* ====================== RENDER LOOP ====================== */
            function initThree() {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(
                    75,
                    innerWidth / innerHeight,
                    0.1,
                    1000,
                );
                camera.position
                    .copy(playerPos)
                    .add(new THREE.Vector3(0, PLAYER_SIZE.y / 2, 0));
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(innerWidth, innerHeight);
                document.body.appendChild(renderer.domElement);
                clock = new THREE.Clock();
            }
            function animate() {
                requestAnimationFrame(animate);
                const dt = clock.getDelta();
                _updatePlayer(dt);
                _updateDrops(dt);
                renderer.render(scene, camera);
            }
            function _updatePlayer(dt) {
                // jump
                if (keys.Space && canJump) {
                    playerVel.y = JUMP_SPEED;
                    canJump = false;
                }
                // horizontal movement
                const move = new THREE.Vector3();
                if (keys.KeyW) move.z -= 1;
                if (keys.KeyS) move.z += 1;
                if (keys.KeyA) move.x -= 1;
                if (keys.KeyD) move.x += 1;
                if (move.length() > 0) move.normalize();
                const forward = new THREE.Vector3(
                    Math.sin(yaw),
                    0,
                    -Math.cos(yaw),
                );
                const right = new THREE.Vector3(
                    Math.cos(yaw),
                    0,
                    Math.sin(yaw),
                );
                move.x = move.x * right.x + move.z * forward.x;
                move.z = move.x * right.z + move.z * forward.z;
                move.y = 0;
                move.multiplyScalar(MOVE_SPEED * dt);
                // apply gravity
                playerVel.y += GRAVITY * dt;
                const newPos = playerPos
                    .clone()
                    .add(move)
                    .add(new THREE.Vector3(0, playerVel.y * dt, 0));
                if (canMoveTo(newPos)) {
                    playerPos.copy(newPos);
                } else {
                    // try sliding on X
                    const px = playerPos
                        .clone()
                        .add(new THREE.Vector3(move.x, 0, 0))
                        .add(new THREE.Vector3(0, playerVel.y * dt, 0));
                    if (canMoveTo(px)) {
                        playerPos.x = px.x;
                        playerVel.x = 0;
                    }
                    // try sliding on Z
                    const pz = playerPos
                        .clone()
                        .add(new THREE.Vector3(0, 0, move.z))
                        .add(new THREE.Vector3(0, playerVel.y * dt, 0));
                    if (canMoveTo(pz)) {
                        playerPos.z = pz.z;
                        playerVel.z = 0;
                    }
                    // if falling and hit ground, stop vertical velocity
                    if (playerVel.y < 0) {
                        const under = playerPos
                            .clone()
                            .add(
                                new THREE.Vector3(
                                    0,
                                    -PLAYER_SIZE.y / 2 - 0.1,
                                    0,
                                ),
                            );
                        if (!canMoveTo(under)) {
                            playerVel.y = 0;
                            playerPos.y =
                                Math.floor(playerPos.y) +
                                PLAYER_SIZE.y / 2 +
                                0.1;
                            canJump = true;
                        }
                    } else {
                        canJump = false;
                    }
                }
                // update camera
                camera.position
                    .copy(playerPos)
                    .add(new THREE.Vector3(0, PLAYER_SIZE.y / 2, 0));
                camera.rotation.set(pitch, yaw, 0);
            }
            function _updateDrops(dt) {
                for (let i = drops.length - 1; i >= 0; i--) {
                    drops[i].update(dt);
                    // pickup check
                    if (drops[i].position.distanceTo(playerPos) < 1.0) {
                        const t = drops[i].type;
                        // try to stack
                        let added = false;
                        for (let j = 0; j < inventory.length; j++) {
                            if (
                                inventory[j].type === t &&
                                inventory[j].count < STACK_LIMIT
                            ) {
                                inventory[j].count++;
                                added = true;
                                break;
                            }
                        }
                        if (!added) {
                            for (let j = 0; j < inventory.length; j++) {
                                if (inventory[j].type === 0) {
                                    inventory[j].type = t;
                                    inventory[j].count = 1;
                                    added = true;
                                    break;
                                }
                            }
                        }
                        if (added) {
                            drops[i].remove();
                            drops.splice(i, 1);
                        }
                    }
                }
            }
            function onResize() {
                camera.aspect = innerWidth / innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(innerWidth, innerHeight);
            }
            window.addEventListener("resize", onResize);
            /* ====================== WORLD INITIALISATION ====================== */
            function loadChunksAround(radius = 4) {
                const cx = Math.floor(playerPos.x / CHUNK_SIZE);
                const cz = Math.floor(playerPos.z / CHUNK_SIZE);
                for (let dx = -radius; dx <= radius; dx++) {
                    for (let dz = -radius; dz <= radius; dz++) {
                        // we only need a single vertical column for simplicity (y chunk 0)
                        world.getChunk(cx + dx, 0, cz + dz);
                    }
                }
            }
            initThree();
            loadChunksAround(4);
            updateInventoryUI();
            animate();
        </script>
    </body>
</html>
